<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>一等無人航空機操縦士 学科試験 CBT模擬演習</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="1等CBT">
<meta name="theme-color" content="#14171C">
<style>
  :root{
    --bg: #eef0f3;
    --panel: #ffffff;
    --ink: #1c2027;
    --ink-soft: #5a616e;
    --line: #d7dbe2;
    --header: #2b2f38;
    --header-ink: #e8eaee;
    --navy: #1f3a5f;
    --navy-hov: #274a75;
    --gold: #b8901f;
    --gold-bg: #f7ecd0;
    --green: #2e7d32;
    --green-bg: #e3f2e4;
    --red: #b3261e;
    --red-bg: #fbe6e4;
    --gray-btn: #6b7280;
    --mono: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
    --sans: "Hiragino Sans", "Noto Sans JP", "Yu Gothic", system-ui, -apple-system, sans-serif;
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:var(--sans); -webkit-font-smoothing:antialiased;
  }
  button{ font-family:inherit; }
  .app{ min-height:100%; display:flex; flex-direction:column; }

  /* ===== Top bar (exam header) ===== */
  .examhead{
    background:var(--header); color:var(--header-ink);
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 16px; flex-wrap:wrap; gap:8px;
    border-bottom:3px solid #1a1d24;
  }
  .examhead .left{ display:flex; align-items:center; gap:14px; }
  .examhead .title{ font-size:13px; letter-spacing:.04em; opacity:.85; }
  .examhead .qpos{ font-size:15px; font-weight:600; }
  .examhead .right{ display:flex; align-items:center; gap:14px; }
  .timer{
    font-family:var(--mono); font-size:20px; font-weight:600;
    background:#1a1d24; color:#e8eaee; padding:6px 12px; border-radius:4px;
    min-width:96px; text-align:center; letter-spacing:.03em;
    border:1px solid #3a3f4a;
  }
  .timer.warn{ color:#ffd54a; border-color:#7a5d16; }
  .timer.crit{ color:#ff8a80; border-color:#7a2a24; animation:pulse 1s infinite; }
  @keyframes pulse{ 50%{ opacity:.55; } }

  .flagbtn{
    display:flex; align-items:center; gap:6px;
    background:transparent; border:1px solid #4a505c; color:var(--header-ink);
    padding:7px 12px; border-radius:4px; cursor:pointer; font-size:13px;
  }
  .flagbtn.on{ background:var(--gold); border-color:var(--gold); color:#241a02; font-weight:700; }
  .flagbtn:hover{ filter:brightness(1.1); }

  /* ===== Main layout ===== */
  .main{ flex:1; display:flex; }
  .examcol{ flex:1; padding:28px clamp(16px,4vw,56px); max-width:900px; }
  .navcol{
    width:280px; background:var(--panel); border-left:1px solid var(--line);
    padding:18px; flex-shrink:0;
  }
  @media (max-width:820px){
    .main{ flex-direction:column; }
    .navcol{ width:auto; border-left:none; border-top:1px solid var(--line); order:2; }
    .examcol{ order:1; max-width:none; }
  }

  .qcard{
    background:var(--panel); border:1px solid var(--line); border-radius:6px;
    padding:26px 28px; box-shadow:0 1px 3px rgba(20,24,32,.04);
  }
  .qnum-badge{
    display:inline-block; font-family:var(--mono); font-size:12px; color:var(--navy);
    background:#e7edf5; border:1px solid #c7d4e5; padding:3px 9px; border-radius:3px;
    margin-bottom:14px; font-weight:600;
  }
  .qtext{ font-size:17px; line-height:1.75; margin:0 0 22px; white-space:pre-wrap; }

  .choices{ display:flex; flex-direction:column; gap:10px; }
  .choice{
    display:flex; align-items:flex-start; gap:12px;
    border:1.5px solid var(--line); border-radius:6px; padding:14px 16px;
    cursor:pointer; transition:border-color .12s, background .12s;
    background:#fbfbfc;
  }
  .choice:hover{ border-color:#9aa6b8; }
  .choice.selected{ border-color:var(--navy); background:#eef2f8; }
  .choice input{ display:none; }
  .choice .letter{
    flex-shrink:0; width:26px; height:26px; border-radius:50%;
    border:1.5px solid #9aa6b8; display:flex; align-items:center; justify-content:center;
    font-size:13px; font-weight:700; color:var(--ink-soft); background:#fff;
  }
  .choice.selected .letter{ background:var(--navy); border-color:var(--navy); color:#fff; }
  .choice .body{ font-size:15.5px; line-height:1.6; padding-top:2px; }

  .navbtns{ display:flex; justify-content:space-between; margin-top:26px; gap:12px; }
  .btn{
    border:none; border-radius:5px; padding:11px 20px; font-size:14px; font-weight:600;
    cursor:pointer; transition:filter .12s, transform .05s;
  }
  .btn:active{ transform:translateY(1px); }
  .btn-primary{ background:var(--navy); color:#fff; }
  .btn-primary:hover{ background:var(--navy-hov); }
  .btn-secondary{ background:#fff; color:var(--ink); border:1.5px solid var(--line); }
  .btn-secondary:hover{ border-color:#9aa6b8; }
  .btn-danger{ background:var(--red); color:#fff; }
  .btn-danger:hover{ filter:brightness(1.08); }
  .btn:disabled{ opacity:.4; cursor:not-allowed; }
  .btn-block{ width:100%; }
  .btn-lg{ padding:14px 26px; font-size:15px; }

  /* ===== Question palette (navigator) ===== */
  .navcol h3{ font-size:13px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); margin:0 0 12px; }
  .legend{ display:flex; flex-wrap:wrap; gap:10px 14px; font-size:11.5px; color:var(--ink-soft); margin-bottom:14px; }
  .legend span{ display:inline-flex; align-items:center; gap:5px; }
  .dot{ width:10px; height:10px; border-radius:2px; display:inline-block; }
  .dot.answered{ background:var(--navy); }
  .dot.unanswered{ background:#fff; border:1.5px solid #b7bec9; }
  .dot.flagged{ background:var(--gold); }
  .palette{
    display:grid; grid-template-columns:repeat(7, 1fr); gap:6px;
  }
  .pnode{
    aspect-ratio:1; border-radius:4px; border:1.5px solid #b7bec9; background:#fff;
    font-family:var(--mono); font-size:11.5px; font-weight:600; color:var(--ink-soft);
    display:flex; align-items:center; justify-content:center; cursor:pointer; position:relative;
  }
  .pnode:hover{ border-color:var(--navy); }
  .pnode.answered{ background:var(--navy); border-color:var(--navy); color:#fff; }
  .pnode.current{ outline:2px solid var(--red); outline-offset:1px; }
  .pnode.flagged::after{
    content:""; position:absolute; top:-3px; right:-3px; width:8px; height:8px;
    background:var(--gold); border-radius:50%; border:1.5px solid #fff;
  }
  .navcol .submitwrap{ margin-top:20px; }
  .progresswrap{ margin-bottom:16px; }
  .progressbar{ height:6px; background:#e4e7ec; border-radius:3px; overflow:hidden; }
  .progressbar > div{ height:100%; background:var(--navy); }
  .progresslabel{ font-size:11.5px; color:var(--ink-soft); margin-top:6px; }

  /* ===== Start screen ===== */
  .start-wrap{ flex:1; display:flex; align-items:center; justify-content:center; padding:32px 16px; }
  .start-card{
    background:var(--panel); border:1px solid var(--line); border-radius:8px;
    max-width:640px; width:100%; padding:40px clamp(24px,5vw,48px);
    box-shadow:0 2px 8px rgba(20,24,32,.06);
  }
  .start-eyebrow{
    font-family:var(--mono); font-size:12px; letter-spacing:.08em; color:var(--navy);
    text-transform:uppercase; margin-bottom:8px; font-weight:600;
  }
  .start-card h1{ font-size:23px; margin:0 0 6px; }
  .start-card .sub{ color:var(--ink-soft); font-size:14px; margin:0 0 28px; line-height:1.7; }
  .round-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(130px,1fr)); gap:12px; margin-bottom:24px; }
  .round-btn{
    border:1.5px solid var(--line); border-radius:6px; padding:18px 10px; background:#fbfbfc;
    cursor:pointer; text-align:center; transition:border-color .12s, background .12s;
  }
  .round-btn:hover{ border-color:var(--navy); background:#eef2f8; }
  .round-btn.selected{ border-color:var(--navy); background:#eef2f8; box-shadow:inset 0 0 0 1.5px var(--navy); }
  .round-btn .rnum{ font-family:var(--mono); font-size:22px; font-weight:700; color:var(--navy); }
  .round-btn .rlabel{ font-size:12px; color:var(--ink-soft); margin-top:4px; }
  .round-btn .rstatus{ font-size:11px; margin-top:6px; font-weight:600; }
  .rstatus.pass{ color:var(--green); }
  .rstatus.fail{ color:var(--red); }
  .rstatus.resume{ color:var(--gold); }

  .rules{
    background:#f4f6f8; border:1px solid var(--line); border-radius:6px;
    padding:16px 18px; margin-bottom:24px; font-size:13px; color:var(--ink-soft); line-height:1.8;
  }
  .rules b{ color:var(--ink); }

  /* ===== Review / Results ===== */
  .result-wrap{ flex:1; padding:32px clamp(16px,4vw,56px); max-width:900px; margin:0 auto; width:100%; }
  .result-banner{
    border-radius:8px; padding:28px 32px; margin-bottom:24px; display:flex; align-items:center; gap:24px;
    flex-wrap:wrap;
  }
  .result-banner.pass{ background:var(--green-bg); border:1.5px solid #b8d9b9; }
  .result-banner.fail{ background:var(--red-bg); border:1.5px solid #eabab6; }
  .result-score{ font-family:var(--mono); font-size:44px; font-weight:700; line-height:1; }
  .result-banner.pass .result-score{ color:var(--green); }
  .result-banner.fail .result-score{ color:var(--red); }
  .result-meta h2{ margin:0 0 4px; font-size:19px; }
  .result-meta p{ margin:0; font-size:13.5px; color:var(--ink-soft); }

  .filterbar{ display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap; }
  .filterbtn{
    border:1.5px solid var(--line); background:#fff; border-radius:20px; padding:7px 16px;
    font-size:13px; cursor:pointer; color:var(--ink-soft);
  }
  .filterbtn.active{ border-color:var(--navy); color:var(--navy); background:#eef2f8; font-weight:600; }

  .review-item{
    background:var(--panel); border:1px solid var(--line); border-radius:6px;
    padding:20px 22px; margin-bottom:14px;
  }
  .review-item .rhead{ display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .review-item .rqnum{ font-family:var(--mono); font-size:12px; color:var(--ink-soft); font-weight:600; }
  .tag{ font-size:11px; font-weight:700; padding:3px 9px; border-radius:3px; }
  .tag.correct{ background:var(--green-bg); color:var(--green); }
  .tag.wrong{ background:var(--red-bg); color:var(--red); }
  .tag.skip{ background:#eee; color:var(--ink-soft); }
  .review-item .rqtext{ font-size:15px; line-height:1.7; margin:0 0 14px; white-space:pre-wrap; }
  .rchoice{ display:flex; gap:10px; padding:9px 0; font-size:14px; line-height:1.6; border-top:1px solid #f0f1f3; }
  .rchoice:first-child{ border-top:none; }
  .rchoice .rletter{
    flex-shrink:0; width:22px; height:22px; border-radius:50%; font-size:11px; font-weight:700;
    display:flex; align-items:center; justify-content:center; border:1.5px solid #c7ccd4; color:var(--ink-soft);
  }
  .rchoice.iscorrect .rletter{ background:var(--green); border-color:var(--green); color:#fff; }
  .rchoice.iswrongpick .rletter{ background:var(--red); border-color:var(--red); color:#fff; }
  .rchoice.iscorrect{ color:var(--green); font-weight:600; }
  .rchoice.iswrongpick{ color:var(--red); font-weight:600; }

  .top-actions{ display:flex; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:10px; }

  .modal-overlay{
    position:fixed; inset:0; background:rgba(20,24,32,.5); display:flex; align-items:center; justify-content:center;
    z-index:50; padding:16px;
  }
  .modal{ background:#fff; border-radius:8px; padding:28px 30px; max-width:420px; width:100%; }
  .modal h3{ margin:0 0 12px; font-size:17px; }
  .modal p{ margin:0 0 20px; font-size:14px; color:var(--ink-soft); line-height:1.7; }
  .modal .modalbtns{ display:flex; gap:10px; justify-content:flex-end; }

  .hidden{ display:none !important; }
  footer.credit{ text-align:center; font-size:11.5px; color:#9aa1ac; padding:18px 0 26px; }

  /* ===== Startup password ===== */
  .login-card{ max-width:440px; }
  .pw-input{
    width:100%; padding:13px 16px; font-size:16px; border:1.5px solid var(--line);
    border-radius:6px; margin-bottom:12px; font-family:inherit; background:#fbfbfc;
  }
  .pw-input:focus{ outline:none; border-color:var(--navy); background:#fff; }
  .pw-error{ color:var(--red); font-size:13px; margin:-4px 0 12px; font-weight:600; }

  /* ===== Practice mode (10問ずつ) ===== */
  .mode-btns{ display:flex; flex-direction:column; gap:10px; }
  .result-banner.neutral{ background:#eef2f8; border:1.5px solid #c7d4e5; }
  .result-banner.neutral .result-score{ color:var(--navy); }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
const QUESTION_BANK = {"1":[{"number":1,"question":"無人航空機の操縦者としての自覚として、正しいものを1つ選びなさい。","choices":{"a":"無人航空機の運航や安全管理などに対して責任を負うこと。","b":"経験と直感に裏付けられた的確な判断を行うこと。","c":"操縦者としての自覚を持ち、一定の状況下で、場合によっては人の安全を守ることを第一に考えること。"},"answer":"a"},{"number":2,"question":"無人航空機の操縦者の責任として、誤っているものを1つ選びなさい。","choices":{"a":"操縦者の最も基本的な責任は、飛行を効率的かつ最短距離で成し遂げることにある。","b":"飛行の全体にわたって安全を確保するための対策を実施する必要があり、その責任は操縦者が負っていることを自覚すること。","c":"常に第三者及び関係者の安全を意識すること。"},"answer":"a"},{"number":3,"question":"情報の収集等として、正しいものを1つ選びなさい。","choices":{"a":"飛行前に、最新の気象情報（天気、風向、警報、注意報等）を収集する。","b":"あらゆる地域において、地方公共団体により無人航空機の飛行を制限する条例や規則が設けられていたり、立入禁止区域が設定されていたりするため、緊急用務空域や飛行自粛要請空域の情報も含め飛行予定地域の情報を必ず収集する。","c":"飛行の際には、無線機器や公衆電話等により関係機関（空港事務所等）と常に連絡がとれる体制を確保する。"},"answer":"a"},{"number":4,"question":"飛行中の注意として、誤っているものを1つ選びなさい。","choices":{"a":"飛行に際しては、操縦者および補助者の監視が最大の安全対策である。","b":"補助者を配置する場合には、状況把握における誤解や伝達の遅れなどがないよう配慮する。","c":"法令や条例に定められたルール以外にも、ある地域において限定的に行われている地域の特性に応じたルールや社会通念上のマナーについても遵守する。"},"answer":"a"},{"number":5,"question":"航空法における無人航空機の定義として、正しいものを1つ選びなさい。","choices":{"a":"航空の用に供することができる飛行機、回転翼航空機、滑空機及び飛行船であって構造上、小動物が乗ることができないものである必要がある。","b":"遠隔操作又は手動操縦により飛行させることができるものである必要がある。","c":"重量が100g以上のものである必要がある。"},"answer":"c"},{"number":6,"question":"無人航空機の規制対象となる飛行の空域として、誤っているものを1つ選びなさい。","choices":{"a":"港湾等の周辺の上空","b":"消防、救助、警察業務その他の緊急用務を行うための航空機の飛行の安全を確保する必要がある空域","c":"地表又は水面から150m以上の高さの空域"},"answer":"a"},{"number":7,"question":"無人航空機の飛行形態の分類として、正しいものを1つ選びなさい。","choices":{"a":"カテゴリーII飛行のうち、特に、空港周辺、高度150m以上、催し場所上空、危険物輸送及び物件投下並びに最大離陸重量25kg以上の無人航空機の飛行は、リスクの高いものとして、「カテゴリーIIスーパー飛行」といい、その他のカテゴリーII飛行を「カテゴリーIIノーマル飛行」という。","b":"特定飛行のうち立入管理措置を講じないで行うもの、すなわち第三者上空における特定飛行を「ノンカテゴリー飛行」という。","c":"第三者上空における特定飛行は最もリスクの高い飛行となることから、その安全を確保するために最も厳格な手続き等が必要となる。"},"answer":"c"},{"number":8,"question":"無人航空機の操縦者が航空機の運航ルールを理解する必要性として、誤っているものを1つ選びなさい。","choices":{"a":"無人航空機は空中を飛行する機器であることから、万一の場合には、航空機の航行の安全に重大な影響を及ぼすおそれがある。","b":"航空機の航行の安全は、人の生命や身体に直接かかわるものとして最大限優先すべきものである。","c":"航空機の速度や無人航空機の大きさから、航空機側から無人航空機の機体を視認し回避することが容易である。"},"answer":"c"},{"number":9,"question":"航空機の飛行高度として、正しいものを1つ選びなさい。","choices":{"a":"150m以下での航空機の飛行は離着陸に引き続く場合が多い。","b":"捜索又は救助を任務としている公的機関等又はこれらの者の依頼により捜索又は救助を行う航空機や救急医療用ヘリコプター等は、離着陸にかかわらず150m以下は飛行しない。","c":"無人航空機の操縦者は、航空機との接近及び衝突を避けるため、無人航空機の飛行経路及びその周辺の空域を下見したうえで、補助者とともに監視しなければならない。"},"answer":"a"},{"number":10,"question":"制限表面のうち、東京・成田・中部・関西国際空港及び政令空港において指定することができるものとして、誤っているものを1つ選びなさい。","choices":{"a":"大型化及び高速化により旋回半径が増大した航空機の空港周辺での旋回飛行等の安全を確保するために必要な表面を拡張転移表面という。","b":"精密進入方式による航空機の最終直線進入の安全を確保するために必要な表面を延長進入表面という。","c":"航空機が最終直線進入を行うまでの経路の安全を確保するために必要な表面を外側水平表面という。"},"answer":"a"},{"number":11,"question":"登録の手続き及び登録記号の表示として、正しいものを1つ選びなさい。","choices":{"a":"無人航空機の登録の申請は、オンラインのみにより行い、手数料の納付等全ての手続きが完了後、登録記号が発行される。","b":"登録記号は、無人航空機の容易に取り外しができる外部から確認しやすい箇所に耐久性のある方法で鮮明に表示しなければならない。","c":"所有者又は使用者の氏名や住所などに変更があった場合には、登録事項の変更の届出をしなければならない。"},"answer":"c"},{"number":12,"question":"緊急用務空域として、誤っているものを1つ選びなさい。","choices":{"a":"災害等の規模に応じ、緊急用務を行う航空機の飛行が想定される場合には、国土交通省がその都度「緊急用務空域」を指定し、国土交通省のホームページ・X（旧Twitter）にて公示する。","b":"無人航空機の操縦者は、飛行を開始する前に、当該空域が緊急用務空域に該当するか否かの別を確認することが望ましい。","c":"空港等の周辺の空域、地表若しくは水面から150m以上の高さの空域又は人口集中地区の上空の飛行許可があっても、緊急用務空域を飛行させることはできない。"},"answer":"b"},{"number":13,"question":"教則に規定されている「工作物」に該当するものを1つ選びなさい。","choices":{"a":"自動車","b":"ビル","c":"港湾のクレーン"},"answer":"b"},{"number":14,"question":"教則に規定されている「工作物」に該当しないものを1つ選びなさい。","choices":{"a":"変電所","b":"鉄塔","c":"航空機"},"answer":"c"},{"number":15,"question":"教則に規定されている「多数の者の集合する催し」に該当するものを1つ選びなさい。","choices":{"a":"プロスポーツの試合","b":"投票待ちの行列","c":"ATMコーナーの人だかり"},"answer":"a"},{"number":16,"question":"教則に規定されている「危険物」に該当しないものを1つ選びなさい。","choices":{"a":"火薬類","b":"高圧ガス","c":"支柱"},"answer":"c"},{"number":17,"question":"例外的に「危険物」の対象とならないものとして、教則に規定されていないものを1つ選びなさい。","choices":{"a":"無人航空機の飛行のために必要な燃料や電池","b":"腐食性物質","c":"業務用機器（カメラ等）に用いられる電池"},"answer":"b"},{"number":18,"question":"「無人航空機の飛行に間接的に関与している者」の条件として、誤っているものを1つ選びなさい。","choices":{"a":"操縦者が、間接関与者について無人航空機の飛行の目的の全部又は一部に関与していると判断している。","b":"間接関与者が、操縦者から、無人航空機が計画外の挙動を示した場合に従うべき明確な指示と安全上の注意を受けている。","c":"間接関与者が、無人航空機の飛行目的の全部又は一部に関与するかどうかを操縦者を通じて決定することができる。"},"answer":"c"},{"number":19,"question":"飛行前に確認すべき事項として、正しいものを1つ選びなさい。","choices":{"a":"各機器の衛生状況","b":"発動機・モーター等の錆の有無","c":"機体（プロペラ、フレーム等）の損傷や歪みの有無"},"answer":"c"},{"number":20,"question":"無人航空機の操縦者等の義務として、誤っているものを1つ選びなさい。","choices":{"a":"飛行上の必要がないのに高調音を発し、又は急降下し、その他他人に迷惑を及ぼすような方法で飛行させないこと。","b":"整備及び必要に応じて改造をし、無人航空機が安全上の問題から登録を受けることができないものとならないように維持しなければならない。","c":"登録記号の機体への表示を隠匿しなければならない。"},"answer":"c"},{"number":21,"question":"飛行計画の通報等として、正しいものを1つ選びなさい。","choices":{"a":"国土交通大臣は、飛行計画の通報を受けた場合に安全の確保のために必要と認めるときは、特定飛行の日時又は経路の変更など必要な措置を講ずるよう指示する場合がある。","b":"飛行計画の通報をした際、国土交通大臣から指示を受けた場合には、必ずその指示に従わなければならない。","c":"特定飛行に該当しない無人航空機の飛行を行う場合には、煩雑さを避けるため、飛行計画を通報しないことが望ましい。"},"answer":"a"},{"number":22,"question":"特定飛行を行う者が飛行日誌に記載すべき事項のうち、無人航空機に関する情報として、誤っているものを1つ選びなさい。","choices":{"a":"種類","b":"型式","c":"廃棄者・廃棄番号"},"answer":"c"},{"number":23,"question":"無人航空機を飛行させる者が遵守する必要がある運航ルールとして、正しいものを1つ選びなさい。","choices":{"a":"機体認証を受けた無人航空機を飛行させる者は、使用の条件の範囲内または範囲外で特定飛行しなければならない。","b":"機体認証を受けた無人航空機の使用者は、必要な整備をすることにより、当該無人航空機を安全基準に適合するように維持しなければならない。","c":"機体認証を受けた無人航空機の使用者は、無人航空機の機体認証を行う場合に設定される無人航空機整備手順書に従って整備をすることが望ましいとされている。"},"answer":"b"},{"number":24,"question":"次の空欄に当てはまる数字をa～cの中から1つ選びなさい。 飛行日誌を備えずに特定飛行を行ったときや、飛行日誌に記載せず、又は虚偽の記載をしたときは、航空法により（　）万円以下の罰金に処せられる可能性がある。","choices":{"a":"10","b":"50","c":"100"},"answer":"a"},{"number":25,"question":"カテゴリーIII飛行を行う場合の運航管理体制や、無人航空機操縦者技能証明制度の概要として、正しいものを1つ選びなさい。","choices":{"a":"カテゴリーIII飛行を行う場合には、あらかじめ「運航管理の方法」について国土交通大臣の審査を受け、飛行の許可・承認を受ける必要がある。","b":"カテゴリーIII飛行を行う場合のリスク評価については、アメリカが作成したリスク評価マニュアルを活用することが推奨されている。","c":"無人航空機操縦者技能証明（技能証明）制度は、無人航空機を飛行させるのに必要な技能（知識及び能力）を有することを国、地方公共団体及び各種公的機関が証明する資格制度である。"},"answer":"a"},{"number":26,"question":"技能証明の交付手続きとして、誤っているものを1つ選びなさい。","choices":{"a":"技能証明試験に関して不正の行為が認められた場合には、当該不正行為と関係のある者について、その試験を停止し、又はその合格を無効にすることができる。","b":"技能証明試験に関して不正の行為が認められた場合には、当該者に対し一定期間試験を拒否することができる。","c":"技能証明の有効期間は3年であり、その更新を申請する者は、「登録更新講習機関」が実施する無人航空機更新講習を有効期間の更新の申請をする日以前1月以内に修了したうえで、有効期間が満了する日以前3月以内に国土交通大臣に対し技能証明の更新を申請しなければならない。"},"answer":"c"},{"number":27,"question":"小型無人機の飛行禁止対象となる重要施設として、正しいものを1つ選びなさい。","choices":{"a":"小型無人機等飛行禁止法により、重要施設の敷地・区域の上空（ブラック・ゾーン）及びその周囲おおむね300mの上空（ホワイト・ゾーン）においては小型無人機等を飛行させることはできない。","b":"外国要人の来日等に伴い、一時的に対象施設が追加されることがある。","c":"小型無人機の飛行禁止対象となる重要施設の詳細については、総務省ホームページなどを参照することが好ましい。"},"answer":"b"},{"number":28,"question":"小型無人機の飛行禁止の対象となる空港として、誤っているものを1つ選びなさい。","choices":{"a":"福岡空港","b":"茨城空港","c":"那覇空港"},"answer":"b"},{"number":29,"question":"小型無人機等の飛行禁止の例外に当たるものとして、正しいものを1つ選びなさい。","choices":{"a":"対象施設の関係者又はその親族による飛行","b":"土地の所有者等又はその同意を得た者が当該土地の周辺地帯において行う飛行","c":"国又は地方公共団体の業務を実施するために行う飛行"},"answer":"c"},{"number":30,"question":"免許又は登録を要しない無線局について、誤っているものを1つ選びなさい。","choices":{"a":"発射する電波が極めて微弱な無線局や、一定の技術的条件に適合する無線設備を使用する小電力の無線局については、無線局の免許又は登録が不要である。","b":"無人航空機には、携帯電話用の微弱無線局や小電力データ通信システム（無線LAN等）の一部が主として用いられている。","c":"小電力の無線局は、無線局免許や無線従事者資格が不要だが、技術基準適合証明等（技術基準適合証明又は工事設計認証）を受けた適合表示無線設備でなければならない。"},"answer":"b"},{"number":31,"question":"飛行自粛要請空域として、正しいものを1つ選びなさい。","choices":{"a":"警備上の観点等から警察などの関係省庁等の要請に基づく、国土交通省が無人航空機の飛行自粛を要請することがある。","b":"飛行自粛要請空域が設定される場合には、官報や政府広報にて告示される。","c":"無人航空機の操縦者は、飛行を開始する2週間以上前に、当該空域が飛行自粛要請空域に該当するか否かの別を確認し、その要請内容に基づき適切に対応する。"},"answer":"a"},{"number":32,"question":"大型飛行機（最大離陸重量25kg以上）の特徴として、誤っているものを1つ選びなさい。","choices":{"a":"大型機は主翼面積が大きくなるため、よりペイロード（積載可能重量）を大きくすることができる。","b":"推進動力の選択肢が狭まる反面、より長距離・長時間飛行が可能になる。","c":"25kg未満の飛行機に比べて風の影響を受けにくくなる。"},"answer":"b"},{"number":33,"question":"回転翼航空機（マルチローター）の特徴として、正しいものを1つ選びなさい。","choices":{"a":"操縦は、送信機に備わるアコースティック等を操作して行う。","b":"モーター性能を同一とした場合、ローターの数が少ないほど故障に対する耐性が向上し、ペイロード（積載可能重量）が増える。","c":"ローターの回転方向は、時計回転（CW：クロックワイズ）と反時計回転（CCW：カウンタークロックワイズ）の方向で構成され、反トルクにより機体の回転バランスを保っている。"},"answer":"c"},{"number":34,"question":"夜間飛行と昼間（日中）飛行の違いとして、誤っているものを1つ選びなさい。","choices":{"a":"原則として、無人航空機は日出から日没までの間において飛行させることになっている。","b":"無人航空機を日没から日出までの間に飛行させる場合は、許可が必要である。","c":"日没及び日出時刻は地域により異なるため、事前に確認する必要がある。"},"answer":"b"},{"number":35,"question":"日視外飛行において、補助者を配置しない場合に追加する必要のある装備として、正しいものを1つ選びなさい。","choices":{"a":"航空機からの視認性を高める灯火、塗色","b":"機体や地上に設置された無線機器等により、飛行経路全体の航空機の状況が常に確認できるもの","c":"補助者に危害を加えないことを、製造事業者等が証明した機能"},"answer":"a"},{"number":36,"question":"無人航空機の飛行原理として、誤っているものを1つ選びなさい。","choices":{"a":"水平状態からのそれぞれの角度をピッチ角、ロール角（バンク角）、ヨー角（方位角）とよび、それらの角速度をピッチ角速度（ピッチング）、ロール角速度（ローリング）、ヨー角速度（ヨーイング）とよぶ。","b":"飛行機はプロペラによる推力によって速さを制御し、また、ピッチ、ロール、ヨーの姿勢を変化させることで飛行速度の向きを制御する。","c":"ピッチを変化させるための舵が水平尾翼にあるエルロン（昇降舵）、ロールを変化させるための舵が主翼にあるラダー（補助翼）、ヨーを変化させる舵が垂直尾翼にあるエレベーター（方向舵）である。"},"answer":"c"},{"number":37,"question":"無人航空機へのペイロード搭載について、正しいものを1つ選びなさい。","choices":{"a":"ペイロードの最大積載量とペイロード搭載時の飛行性能は飛行高度、大気状態によって変化はしないが、飛行機の場合は、離着陸エリアの広さによって飛行性能が異なる。","b":"機体外観が変化すると、航空機の飛行特性（安定性、飛行性能、運動性能）は変化するため注意が必要である。","c":"機体の重心位置の変化は飛行特性に大きな影響を及ぼすため、ペイロードの有無によって機体の重心位置が著しく変化しないようにしなければならない。"},"answer":"c"},{"number":38,"question":"飛行機の揚力・回転翼航空機の推力について、誤っているものを1つ選びなさい。","choices":{"a":"飛行機の水平定常飛行においては、「機体重量」と「揚力」は、それぞれ「空気密度」と「飛行速度の2乗」の積に比例する。","b":"プロペラなどの回転翼の推力は、「空気密度」と「回転角速度」の積に比例する。","c":"回転翼の消費パワー（仕事率）は、「空気密度」と「回転角速度の3乗」の積に比例し、さらに「推力」と「回転角速度」の積にも比例する。"},"answer":"b"},{"number":39,"question":"フライトコントロールシステムを構成する一般的なデバイスとして、正しいものを1つ選びなさい。","choices":{"a":"人工衛星の電波を受信し、機体の地球上での位置・高度を取得するデバイスをGNSS（Global Navigation Satellite System）という。","b":"3軸のジャイロセンサと3方向の加速度センサ等によって3次元の角度と加速度を検出する装置をメインコントローラーという。","c":"GNSSなどの各種センサの情報と送信機の指令をもとに、機体の姿勢を制御するデバイスをIMU（Inertial Measurement Unit）という。"},"answer":"a"},{"number":40,"question":"無人航空機で使われる電気・電子用語について、誤っているものを1つ選びなさい。","choices":{"a":"容量（Ah）は、電流（A）×時間（h）で求めることができる。","b":"エネルギー容量（Wh）は、放電時電圧（V）×電流（A）×時間（h）で求めることができる。","c":"充電率（%）は、現時点で放電できる電気量（Ah）÷将来的に放電できる電気量（Ah）で求めることができる。"},"answer":"c"},{"number":41,"question":"スティック操作による機体の動きの割り当てとして、正しいものを1つ選びなさい。","choices":{"a":"飛行機の場合、モード1を右側スティックの上下操作、モード2を左側スティックの上下操作にすることで、エレベーターが可能となる。","b":"飛行機の場合、モード1及びモード2をそれぞれ左側スティックの左右操作にすることで、ラダーが可能となる。","c":"飛行機の場合、モード1及びモード2をそれぞれ右側スティックの左右操作にすることで、スロットルが可能となる。"},"answer":"b"},{"number":42,"question":"リチウムポリマーバッテリーの取り扱い上の注意点として、誤っているものを1つ選びなさい。","choices":{"a":"過放電や過充電の状態は、バッテリーを膨らませる遠因となる。","b":"バッテリーが強い衝撃を受けた場合、発火する可能性がある。","c":"バッテリーが伸長した場合、発火する可能性がある。"},"answer":"c"},{"number":43,"question":"機体の故障や事故の分析として、正しいものを1つ選びなさい。","choices":{"a":"無人航空機の多くは、機体の異常情報を機体本体にのみ取り付けられたランプや音などで知らせる機能を有している。","b":"無人航空機には、飛行軌跡と機体の情報（フライトデータ）を記録している機種もあり、事故の原因分析を詳細に確認することも可能である。","c":"事故や故障の原因調査は、機体や飛行の安全性を向上させる重要な要素であるので、調査結果は秘匿し、廃棄することが推奨される。"},"answer":"b"},{"number":44,"question":"フレネルゾーンについて、誤っているものを1つ選びなさい。","choices":{"a":"フレネルゾーンとは無線通信などで、電力損失を最小限に抑えて電波が到達するために必要とする領域のことをいう。","b":"無線通信での「見通しが良い」という表現は、フレネルゾーンがしっかり確保されている状態であることを意味する。","c":"フレネルゾーンは、送信と受信のアンテナ間の最短距離を中心とした楕円体の空間で、この空間は無限に広がるが、電波伝搬で重要なのは第1フレネルゾーンと呼ばれる部分である。"},"answer":"a"},{"number":45,"question":"電波の送信、受信に関わる基本的な技術として、正しいものを1つ選びなさい。","choices":{"a":"送信機のアンテナから発射される電波の強さは、時間と空間により異なる。","b":"無指向性のアンテナの場合、電波は、アンテナの周囲に対して同様の強さで発射される。","c":"一度固定すると、アンテナの角度は調整できなくなるので、操縦時の送信機の持ち方や無人航空機の位置を考慮して、最初に最適なアンテナ角度を設定する必要がある。"},"answer":"b"},{"number":46,"question":"GNSSについて、誤っているものを1つ選びなさい。","choices":{"a":"GPSに加え、ロシアのGalileo、欧州のGLONASS、日本の準天頂衛星QZSS等を総称してGNSS（Global Navigation Satellite System/全球測位衛星システム）という。","b":"GNSSは最低4個以上の人工衛星からの信号を同時に受信することで、その位置を計算することができる。","c":"安定飛行のためには、より多くの人工衛星から信号を受信することが望ましい。"},"answer":"a"},{"number":47,"question":"リチウムポリマーバッテリーの保管方法における主な留意点として、正しいものを1つ選びなさい。","choices":{"a":"落下させるなど衝撃を与えないこと。","b":"水気を切らないこと。","c":"バッテリーを低温（0℃未満）になる環境で保管しないこと。"},"answer":"a"},{"number":48,"question":"運航者がプロセスごとに行うべき点検項目として、誤っているものを1つ選びなさい。","choices":{"a":"飛行前の準備では、無人航空機の機体認証及び有効期間並びに使用の条件（運用限界）を点検する。","b":"飛行前の準備では、技能証明の等級・限定・条件及び有効期間を点検する。","c":"飛行前の準備では、補助者の有無、地上又は水上の状況（住宅、学校、病院、道路、鉄道等）を点検する。"},"answer":"c"},{"number":49,"question":"運航者がプロセスごとに行うべき点検項目として、正しいものを1つ選びなさい。","choices":{"a":"異常事態発生時の措置としては、「その場で浮かんだ最善の危機回避行動をとること」が挙げられる。","b":"異常事態発生時の措置としては、「事故発生時には、直ちに無人航空機の飛行を中止し、危険を防止するための措置を取ること」が挙げられる。","c":"異常事態発生時の措置としては、事故・重大インシデントの製造メーカーへの報告が挙げられる。"},"answer":"b"},{"number":50,"question":"損害賠償能力の確保について、誤っているものを1つ選びなさい。","choices":{"a":"無人航空機を飛行させる場合、飛行中における航空機や他の無人航空機との接触又は衝突、落下等による地上の人又は物件との接触または衝突により、第三者に損害を与えることが想定される。","b":"無人航空機を飛行させる場合には、万一の場合に備え賠償能力を確保しておくことが望まれるが、その対応としては、損害賠償保証協会に加入しておくことが有効と考えられる。","c":"国土交通省においては、加入している保険の確認など無人航空機を飛行させる者が賠償能力を有することの確認を、許可・承認の審査の際に行っている。"},"answer":"b"},{"number":51,"question":"回転翼航空機（マルチローター）の離着陸時に特に注意すべき事項として、正しいものを1つ選びなさい。","choices":{"a":"回転翼航空機（マルチローター）は、コントローラー等によるヨー操作によって高速に回転する翼から発せられる揚力が重力を上回ることにより離陸する。","b":"機体重量1.5kgほどの回転翼航空機（マルチローター）を例にすると、離陸直後から対地高度1m程度までの間は、回転翼から発せられる吹きおろしの気流が地面付近で滞留し、揚力が増す現象「地面効果」が起こりやすくなる。","c":"離陸後、任意の対地高度で一定の高度と位置を継続的に維持することをバンドリングという。"},"answer":"b"},{"number":52,"question":"回転翼航空機（ヘリコプター）の離着陸地点の選定として、誤っているものを1つ選びなさい。","choices":{"a":"離着陸直前は、機体が水平となるため、傾斜地では胴体部などが地面に接触するおそれがある。","b":"離陸前は、ヨー軸まわりの制御が不十分な場合があり、ヨー軸を中心に回転するおそれがある。","c":"ローターのダウンウォッシュによる砂埃等が飛散し、視界を遮るおそれがある。"},"answer":"a"},{"number":53,"question":"カテゴリーIII飛行において追加で必要となる離着陸の注意点として、正しいものを1つ選びなさい。","choices":{"a":"離着陸に際しては、第三者及び第三者の物件と機体が接触するなど第三者の安全が損なわれるおそれがないようにする。","b":"離着陸時ローターへ吹き付ける風の影響を受け、物などが飛ばされ、第三者及び第三者の物件に危害を加えることがないようにする。","c":"カテゴリーIII飛行においては、第三者の物件等が多いエリアでの離着陸、また、それによって離着陸時に機体が不安定になることはあまり考えられない。"},"answer":"a"},{"number":54,"question":"ヒューマンエラーの傾向として、誤っているものを1つ選びなさい。","choices":{"a":"自動操縦の場合、ウェイポイント設定時、飛行経路上の障害物等の確認不足によって衝突や墜落が発生することが想定できる。","b":"自動操縦の場合、設定した飛行経路上の障害物等は、事前に現地確認を行うことが重要である。","c":"手動操縦は無人航空機を精密に制御できる反面、操縦経験の浅い操縦士が操作を行うと様々な要因で意図しない時間帯に飛行してしまう場合がある。"},"answer":"c"},{"number":55,"question":"緊急時の対応として、正しいものを1つ選びなさい。","choices":{"a":"運航者は、事故発生時においては、直ちに無人航空機の飛行を中止するとともに、負傷者がいる場合には、第一に危険を防止するための必要な措置を講じ、次に当該事故が発生した現場から速やかに離れなければならない。","b":"カテゴリーIII飛行は立入管理措置を講じたうえで行うものであるため、その飛行形態に応じて第三者の立入りがあるものと認識してリスクの分析及び評価を行い、その結果に基づくリスク軽減策を講じる必要がある。","c":"カテゴリーIII飛行のリスク軽減策としては、例えば、緊急対応が求められる場合に備えて、予め対応手順を設定するとともに、速やかに当該対応が実施できるよう訓練を実施することが考えられる。"},"answer":"c"},{"number":56,"question":"CRM（Crew Resource Management）として、誤っているものを1つ選びなさい。","choices":{"a":"CRMを実現するために用いられる「TEM（Threat and Error Management）」における「スレット（Threat）」は、「エラー（Error）」を誘発する要因であり、操縦者及び補助者だけではスレットやエラーの発生状況を把握することが困難な場合があり、この場合、適切な対処がとれず事故等につながるおそれがある。","b":"TEMは、補助者や関係者との相互監視・確認、機体や送信機の警報、飛行空域周辺状況に関する最新情報の入手など、全ての利用可能なリソースを活用し、エラーにつながりかねないスレット（気象の変化、疲労、機材不具合など）の発生状況を早期に把握・管理し、万一エラーが発生しても事故等に至らないように適切に対処しようとする手法である。","c":"TEMを効果的に実践するための能力は、状況認識、意思決定、ワークロード管理、チームワーク、コミュニケーションといった5つのCRMスキル（ノンテクニカルスキル）である。"},"answer":"a"},{"number":57,"question":"飛行計画策定時の確認事項として、正しいものを1つ選びなさい。","choices":{"a":"飛行計画では、無人航空機の飛行経路・飛行範囲を決定し、無人航空機を運航するにあたって、自治体など各関係者・権利者への周知や承諾が必要となる場合がある。","b":"離着陸場は人の立ち入りや騒音、プロットエラーの原因となる構造物がないかなどに留意する。","c":"飛行経路の設定は高圧電線などの電力施設が近くにないか、人工設定空域に当たらないか、ドクターヘリなどの航空機の往来がないかなどを考慮に入れる必要がある。"},"answer":"a"},{"number":58,"question":"カテゴリーIII飛行において追加となる経路設定の注意点として、誤っているものを1つ選びなさい。","choices":{"a":"飛行経路付近に緊急着陸地点や不時着エリアを予め設定する。","b":"飛行経路からの逸脱を防止するためのジオフェンス機能を設定する。","c":"ジオフェンス機能の設定において、当日の他の無人航空機との空域調整結果が反映されていることを確認する。"},"answer":"c"},{"number":59,"question":"カテゴリーIII飛行におけるリスク分析及び評価において考慮すべき事項として、正しいものを1つ選びなさい。","choices":{"a":"使用条件等指定書で指定された使用の条件等、使用する無線機器の情報","b":"無人航空機を飛行させる者の無人航空機操縦者技能証明及び訓練の内容","c":"無人航空機を飛行させる者を補助する者等を除いた運航体制"},"answer":"b"},{"number":60,"question":"リスク評価ガイドラインによるリスク評価手法として、誤っているものを1つ選びなさい。","choices":{"a":"「無人航空機の飛行に関する許可・承認の審査要領（カテゴリーIII飛行）」においては、リスク評価ガイドラインによるリスク評価手法を活用することが義務付けられている。","b":"リスク評価ガイドラインは、JARUS（Joint Authorities for Rulemaking of Unmanned Systems）のSORA（Specific Operations Risk Assessment）を参考に作成されたものである。","c":"「想定飛行空間」は、無人航空機の飛行の目的や、機体やシステムの性能、環境に応じて設定される飛行範囲である。"},"answer":"a"},{"number":61,"question":"リスク評価手法として、正しいものを1つ選びなさい。","choices":{"a":"Step2では、無人航空機の最大寸法及び運動エネルギーと、想定する運航形態に基づき、乱数表を用いて地上リスククラスを判定し、地上リスクの軽減策とロバスト性により調整し、調整後の地上リスククラスを決定する。","b":"Step3では、想定する飛行空域において航空機と遭遇する確率について定量的に「空中リスククラス」として判定し、必要により戦略的対策を講じることにより低減し、残留する空中リスククラス（ARC-a／ARC-b／ARC-c／ARC-d）を決定する。","c":"Step4では、これまでのステップで特定された地上リスククラスと空中リスククラスを用いて「安全性と保証のレベル（SAIL）」を決定する。"},"answer":"c"},{"number":62,"question":"天気図の見方として、誤っているものを1つ選びなさい。","choices":{"a":"天気図には、各地で観測した天気、気圧、気温、風向、風力や高気圧、低気圧、前線の位置及び等圧線などが描かれている。","b":"実況天気図、予想天気図から気圧配置、前線の位置、移動速度などを確認する。","c":"等圧線の作成年月日から風の強弱を知ることができ、等圧線の作成年月日が古いほど風は強まる。"},"answer":"c"},{"number":63,"question":"冬の天気として、正しいものを1つ選びなさい。","choices":{"a":"冬の悪い天気の代表は「氷雨」と「霜」である。","b":"シベリア高気圧が優勢になり冬の季節風の吹き出しが始まると、まず気象衛星の雲写真に四川省から太平洋へ流れる帯状の雲が現れる。","c":"冬型の天気の典型は西高東低といわれるもので、天気図では西側に高気圧、東側に低気圧という気圧配置で、日本海側に雪をもたらす。"},"answer":"c"},{"number":64,"question":"風と気圧について、誤っているものを1つ選びなさい。","choices":{"a":"風とは、空気の水平方向の流れをいい、風向と風速で表す。","b":"空気は、気圧の低いほうから高いほうに向かうが、この流れが風である。","c":"等圧線の間隔が狭いほど風は強く吹く。"},"answer":"b"},{"number":65,"question":"山谷風やビル風について、正しいものを1つ選びなさい。","choices":{"a":"山谷風は山岳地帯に現れる風の一種であり、昼間は、日射で暖められた空気が山から降りる山風が吹き、夜間は冷えた空気が谷を這い上がる谷風が吹く。","b":"ビル風は高層ビルや容積の大きい建物などが数多く近接している場所及び周辺に発生する風で、強さや建物周辺に流れる風の特徴により分類される。","c":"ビル風は周辺の風より風速が遅く継続して吹いていて、その建物群の配置や構成によって吹く風の種類が異なる。"},"answer":"b"},{"number":66,"question":"使用機体と飛行計画を元にしたリスク軽減策の検討要素の例として、誤っているものを1つ選びなさい。","choices":{"a":"離着陸においては向かい風で行うため、風向の予測と風向に適した滑走路の確保が必要となる。","b":"地上経路設定においては過度な上昇角度を避け、過度に旋回半径が小さくならないようにする。","c":"飛行計画が正しく設定されているか、単独で確認を行う運航者の体制が重要である。"},"answer":"c"},{"number":67,"question":"回転翼航空機（ヘリコプター）の使用機体と飛行計画を元にしたリスク軽減策の検討要素の例として、正しいものを1つ選びなさい。","choices":{"a":"離着陸地点において、機体と操縦者、補助者及び周囲の物件との必要な安全距離を確保する。","b":"ボルテックス・リング・ステートを予防できる上昇方法を選定する。","c":"オートローテーション機能を理解し、着陸実験を実施する。"},"answer":"a"},{"number":68,"question":"大型機（最大離陸重量25kg以上）の運航の特徴として、誤っているものを1つ選びなさい。","choices":{"a":"大型機（最大離陸重量25kg以上）は、事故発生時の影響が大きいことから、操縦者の運航への習熟度及び安全運航意識が十分に高いことが要求される。","b":"大型機は機体の慣性力が小さいことから、増速・減速・上昇・降下などに要する時間と距離が長くなるため、障害物回避には特に注意が必要である。","c":"一般に小型の機体よりも騒音が大きくなるため、飛行経路周囲への配慮が必要である。"},"answer":"b"},{"number":69,"question":"夜間飛行のリスク軽減を図るための対策と提案として、正しいものを1つ選びなさい。","choices":{"a":"飛行経路下を飛行管理区域に設定する。","b":"鳥獣が出現する可能性が高い地点の特定と対応方法を検討する。","c":"離着陸を予定している場所、回避すべき障害物、緊急着陸予定地点を画像認識可能な状態にする。"},"answer":"a"},{"number":70,"question":"補助者を配置する場合における、目視外飛行のリスク軽減を図るための対策と提案として、誤っているものを1つ選びなさい。","choices":{"a":"事前確認などにより、適切な飛行時間を測定する。","b":"適切な補助者の配置を検討する。","c":"飛行前に、飛行経路下に第三者が存在しないことを確認する。"},"answer":"a"}],"2":[{"number":1,"question":"無人航空機の操縦者の役割と責任として、誤っているものを1つ選びなさい。","choices":{"a":"無人航空機操縦者技能証明の保有者が複数いる場合は、誰が意図する飛行の操縦者なのか飛行前に明確にしておくこと。","b":"補助者を配置する場合は、役割を必ず確認し、操縦者との連絡手段の確保など安全確認を行うことができる体制としておくこと。","c":"無人航空機の事故は、飛行中の様々な準備不足が直接的又は間接的な原因となっていることが多いことから、飛行中の準備を怠らないこと。"},"answer":"c"},{"number":2,"question":"事故を起こした場合に操縦者が負う法的責任として、正しいものを1つ選びなさい。","choices":{"a":"衝突や墜落により死傷者が発生した場合、事故の内容により「危険運転致死傷」などの刑事責任を負う場合がある。","b":"操縦者は、被害者に対して民法に基づく「損害賠償責任」を負う場合がある。","c":"航空法（昭和27年法律第231号）への違反や無人航空機を飛行させるに当たり非行又は重大な過失があった場合には、技能証明の効力の取消や技能証明の効力の停止（期間は3年以内）などの行政処分等の対象となる。"},"answer":"b"},{"number":3,"question":"服装に対する注意として、誤っているものを1つ選びなさい。","choices":{"a":"動きやすいものを選ぶ。","b":"素肌（頭部を含む）の露出の少ないものを選ぶ。","c":"無人航空機の飛行を行う関係者であることが容易にわからないような服装を選ぶ。"},"answer":"c"},{"number":4,"question":"飛行後の注意として、正しいものを1つ選びなさい。","choices":{"a":"飛行が終わった後には、機体に不具合がないか等を点検し、使用後の手入れをして次回の飛行に備える。","b":"飛行の終了後には、機体やバッテリー等をそのままの状態で、任意の場所に保管する。","c":"特定飛行を行った場合には、飛行記録、日常点検記録、点検整備記録を飛行終了から3週間以内に飛行日誌（紙又は電子データ）に記載する。"},"answer":"a"},{"number":5,"question":"航空法における定義として、誤っているものを1つ選びなさい。","choices":{"a":"無人航空機の定義の1つである「構造上人が乗ることができないもの」は、当該機器の概括的な大きさや潜在的な能力を含めた構造、性能等により判断される。","b":"「航空機」とは、原則として、人が乗って航空の用に供することができる飛行機、回転翼航空機、滑空機及び飛行船を対象としている。","c":"操縦者が乗り組まないで飛行することができる装置を有する航空機を「全自動型航空機」という。"},"answer":"c"},{"number":6,"question":"規制対象となる飛行の方法に該当するものとして、正しいものを1つ選びなさい。","choices":{"a":"夜間飛行（午後9時から午前5時まで）","b":"補助者の目視外での飛行（目視外飛行）","c":"第三者又は第三者の物件との間の距離が30m未満での飛行"},"answer":"c"},{"number":7,"question":"機体認証及び無人航空機操縦者技能証明として、誤っているものを1つ選びなさい。","choices":{"a":"特定飛行については、航空機の航行の安全への影響や地上及び水上の人及び物件への危害を及ぼすおそれがあることから、使用する機体、操縦する者の技能及び運航管理の方法の適格性を担保し、飛行の安全を確保する必要がある。","b":"特定飛行においては、使用する機体及び操縦する者の技能について、国があらかじめ基準に適合していることを確認したことを証明する「機体認証」及び「技能証明」に関する制度が設けられている。","c":"機体認証及び技能証明については、無人航空機の飛行形態のリスクに応じ、カテゴリーII飛行に対応した第一種機体認証及び一等無人航空機操縦士、カテゴリーI飛行に対応した第二種機体認証及び二等無人航空機操縦士に区分されている。"},"answer":"c"},{"number":8,"question":"無人航空機の操縦者が航空機の運航ルールを理解する必要性として、正しいものを1つ選びなさい。","choices":{"a":"無人航空機は、航空機と比較して機動性が高くないと考えられている。","b":"航空機と無人航空機間で飛行の進路が交差し、又は接近する場合には、航空機の航行の安全を確保するためにも、無人航空機側が回避することが妥当である。","c":"無人航空機の操縦者には、民間団体が提供している「ドローン情報基盤システム（飛行計画通報機能）」などを通じて飛行情報を共有することが求められている。"},"answer":"b"},{"number":9,"question":"航空機の操縦者による見張り義務や出発前の航空情報の確認として、誤っているものを1つ選びなさい。","choices":{"a":"航空機の操縦者は、航空機の航行中は、飛行方式にかかわらず、いかなる場合であっても、他の航空機その他の物件と衝突しないように見張りをすることが義務付けられている。","b":"航空機の機長は、出発前に運航に必要な準備が整っていることを確認することが求められている。","c":"航空機の機長には、国土交通大臣から提供される航空情報を確認することが義務付けられている。"},"answer":"a"},{"number":10,"question":"模型航空機に対する規制として、正しいものを1つ選びなさい。","choices":{"a":"航空交通管制圏、航空交通情報圏、航空交通管制区内の特別管制空域等における模型航空機の飛行は、夜間のみ禁止されている。","b":"国土交通省が災害等の発生時に緊急用務空域を設定した場合には、当該空域における模型航空機の飛行は禁止される。","c":"特別管制空域や緊急用務空域以外のうち、空港等の周辺、航空路内の空域（高度150m以上）、高度250m以上の空域において、模型航空機を飛行させる場合には、国土交通省の許可が必要となる。"},"answer":"b"},{"number":11,"question":"登録の手続き及び登録記号の表示として、誤っているものを1つ選びなさい。","choices":{"a":"最大離陸重量25kg以上の機体は、登録記号の文字の高さを25mm以上としなければならない。","b":"最大離陸重量25kg未満の機体は、登録記号の文字の高さを5mm以上としなければならない。","c":"3年の有効期間毎に更新を受けなければ、登録の効力を失う。"},"answer":"b"},{"number":12,"question":"規制対象となる飛行の空域として、正しいものを1つ選びなさい。","choices":{"a":"国土交通省、防衛省、警察庁、都道府県警察又は地方公共団体の消防機関その他の関係機関の使用する航空機のうち捜索、救助その他の緊急用務を行う航空機の飛行の安全を確保するため、国土交通省が緊急用務を行う航空機が飛行する空域（緊急用務空域）を指定し、この空域では、原則、無人航空機の飛行が禁止される（重量100g未満の模型航空機は飛行禁止の対象とならない）。","b":"「高度150m以上の飛行禁止空域」とは、海抜高度からの高度差が150m以上の空域を指す。","c":"山岳部などの起伏の激しい地形の上空で無人航空機を飛行させる場合には、意図せず150m以上の高度差になるおそれがあるので注意が必要である。"},"answer":"c"},{"number":13,"question":"教則に規定されている「工作物」に該当しないものを1つ選びなさい。","choices":{"a":"庭園","b":"住居","c":"工場"},"answer":"a"},{"number":14,"question":"教則に規定されている「車両等」に該当するものを1つ選びなさい。","choices":{"a":"船舶","b":"電柱","c":"信号機"},"answer":"a"},{"number":15,"question":"教則に規定されている「多数の者の集合する催し」に該当しないものを1つ選びなさい。","choices":{"a":"スポーツ大会","b":"化石の発掘調査","c":"運動会"},"answer":"b"},{"number":16,"question":"教則に規定されている「危険物」に該当するものを1つ選びなさい。","choices":{"a":"超音波発信機","b":"引火性液体","c":"ICプレーヤー"},"answer":"b"},{"number":17,"question":"物件の投下について、誤っているものを1つ選びなさい。","choices":{"a":"無人航空機の操縦者は、当該無人航空機から物件を投下させることが原則禁止されている。","b":"物件の投下には、水や農薬等の液体や霧状のものの散布も含まれる。","c":"無人航空機を使って対象物件を地表等に落下させることなく地上の人員に受け渡す行為や輸送した物件を地上に置く行為は、物件の投下に含まれる。"},"answer":"c"},{"number":18,"question":"第三者上空について、正しいものを1つ選びなさい。","choices":{"a":"「第三者上空」とは、無人航空機の飛行に直接的又は間接的に関与している者の上空をいう。","b":"「第三者上空」には、無人航空機の飛行に直接的又は間接的に関与していない者が乗り込んでいる移動中の車両等（自動車、鉄道車両、軌道車両、船舶、航空機、建設機械、港湾のクレーン等）の上空を含む。","c":"無人航空機の落下距離（飛行範囲の外周から製造者等が保証した落下距離）を踏まえ、当該無人航空機が落下する可能性のある領域に第三者が存在する場合、当該無人航空機は、当該第三者の上空にあるとみなされない。"},"answer":"b"},{"number":19,"question":"飛行前に確認すべき事項として、誤っているものを1つ選びなさい。","choices":{"a":"対流系統等の作動状況","b":"飛行空域や周囲における航空機や他の無人航空機の飛行状況","c":"飛行空域や周囲の地上又は水上の人又は物件の状況"},"answer":"a"},{"number":20,"question":"事故等の場合の措置として、正しいものを1つ選びなさい。","choices":{"a":"無人航空機に関する所定の事故が発生した場合には、当該無人航空機を飛行させる者は、直ちに当該無人航空機の飛行を中止すること。","b":"負傷者がいる場合には、危険を顧みず、負傷者の救助へ向かうこと。","c":"事故が発生した日時及び場所等の必要事項を詳細に記録し、所属上長に報告すること。"},"answer":"a"},{"number":21,"question":"特定飛行を行う際、あらかじめ国土交通大臣に通報すべき事項として、誤っているものを1つ選びなさい。","choices":{"a":"無人航空機の登録記号及び種類並びに型式","b":"無人航空機を飛行させる者の氏名並びに技能証明書番号及び飛行の許可・承認の番号","c":"飛行の予想経路、緯度及び経度"},"answer":"c"},{"number":22,"question":"特定飛行を行う者が飛行日誌に記載すべき事項のうち、飛行記録に関する情報として、正しいものを1つ選びなさい。","choices":{"a":"飛行の人数","b":"離着陸場所・時刻","c":"飛行時の光景"},"answer":"b"},{"number":23,"question":"航空法における違反行為と罰則として、誤っているものを1つ選びなさい。","choices":{"a":"事故が発生した場合に飛行を中止し負傷者を救護するなどの危険を防止するための措置を講じなかったときは、5年以下の懲役又は300万円以下の罰金に処せられる可能性がある。","b":"登録を受けていない無人航空機を飛行させたときは、1年以下の懲役又は50万円以下の罰金に処せられる可能性がある。","c":"アルコール又は薬物の影響下で無人航空機を飛行させたときは、1年以下の懲役又は30万円以下の罰金に処せられる可能性がある。"},"answer":"a"},{"number":24,"question":"カテゴリーIIB飛行を行う際に作成する飛行マニュアルに記載すべき事項として、正しいものを1つ選びなさい。","choices":{"a":"無人航空機の不定期的な点検及び整備に関する事項","b":"無人航空機を飛行させる者の技能の維持に関する事項","c":"当該無人航空機の飛行後の周辺確認に関する事項"},"answer":"b"},{"number":25,"question":"無人航空機操縦者技能証明制度の概要として、誤っているものを1つ選びなさい。","choices":{"a":"国が指定した民間試験機関（指定試験機関）による学科試験、実地試験及び身体検査により知識及び能力を判定し、これらの試験等に合格した場合には、国が技能証明を行う。","b":"技能証明は、カテゴリーIII飛行に必要な技能に係る一等無人航空機操縦士とカテゴリーII飛行に必要な技能に係る二等無人航空機操縦士の2つの資格に区分され、それぞれの資格において、無人航空機の種類（6種類）及び飛行の方法（3種類）について限定をすることとしている。","c":"パワードリフト機（Powered-lift）の飛行にあたっては、回転翼航空機（マルチローター）又は飛行機のどちらか一方の種類の限定に係る資格が必要となる。"},"answer":"c"},{"number":26,"question":"技能証明を受けた者の義務として、正しいものを1つ選びなさい。","choices":{"a":"技能証明を受けた者は、原則として、その限定をされた種類の無人航空機又は飛行の方法でなければ特定飛行及び一般飛行を行ってはならない。","b":"技能証明を行うにあたって、国土交通大臣は技能証明に係る身体状態に応じ、無人航空機を飛行させる際の必要な条件を付すことができることとしており、当該条件が付された技能証明を受けた者は、原則として、その条件の範囲内でなければ特定飛行を行ってはならない。","c":"技能証明を受けた者は、特定飛行を行う場合には、技能証明書の写しを携帯しなければならない。"},"answer":"b"},{"number":27,"question":"小型無人機の飛行禁止対象となる国の重要な施設等に含まれるものとして、誤っているものを1つ選びなさい。","choices":{"a":"国会議事堂","b":"内閣総理大臣官邸","c":"知的財産高等裁判所"},"answer":"c"},{"number":28,"question":"小型無人機の飛行禁止の対象となる空港として、正しいものを1つ選びなさい。","choices":{"a":"広島空港","b":"高知空港","c":"中部国際空港"},"answer":"c"},{"number":29,"question":"小型無人機等飛行禁止法の規定に違反した場合の措置等として、誤っているものを1つ選びなさい。","choices":{"a":"警察官等は、小型無人機等飛行禁止法の規定に違反して小型無人機等の飛行を行う者に対し、機器の退去その他の必要な措置をとることを命ずることができる。","b":"警察官等は、特段の制限なく、小型無人機等の飛行の妨害、破損その他の必要な措置をとることができる。","c":"対象施設の敷地・区域の上空（レッド・ゾーン）で小型無人機等の飛行を行った者及び警察官等の命令に違反した者は、1年以下の懲役又は50万円以下の罰金に処せられる可能性がある。"},"answer":"b"},{"number":30,"question":"免許又は登録を要しない無線局として、正しいものを1つ選びなさい。","choices":{"a":"ラジコン等に用いられる微弱無線局は、無線設備から500mの距離での電界強度（電波の強さ）が50μV/m以下のものとして、周波数などが総務省告示で定められている。","b":"微弱無線局は、無線局免許や無線従事者資格が不要であり、主に、産業用の害虫駆除ラジコンヘリ等で用いられている。","c":"空中線電力が1W以下で、特定の用途に使用される一定の技術基準が定められた無線局については、免許又は登録が不要である。"},"answer":"c"},{"number":31,"question":"無人航空機の種類と特徴として、誤っているものを1つ選びなさい。","choices":{"a":"回転翼航空機（マルチローター）及び回転翼航空機（ヘリコプター）は、垂直離着陸や空中でのホバリングが可能という特徴がある。","b":"飛行機は、垂直離着陸やホバリングはできないが、回転翼航空機に比べ、飛行速度が速く、エネルギー効率が高いため、長距離・長時間の飛行が可能という特徴がある。","c":"回転翼航空機のように垂直離着陸が可能で、巡行中は飛行機のように前進飛行が可能となる、両方の特徴を組み合わせたミックスドリフト機（mixed-lift）もある。"},"answer":"c"},{"number":32,"question":"大型飛行機（最大離陸重量25kg以上）の特徴として、正しいものを1つ選びなさい。","choices":{"a":"事故発生時の影響が大きいことから、操縦者の運航への習熟度及び安全運航意識が十分に高いことが要求される。","b":"機体の慣性力が小さいことから、増速・減速・上昇・降下などに要する時間と距離が長くなるため、障害物回避には特に注意が必要である。","c":"緊急着陸地点の選定は、小型機と同様の範囲が必要となる。また、一般に小型の機体よりも騒音が大きくなるため、飛行ルート周囲への配慮が必要である。"},"answer":"a"},{"number":33,"question":"回転翼航空機（マルチローター）の特徴として、誤っているものを1つ選びなさい。","choices":{"a":"機体に備わる全てのローターを回転させ回転数を増加させていくと、機体内積載物以上の揚力を得たときに上昇し始める。","b":"機体重量と揚力が釣り合い、対地高度が安定した状態を継続するとホバリングとなる。","c":"ホバリング状態からローター回転数を下げると降下する。"},"answer":"a"},{"number":34,"question":"夜間飛行と昼間（日中）飛行の違いとして、正しいものを1つ選びなさい。","choices":{"a":"航空法では、原則として、無人航空機は日出から日没までの間において飛行させることになっていて、これ以外の夜間（日没から日出までの間）に飛行させる場合は承認が必要である。","b":"夜間飛行では地形や人工物等の障害物が視認できないため、離着陸地点や計画的に用意する緊急着陸地点、飛行経路中の回避すべき障害も視認できるように対空照明を当てる。","c":"機体に搭載されたビジョンセンサーが夜間に対応していない場合は、常に衝突回避・姿勢安定などの安全機能が使用できない。"},"answer":"a"},{"number":35,"question":"目視外飛行において、補助者を配置しない場合に追加する必要のある装備として、誤っているものを1つ選びなさい。","choices":{"a":"機体の針路、姿勢、高度、速度及び周辺の気象状況等を把握できる操縦装置","b":"計画上の飛行経路と飛行中の機体の位置の差を把握できる操縦装置","c":"地上にいる管制官と絶えず連絡を取ることが可能な操縦装置"},"answer":"c"},{"number":36,"question":"揚力発生の特徴として、正しいものを1つ選びなさい。","choices":{"a":"流れる空気の中に翼のような流線形をした物体が置かれると物体には空気力が作用するが、流れと垂直方向に作用する力を揚力、流れの方向に働く力を抗力とよぶ。","b":"一般に迎角が増すと揚力は減少し、抗力は増加する。","c":"翼の断面形状が上面の湾曲が下面より小さな翼型は、効率よく揚力を発生できるので翼型やローター断面に利用される。"},"answer":"a"},{"number":37,"question":"回転翼航空機（ヘリコプター）及び回転翼航空機（マルチローター）のホバリング時における機体重量が400kgである場合において、推力は何kgとなるか。","choices":{"a":"40kg","b":"400kg","c":"4,000kg"},"answer":"b"},{"number":38,"question":"飛行機の揚力・回転翼航空機の推力について、正しいものを1つ選びなさい。","choices":{"a":"高度が1,000m増加すると、空気密度は約0.1倍になる。","b":"ペイロードが搭載されるなどして飛行機の機体重量が2倍になると、0.5倍の揚力が必要となり、高度などの他の条件が同じであれば、約1.4倍の機体速度が必要である。","c":"飛行機には最低飛行速度（失速速度）が存在する。"},"answer":"c"},{"number":39,"question":"フライトコントロールシステムを構成する一般的なデバイスについて、誤っているものを1つ選びなさい。","choices":{"a":"操作の指令を機体へ送信する、又は機体情報を受信するデバイスを送信機という。","b":"送信機の情報を受け取る受信機又は送受信機をレシーバーという。","c":"回転角速度を測定するデバイスをターミナルセンサという。"},"answer":"c"},{"number":40,"question":"無人航空機の主たる構成要素として、正しいものを1つ選びなさい。","choices":{"a":"電動の無人航空機においてローターを駆動するモーターには、ブラシモーターとブラシレスモーターがあり、ブラシモーターの特徴は、メンテナンスが容易、静音、長寿命であることが挙げられる。","b":"ローターは通常回転方向（時計回転（CW：クロックワイズ）／反時計回転（CCW：カウンタークロックワイズ）に合わせた形状となっており、モーターの回転方向に合わせて取り付けるよう注意が必要である。","c":"モーターの回転数はESC（エレクトロニックスピードコントローラー）により制御されており、モーターで駆動されたローターの回転出力を増減させることにより揚力や推力を変化させている。"},"answer":"b"},{"number":41,"question":"機体の動力源について、誤っているものを1つ選びなさい。","choices":{"a":"無人航空機の機体の動力源としては、主に電動機かエンジンが使用されている。","b":"電動機には、振動、騒音が少ないため周囲を気にせず飛行できるというメリットがあるが、飛行時間が短いというデメリットがある。","c":"エンジン機には、飛行時間が長く長距離飛行が可能であるというメリットがあるが、エンジンによる騒音が電動に比べ大きいというデメリットがある。"},"answer":"b"},{"number":42,"question":"複数のセルで構成されたリチウムポリマーバッテリーの取扱上の注意として、正しいものを1つ選びなさい。","choices":{"a":"セル間の充電量のバランスを補正しながら充電することが重要である。","b":"バランスが著しく崩れたまま充電を行うとセル間の電圧差が生じ、セルによって過充電となる現象が起こり、急速に劣化が進む。","c":"セル間の充電量のバランスをとるバランスコネクタがついているタイプは、充電時にそのコネクタを充電器から取り外すことが重要である。"},"answer":"a"},{"number":43,"question":"機体又はバッテリーの故障及び事故の分析として、誤っているものを1つ選びなさい。","choices":{"a":"無人航空機の事故や故障の原因調査は、機体や飛行の安全性を向上させる重要な要素なので、フライトデータを記録することが推奨される。","b":"冬季の飛行では飛行時間が半減することがある。","c":"リチウムポリマーバッテリーは低密度なエネルギーを大容量で出力できるが、バッテリー残量が減り、電圧低下してくると急激に出力が弱くなり、墜落の原因となるので注意する。"},"answer":"c"},{"number":44,"question":"フレネルゾーンについて、正しいものを1つ選びなさい。","choices":{"a":"フレネルゾーン内に壁や建物などの障害物があると、受信電界強度が確保されず通信エラーが起こり、障害物がない状態に比べて通信距離が長くなる。","b":"フレネルゾーンの半径は周波数が高く（波長が短く）又はお互いの距離が短くなればなるほど大きくなる。","c":"地面も障害物となるため、フレネルゾーンの半径を考慮してアンテナの高さを十分に確保する必要がある。"},"answer":"c"},{"number":45,"question":"電波の特性に伴って発生する運航上のトラブルの調査・分析として、誤っているものを1つ選びなさい。","choices":{"a":"外来電波や他の設備・機器からのノイズにより無線設備の通信環境が不安定になることがある。","b":"電波環境の調査として、マイクロスコープを用いて、使用している周波数と同じ電波が現地エリアで使用されている状況や、他の設備・機器からノイズが発生していないかを確認する方法がある。","c":"様々な無線局が散在する市街地での飛行のためには、電波環境の調査は非常に重要である。"},"answer":"b"},{"number":46,"question":"GNSS（Global Navigation Satellite System）とRTK（Real Time Kinematic）の精度について、正しいものを1つ選びなさい。","choices":{"a":"GPS（Global Positioning System）測位での受信機1台の単独測位は、数百mの精度である。","b":"単独測位の方式として右岸局と左岸局の2つの受信機を使用するRTKやDGPS（Differential Global Positioning System）などの技術が確立されている。","c":"RTKやDGPS等の測位方式は、数cm～数mレベルの精度の高い測位が可能である。"},"answer":"c"},{"number":47,"question":"リチウムポリマーバッテリーの廃棄方法や、エンジン機における整備・点検として、誤っているものを1つ選びなさい。","choices":{"a":"無人航空機の運航で生じる廃棄物は、所属団体が定めた独自のルールに従って廃棄しなければならない。","b":"事業で用いたリチウムポリマーバッテリーを廃棄する場合は、法律に則り「産業廃棄物」として廃棄する。","c":"エンジン機においては、飛行前後以外に一定の期間又は一定の総飛行時間毎に、機体メーカーが定めた整備項目を整備手順に従って実施する。"},"answer":"a"},{"number":48,"question":"運航者がプロセスごとに行うべき点検項目として、正しいものを1つ選びなさい。","choices":{"a":"飛行前の準備では、必要な容器の携帯又は携行について点検する。","b":"飛行前の準備では、運航管理者や補助者等の配置・役割・訓練状況について点検する。","c":"飛行前の準備では、飛行計画の策定及び通報について点検する。"},"answer":"c"},{"number":49,"question":"運航者がプロセスごとに行うべき点検項目として、誤っているものを1つ選びなさい。","choices":{"a":"飛行後の点検では、機体にゴミ等の付着はないかを確認する。","b":"飛行後の点検では、機体（プロペラ、フレーム等）に損傷やゆがみはないかを確認する。","c":"飛行後の点検では、機体やバッテリー等を安全な状態で適切な場所に保管したかを確認する。"},"answer":"c"},{"number":50,"question":"損害賠償能力の確保について、正しいものを1つ選びなさい。","choices":{"a":"国土交通省においては、加入している保険の確認など無人航空機を飛行させる者が賠償能力を有することの確認を、許可・承認の審査の際に行っている。","b":"機体保険は、機体が見つからなくても必ず保険が適用される。","c":"損害賠償責任保険は、無人航空機を運航したことによっておこる損害に対する保険であり、対物保険のみが存在する。"},"answer":"a"},{"number":51,"question":"ホバリングについて、誤っているものを1つ選びなさい。","choices":{"a":"ホバリング状態の機体は回転翼から発せられる揚力と、重力のバランスが保たれている状態を維持している。","b":"回転翼航空機（マルチローター）には飛行時に高い安定性を確保するために方位センサ、地磁気センサやGNSS受信機、気圧センサが用いられている。","c":"緊急時にはセンサ類に頼らない半自動操作によるホバリングも要求される。"},"answer":"c"},{"number":52,"question":"回転翼航空機（ヘリコプター）の離陸方法として、正しいものを1つ選びなさい。","choices":{"a":"十分にローター回転が上昇してから、離陸すること。ローター回転が低い状態で無理に離陸させると、機体の損耗が激しくなることがあり、危険である。","b":"テールローターの作用で、離陸時に機体が左右いずれかに傾く場合がある。傾く方向はローターの回転方向により異なる。予め傾く方向を確認した上で、離陸させること。","c":"ローター半径より高い地点の高度では、地面効果の影響が顕著となり、機体が不安定になる。離陸後は速やかに地面効果外まで機体を上昇させること。"},"answer":"b"},{"number":53,"question":"無人航空機の操縦方法として、誤っているものを1つ選びなさい。","choices":{"a":"無人航空機は優れた安定性と高い飛行性能から、人による手動操縦だけでなく、アプリケーションなどにより事前に設定した飛行経路を正確に飛行することが可能となっている。","b":"飛行自体は手動で飛行し、機体に付属している撮影用カメラなどのみ自動で操作するような複合的な操縦も行える。","c":"空中写真測量などによる飛行では、測地エリアを指定するのみで自動的に飛行経路や撮影地点をプランニングする機能も備えられている。"},"answer":"b"},{"number":54,"question":"手動操縦におけるヒューマンエラーの傾向として、正しいものを1つ選びなさい。","choices":{"a":"手動操縦において、操縦者が意図しない方向に飛行してしまうことは、操縦者の視線と回転翼航空機の正面方向が異なる場合に発生しやすい。","b":"機体と操縦者との距離が近づきすぎると、機体付近の障害物などとの距離差が掴みにくくなり接触しやすい状況となる。","c":"手動操縦におけるリスク回避には、機体をあらゆる方向に向けても確実に意図した方向や高度に制御できる訓練や、任意の距離での着陸訓練などが有効となる。"},"answer":"a"},{"number":55,"question":"カテゴリーIII飛行の際に緊急対応が求められた場合に備えて行われる訓練に際し、考慮すべき項目の例として、誤っているものを1つ選びなさい。","choices":{"a":"GNSS（Global Navigation Satellite System）による位置の緊急安定機能を用いた飛行訓練","b":"機体寸法に応じた緊急着陸地点の確保","c":"フェールセーフ機能が動作しない飛行距離等の把握"},"answer":"a"},{"number":56,"question":"安全な運航のための補助者の必要性、役割及び配置として、正しいものを1つ選びなさい。","choices":{"a":"無人航空機を飛行させる操縦者は機体の動きや操縦に集中する必要があり、離着陸エリアを含めた飛行経路の管理を操縦と同時に行うことが困難であるため、飛行準備や飛行経路の安全管理、第三者の立入管理などは、操縦者の手が空き次第、補助者と共に行う必要がある。","b":"補助者は、離着陸場所や飛行経路周辺の地上や空域の安全確認を行うほか、飛行前の事前確認で明らかになった障害物等の対処について、独断と経験則に従い作業を行う。","c":"操縦者とのコミュニケーションは予め決められた手段を用いて行い、危険予知の警告や緊急着陸地点への誘導、着陸後の機体回収や安全点検の補助も行う。"},"answer":"c"},{"number":57,"question":"飛行計画策定時の確認事項として、誤っているものを1つ選びなさい。","choices":{"a":"着陸予定地点に着陸できないときに、離陸地点まで戻るほどの飛行可能距離が確保できないなどのリスクがある場合、別途事前に緊急着陸地点を確保しておくべきである。","b":"飛行計画の全ての工程において安全管理が優先され、離陸前、離陸時、計画経路の飛行、着陸時、着陸後の状況に応じた安全対策を講じ、飛行の目的を果たす飛行計画の策定が求められる。","c":"飛行計画策定時は、機体の突発的障害や飛行物特有の現象、飛行準備面での規制、事前に予想しうる状況の変化などを想定した確認事項の作成が求められる。"},"answer":"c"},{"number":58,"question":"無人航空機の運航におけるハザードとリスクとして、誤っているものを1つ選びなさい。","choices":{"a":"無人航空機の運航において、「ハザード」は事故等につながる可能性のある危険要素（潜在的なものを含む。）をいう。","b":"「リスク」は無人航空機の運航の安全に影響を与える何らかの事象が発生する可能性をいう。","c":"発生事象のリスクは、実際に起こる頻度（被害の発生頻度）と結果の最大予見性（被害の最大の大きさ）により計量する。"},"answer":"c"},{"number":59,"question":"カテゴリーIII飛行におけるリスク軽減策を記載した飛行マニュアルに記載する事項として、誤っているものを1つ選びなさい。","choices":{"a":"機体の点検・整備の方法","b":"機体の点検・整備の記録の作成方法","c":"整備の予定・実施順序の明確化"},"answer":"c"},{"number":60,"question":"セマンティックモデルについて、正しいものを1つ選びなさい。","choices":{"a":"機体や外部システムの異常・外乱の影響で想定飛行空間を外れて飛行してしまうことに備える空間として「想定外飛行空間」を設定する。","b":"無人航空機の運航が正常に制御できている正常運航時は、レギュラー手順に従って飛行を行う。","c":"機体や外部システムの異常・外乱の影響で想定飛行空間から外れてしまうおそれ、又は外れてしまった異常事態では、直ちに「イレギュラー手順」へと移る。"},"answer":"a"},{"number":61,"question":"リスク評価手法として、誤っているものを1つ選びなさい。","choices":{"a":"Step3における「戦略的対策」とは、飛行前に航空機との遭遇確率やリスクにさらされている時間を低減するための法定の対策であり、特定の時間帯や特定の境界内での飛行などが挙げられる。","b":"Step3における「戦略的対策」の対義語である「戦術的対策」とは、飛行中に航空機との衝突を回避するための対策であり、残留する空中リスククラスに応じて対策の要求レベルとロバスト性のレベルが割り当てられる。","c":"Step4では、SAILに基づき、「運航に関わる安全目標（OSO）」とその安全目標に対するロバスト性が決定される。"},"answer":"a"},{"number":62,"question":"天気図における「風」の説明として、正しいものを1つ選びなさい。","choices":{"a":"風が吹いてくる方向に矢が突き出しており、観測では8方位を用いているが、予報では16方位又は36方位で表す。","b":"矢羽根の数が風力（気象庁風力階級表による風力の尺度）を表す。","c":"風力0～20までの21段階で表す。"},"answer":"b"},{"number":63,"question":"春と秋の天気や前線として、誤っているものを1つ選びなさい。","choices":{"a":"日本の天気を支配するのは冬のオホーツク高気圧と夏の揚子江高気圧であり、春と秋は両高気圧の勢力が入れ替わるときである。","b":"春と秋は日本付近に両気団の境界ができ、前線が停滞し、広い範囲に悪い天気をもたらし、1週間くらい雨が降り続き、低い雲高や視程障害をもたらす。","c":"温度や湿度の異なる気団（空気の塊）が出会った場合、二つの気団はすぐには混ざらないで境界ができる。境界が地表と接するところを前線という。"},"answer":"a"},{"number":64,"question":"風向と風速について、正しいものを1つ選びなさい。","choices":{"a":"風向は、風が吹いてくる方向で、例えば、北の風とは北から南に向かって吹く風をいう。","b":"風向は360度を12等分し、北から時計回りに北→北北東→北東→東北東→東のように表す。","c":"風速は空気の動く早さで、メートル毎時（m/h）で表す。"},"answer":"a"},{"number":65,"question":"ダウンバーストについて、誤っているものを1つ選びなさい。","choices":{"a":"ダウンバーストとは、積乱雲や積雲内に発生する強烈な下降流が地表にぶつかり、水平方向にドーナツ状に渦を巻きながら四方に広がってゆく状態をいう。","b":"マイクロバーストと呼ばれるものは、直径が4km程度以上の下降流で、範囲は大きく下降流はダウンバーストより強烈なものがある。","c":"マイクロバーストの発生時間は数分から10分程度のものが多く、通常の観測網では探知されない局地的なものである。"},"answer":"b"},{"number":66,"question":"飛行機におけるリスク軽減策を踏まえた運航の計画の立案の例として、正しいものを1つ選びなさい。","choices":{"a":"離着陸地点は操縦者及び補助者と20m以上離れることを推奨する。","b":"離着陸地点は滑走範囲も考慮して周囲の物件から50m以上離すことができる場所を選定する。","c":"着陸は、失速することがないように、中速度で滑走路に確実に進入させ、安全に接地させる。"},"answer":"a"},{"number":67,"question":"回転翼航空機（ヘリコプター）におけるリスク軽減策を踏まえた運航の計画の立案の例として、誤っているものを1つ選びなさい。","choices":{"a":"降下させる場合、ボルテックス・リング・ステートに入ることを予防するため、取扱説明書等で指定された降下率範囲及び降下方法で飛行させる。","b":"飛行中断に備え、飛行経路上又はその近傍に緊急着陸地点を事前に3か所以上選定する。","c":"オートローテーション機能を装備した機体を運航する場合、機能が発揮できる条件を運航の計画に考慮する。"},"answer":"b"},{"number":68,"question":"大型機（最大離陸重量25kg以上）の使用機体と飛行計画を元にしたリスク軽減策の検討要素の例として、正しいものを1つ選びなさい。","choices":{"a":"飛行速度に応じた障害物回避に必要なコストや設備を事前に把握する。","b":"最も効率の良い緊急着陸地点を選定する。","c":"離着陸地点及び飛行経路周辺の騒音問題対応を検討する。"},"answer":"c"},{"number":69,"question":"夜間飛行におけるリスク軽減策を踏まえた運航の計画の立案の例として、誤っているものを1つ選びなさい。","choices":{"a":"夜間飛行においては、目視外飛行は実施せず、機体の向きを視認できる灯火等が装備できる機体を使用し、機体の灯火が容易に認識できる範囲の飛行に限定する。","b":"飛行高度と同じ高度に第三者が存在しない状況でのみ飛行を実施する。","c":"離着陸を予定している場所、回避すべき障害物、緊急着陸予定地点を照明の設置等により明確にするとともに、機体が視認できるようにする。"},"answer":"b"},{"number":70,"question":"補助者を配置しない場合における、目視外飛行のリスク軽減を図るための対策と提案（追加事項）として、正しいものを1つ選びなさい。","choices":{"a":"無人機の運航を妨げない飛行範囲を設定する。","b":"平常時の連絡先と、運航目的・目標をあらかじめ設定する。","c":"立入管理区画を設定した場合、第三者が立ち入らないための方策及び周知方法を設定する。"},"answer":"c"}],"3":[{"number":1,"question":"無人航空機の操縦者の役割と責任として、正しいものを1つ選びなさい。","choices":{"a":"レクリエーション目的で飛行する場合には、安全に飛行するためのルールに関する情報、リソース、ツールを入手する必要はない。","b":"航空機と無人航空機との間で飛行の進路が交差し、又は接近する場合には、無人航空機の航行の安全を確保するため、航空機側が回避する行動をとること。","c":"飛行させる場所ごとのルールや遵守事項に従い、一般社会通念上のマナーを守るとともに、モラルのある飛行を行うこと。"},"answer":"c"},{"number":2,"question":"飛行計画の作成について、誤っているものを1つ選びなさい。","choices":{"a":"無人航空機の性能、操縦者や補助者の経験や能力などを考慮して無理のない計画を立てる。","b":"近所を飛行するときや飛行経験のある場所を飛行する場合は、必ずしも計画を立てる必要はない。","c":"何かあった場合の対策を考えておく（緊急着陸地点や安全にホバリング・旋回ができる場所の設定等）。"},"answer":"b"},{"number":3,"question":"服装や体調管理に対する注意として、正しいものを1つ選びなさい。","choices":{"a":"ヘルメットや保護メガネなどの保護具は、操縦の妨げとなるため着用しない。","b":"体調が悪い場合は、注意力が散漫になり、判断力が低下するなど事故の原因となる。","c":"睡眠不足や疲労が蓄積している場合には、いつもより慎重に操縦するなど体調管理に努める。"},"answer":"b"},{"number":4,"question":"飛行後の注意や事故が起きた時の対応として、誤っているものを1つ選びなさい。","choices":{"a":"特定飛行に該当しない飛行の場合、飛行日誌には記載しないことが望ましい。","b":"飛行日誌の作成に当たり、リスクに対する対応が不十分と感じた場合は、今後の飛行に備えた記録も行うことが望ましい。","c":"事故を起こした場合、慌てず落ち着いて、ケガの有無や、ケガの程度など、人の安全確認を第一に行う。"},"answer":"a"},{"number":5,"question":"航空法における定義として、正しいものを1つ選びなさい。","choices":{"a":"気球やロケットなどは、航空機や無人航空機には該当しない。","b":"紙飛行機であっても、構造によっては無人航空機に該当することがある。","c":"無人航空機の定義における「重量」には、バッテリー以外の取り外し可能な付属品の重量も含まれる。"},"answer":"a"},{"number":6,"question":"規制対象となる飛行の方法に該当するものとして、誤っているものを1つ選びなさい。","choices":{"a":"祭礼、縁日、展示会など多数の者の集合する催しが行われている場所の上空での飛行","b":"爆発物など危険物の輸送","c":"無人航空機への物件の持ち込み"},"answer":"c"},{"number":7,"question":"無人航空機の飛行に関する規制概要として、正しいものを1つ選びなさい。","choices":{"a":"機体認証のための検査は、登録検査機関が実施し、機体認証の有効期間は、第一種は1年、第二種は3年である。","b":"技能証明のための試験は、指定試験機関が実施し、技能証明の有効期間は、一等及び二等ともに5年である。","c":"特定飛行の安全を確保するためには、無人航空機の飛行形態のリスクにかかわらず、一律の基準で①使用する機体、②操縦する者の技能及び③運航管理の方法の適格性を担保する必要がある。"},"answer":"a"},{"number":8,"question":"無人航空機の操縦者が航空機の運航ルールを理解する必要性として、誤っているものを1つ選びなさい。","choices":{"a":"無人航空機の操縦者には、飛行前に航行中の航空機を確認した場合には信号を送るなどして航空機と無人航空機の接近を事前に回避することが求められている。","b":"無人航空機の操縦者には、飛行中に航行中の航空機を確認した場合には無人航空機を地上に降下させることその他適当な方法を講じることが求められている。","c":"航空機と同じ空を飛行させる無人航空機の操縦者も、航空機の運航ルールを十分に理解することが極めて重要である。"},"answer":"a"},{"number":9,"question":"航空機の空域の概要として、正しいものを1つ選びなさい。","choices":{"a":"無人航空機は、高度150m以上又は空港周辺の空域の飛行は原則禁止されているが、これは他の無人航空機の空域との分離を図ることにより、安全を確保するためである。","b":"無人航空機が禁止空域を飛行する場合には、当該空域を飛行する航空機の機長と調整し、支障の有無を確認したうえで飛行の許可を受ける必要がある。","c":"無人航空機の操縦者は、航空機の空域の特徴や注意点を十分に理解して慎重に飛行し、航空交通管制機関等の指示等を遵守する必要がある。"},"answer":"c"},{"number":10,"question":"無人航空機登録制度の目的として、誤っているものを1つ選びなさい。","choices":{"a":"事故発生時などにおける所有者への罰則強化","b":"事故の原因究明など安全確保上必要な措置の実施","c":"安全上問題のある機体の登録を拒否し、安全を確保すること"},"answer":"a"},{"number":11,"question":"リモートID機能の搭載が免除される場合として、正しいものを1つ選びなさい。","choices":{"a":"無人航空機の登録制度の施行前（2022年6月19日）までの事前登録期間中に更新及び廃止手続きを行った無人航空機","b":"あらかじめ国に届け出た特定区域（リモートID特定区域）の上空で行う飛行であって、無人航空機の飛行を監視するための指定管理監督者の配置、区域の範囲の明示などの必要な措置を講じた上で行う飛行","c":"十分な強度を有する紐など（長さが30m以内のもの）により係留して行う飛行"},"answer":"c"},{"number":12,"question":"規制対象となる飛行の空域や方法として、誤っているものを1つ選びなさい。","choices":{"a":"「人口集中地区（DID：Densely Inhabited District）」は、5年毎に実施される国勢調査の結果から一定の基準により設定される地域であり、本書刊行時点では、令和2年の国勢調査の結果に基づく人口集中地区が適用されている。","b":"無人航空機の操縦者は、昼間（日中。日出から日没までの間）における飛行が原則とされ、それ以外の飛行の方法（夜間飛行）は、航空法に基づく規制の対象となる。","c":"「昼間（日中）」とは、気象庁が発表する日の出の時刻から日の入りの時刻までの間を指す。"},"answer":"c"},{"number":13,"question":"教則に規定されている「車両等」に該当するものを1つ選びなさい。","choices":{"a":"電線","b":"街灯","c":"建設機械"},"answer":"c"},{"number":14,"question":"催し場所上空における飛行について、誤っているものを1つ選びなさい。","choices":{"a":"無人航空機の操縦者は、多数の者の集合する催しが行われている場所の上空における飛行が原則禁止されている。","b":"「多数の者の集合する催し」とは、無作為に抽出したサンプルの中から、適当な場所や日時に開催されるもののうち、多数の者が集まるものを指す。","c":"「多数の者の集合する催し」の該当の有無については、集合する者の人数や規模だけでなく、特定の場所や日時に開催されるかどうかによって総合的に判断される。"},"answer":"b"},{"number":15,"question":"教則に規定されている「多数の者の集合する催し」に該当するものを1つ選びなさい。","choices":{"a":"屋外で開催されるコンサート","b":"関係者のみが参加する催し場所上空","c":"サイクリング"},"answer":"a"},{"number":16,"question":"教則に規定されている「危険物」に該当するものを1つ選びなさい。","choices":{"a":"超音波発信機","b":"引火性液体","c":"ICプレーヤー"},"answer":"b"},{"number":17,"question":"航空法の規制対象となる飛行の空域及び方法の例外として、正しいものを1つ選びなさい。","choices":{"a":"国や地方公共団体が、事故、災害等に際し、捜索又は救助を目的として無人航空機を飛行させる場合には、特例として飛行の空域及び方法の規制が適用されることとなる。","b":"災害時の対応であっても、国や地方公共団体にかかわらない独自の活動にあっては、特例の対象とはならない。","c":"地表又は水面から150m以上の高さの空域に関しては、航空機の空域と分離する観点から、原則として飛行が認められている。"},"answer":"b"},{"number":18,"question":"無人航空機の操縦者等の義務として、誤っているものを1つ選びなさい。","choices":{"a":"アルコール又は薬物の影響により当該無人航空機の正常な飛行ができないおそれがある間において飛行させないこと。","b":"「アルコール」とはアルコール飲料のみを指し、「薬物」とは麻薬や覚せい剤等の規制薬物のみを指す。","c":"体内に保有するアルコール濃度の程度にかかわらず体内にアルコールを保有する状態では無人航空機の飛行を行ってはならない。"},"answer":"b"},{"number":19,"question":"飛行前に確認すべき事項として、正しいものを1つ選びなさい。","choices":{"a":"航空法その他の法令等の必要な手続き等の状況","b":"緊急管理空域・飛行自由化要請空域の該当の有無","c":"立入禁止措置・安全猶予措置等の準備状況"},"answer":"a"},{"number":20,"question":"国土交通大臣の報告等を要する無人航空機に関する事故として、誤っているものを1つ選びなさい。","choices":{"a":"人の死傷に関しては、全治30日以上の通院を要するもの以上を対象とする。","b":"物件の損壊に関しては第三者の所有物を対象とするが、その損傷の規模や損害額を問わず全ての損傷を対象とする。","c":"航空機との衝突又は接触に関しては、航空機又は無人航空機のいずれか又は両方に損傷が確認できるものを対象とする。"},"answer":"a"},{"number":21,"question":"特定飛行を行う際、あらかじめ国土交通大臣に通報すべき事項として、正しいものを1つ選びなさい。","choices":{"a":"飛行させる飛行可能空域及び飛行の方法","b":"出発地、目的地、目的地に到着するまでの所要時間","c":"立入制限猶予措置の有無及びその内容"},"answer":"b"},{"number":22,"question":"特定飛行を行う者が飛行日誌に記載すべき事項のうち、飛行記録に関する情報として、誤っているものを1つ選びなさい。","choices":{"a":"飛行の年月日","b":"飛行させた者の氏名","c":"状態の維持方法"},"answer":"c"},{"number":23,"question":"航空法における違反行為と罰則として、正しいものを1つ選びなさい。","choices":{"a":"登録記号の表示又はリモートIDの搭載をせずに飛行させたときは、100万円以下の罰金に処せられる可能性がある。","b":"規制対象となる飛行の区域又は方法に違反して飛行させたときは、1年以下の懲役又は50万円以下の罰金に処せられる可能性がある。","c":"飛行前の確認をせずに飛行させたときは、50万円以下の罰金に処せられる可能性がある。"},"answer":"c"},{"number":24,"question":"カテゴリーIIB飛行を行う際に作成する飛行マニュアルに記載すべき事項として、誤っているものを1つ選びなさい。","choices":{"a":"無人航空機の飛行に係る安全管理体制に関する事項","b":"事故等が発生した場合における連絡体制の整備等に関する事項","c":"カテゴリーIIB飛行の定義に関する事項"},"answer":"c"},{"number":25,"question":"次のうち、技能証明の申請をすることができないものを1つ選びなさい。","choices":{"a":"17歳の未成年者","b":"航空法の規定に基づき技能証明を拒否された日から半年が経過した者","c":"航空法の規定に基づき技能証明を取り消された日から3年が経過した者"},"answer":"b"},{"number":26,"question":"技能証明の取消し又は1年以内の技能証明の効力の停止を受けることがある場合として、誤っているものを1つ選びなさい。","choices":{"a":"親族や関係者が、アルコールや大麻、覚せい剤等の中毒者であることが判明したとき","b":"技能証明を受けた者が航空法等に違反する行為をしたとき","c":"技能証明を受けた者が無人航空機の飛行に当たり非行又は重大な過失があったとき"},"answer":"a"},{"number":27,"question":"小型無人機の飛行禁止対象となる国の重要な施設等に含まれるものとして、正しいものを1つ選びなさい。","choices":{"a":"避暑地の別荘","b":"危機管理行政機関の庁舎","c":"圧力団体の事務所"},"answer":"b"},{"number":28,"question":"小型無人機の飛行禁止の対象となる空港として、誤っているものを1つ選びなさい。","choices":{"a":"八丈島空港","b":"東京国際空港","c":"関西国際空港"},"answer":"a"},{"number":29,"question":"電波法の制度概要及び無人航空機に用いられる無線設備として、正しいものを1つ選びなさい。","choices":{"a":"無人航空機においては、その操縦や画像伝送のために電波を受信するのみの特殊な無線設備が利用されている。","b":"無線設備を日本国内で使用する場合には、電波法令に基づき、国内の技術基準に合致した無線設備を使用し、必ず総務大臣の免許や登録を受け、無線局を開設する必要がある。","c":"無線制度の詳細については、総務省電波利用ホームページ等で確認することが望ましい。"},"answer":"c"},{"number":30,"question":"アマチュア無線局について、誤っているものを1つ選びなさい。","choices":{"a":"無人航空機にアマチュア無線を用いる場合は、アマチュア無線技士の資格及びアマチュア無線局免許が必要である。","b":"アマチュア無線とは、金銭上の利益のためでなく、専ら個人的な興味により行う自己訓練、通信及び技術研究のための無線通信である。","c":"地方公共団体の職員を除き、アマチュア無線を使用した無人航空機を、利益を目的とした仕事などの業務に利用することはできない。"},"answer":"c"},{"number":31,"question":"飛行機の特徴として、正しいものを1つ選びなさい。","choices":{"a":"一般に、安全に飛行できる最高速度が決められており、それを超えての高速飛行ができない。","b":"水平離着陸には広いエリアが必要であり、高度な操縦技能と飛行制御技術が必要である。","c":"仮に故障などによって飛行中に推力を失っても無風状態になれば、すぐには墜落しない。"},"answer":"b"},{"number":32,"question":"回転翼航空機（ヘリコプター）の特徴として、誤っているものを1つ選びなさい。","choices":{"a":"垂直離着陸、ホバリング、低速飛行が可能であるが、これには大きなエネルギー消費がともない、風の影響を受けやすい。","b":"回転翼航空機（マルチローター）に比べローターの直径が小さいため、空力的に効率良く揚力を得る事が出来る。","c":"ローターの回転面を傾けたり、ローターピッチ角を変えたりするために必要な機構（スワッシュプレート等）や、ローターの反トルクを打ち消したり、向き（ヨー方向）を変える操縦に用いたりするテールローターが必要であり、構造的に複雑となっている。"},"answer":"b"},{"number":33,"question":"回転翼航空機（マルチローター）の特徴として、正しいものを1つ選びなさい。","choices":{"a":"機体の前後左右移動は、その指示した側のローターの回転数を上げ、反対側のローター回転数を下げることで機体が傾き、ローター推力の合力が、指示した方向に傾くので、傾いた方向に機体が移動する。","b":"ローターの反トルクバランスを崩すと機体の水平回転が始まる。","c":"揚力を得ている状態で、右もしくは左回転を指示すると、指示した回転方向のローターの回転数が上がり、トルクバランスが崩れ回転が始まる。"},"answer":"b"},{"number":34,"question":"夜間飛行及び目視外飛行として、誤っているものを1つ選びなさい。","choices":{"a":"夜間飛行のための必須装備として、無人航空機の姿勢及び方向が正確に視認できる灯火を有することが、常に求められる。","b":"目視外飛行では機体の状況や、障害物、他の航空機等の周囲の状況を直接肉眼で確認することができないので、機体に設置されたカメラや機体の位置、速度、異常等の状態を把握することが必要である。","c":"目視外飛行では、周囲の安全を確認する補助者が配置された場合に必要な装備がある。なお補助者を配置しない場合は、追加される装備がある。"},"answer":"a"},{"number":35,"question":"無人航空機の飛行原理として、正しいものを1つ選びなさい。","choices":{"a":"無人航空機が飛行するためには、重力に対抗する上向きの力を必要とする。","b":"飛行機には飛行速度と逆向きに空気抵抗である弾力が働くが、それに抗するために回転翼であるプロペラ等による剛力が必要である。","c":"回転翼航空機（ヘリコプター）及び回転翼航空機（マルチローター）においては、重力に対抗する上向きの力はプロペラ（ローター）による揚力によって生み出される。"},"answer":"a"},{"number":36,"question":"揚力発生の特徴として、誤っているものを1つ選びなさい。","choices":{"a":"あまり大きな迎角にすると、流れは翼の表面から剥離し、揚力は減じ、抗力が増大し、失速を招く。","b":"プロペラは、4枚以上のブレードとよばれる翼が回転して推力を発生する。","c":"プロペラの回転にはトルクが必要であり、プロペラを回転させる原動機には反トルクが作用する。"},"answer":"b"},{"number":37,"question":"飛行機が、飛行速度35m/s、バンク角30°で定常旋回した時の旋回半径として、正しいものを1つ選びなさい。ただし、重力加速度は9.8m/s²、tan30°=0.58とする。","choices":{"a":"215m","b":"225m","c":"235m"},"answer":"a"},{"number":38,"question":"フライトコントロールシステムの基礎として、誤っているものを1つ選びなさい。","choices":{"a":"フライトコントロールシステムは、搭載されている各種センサ（GNSS、ジャイロ、加速度、方位、高度等）からの情報や送信機から発信された情報を処理し、機体を制御するための信号を送るシステムである。","b":"センサ類は、キャリブレーションを必要とするものが多いため、各機体で指定された方法で、キャリブレーションが正しく行われているかを3時間に1度の頻度で注意する必要がある。","c":"フライトコントロールシステムを構成する一般的なデバイスには、ジャイロセンサや加速度センサなどがある。"},"answer":"b"},{"number":39,"question":"バッテリーに関する用語として、正しいものを1つ選びなさい。","choices":{"a":"電圧は、電池残量（現時点で放電できる電気量）で決まる。電池の残量が減ると電池の電圧は上がる。","b":"放電（飛行）中の電圧降下は、バッテリーの内部抵抗によって決まる。","c":"出力を一定に維持しようとする場合、電池残量が少なくなると、放電時電圧が上昇するため、必要となる電流は増大する。"},"answer":"b"},{"number":40,"question":"送信機について、誤っているものを1つ選びなさい。","choices":{"a":"無人航空機への指令は送信機から機体へ送られる。","b":"無人航空機の機体では、受信機が指令を受け取り、モーター又はサーボからメインコントローラーを駆動させ機体を操縦している。","c":"送信機の信号は、同じ周波数帯の電波が同時かつ複数使用されているような場所では複数の電波が干渉して混信による誤作動が起きる可能性がある。"},"answer":"b"},{"number":41,"question":"リチウムポリマーバッテリーの特徴として、正しいものを1つ選びなさい。","choices":{"a":"エネルギー密度が高い。","b":"電圧が低い。","c":"自己放電が多い。"},"answer":"a"},{"number":42,"question":"エンジンについて、誤っているものを1つ選びなさい。","choices":{"a":"エンジン機は、エンジンの回転を動力にローター又はプロペラを回転させ揚力と推力を得ている。","b":"エンジンには3ストロークエンジン、6ストロークエンジン、グリューランスエンジン等の種類がある。","c":"燃料にオイル等を混ぜた混合燃料を使用する場合は、指定された混合比での使用が必要である。"},"answer":"b"},{"number":43,"question":"電波の特性として、正しいものを1つ選びなさい。","choices":{"a":"2.4GHzの電波は回折しやすく直進性が低いため、障害物の影響を受けにくくなる。","b":"常に反射の法則（入射角と反射角の大きさは等しい）が成り立つ。","c":"電波は、周波数が高い（波長が短い）ほど、より障害物を回り込むことができるようになる。"},"answer":"b"},{"number":44,"question":"無人航空機の運航において使用されている電波の周波数帯・用途として、誤っているものを1つ選びなさい。","choices":{"a":"無人航空機の運航において使用されている主な電波の周波数帯は、2.4GHz帯、5.7GHz帯、920MHz帯、73MHz帯、169MHz帯である。","b":"169MHz帯は、主に2.4GHz帯及び5.7GHz帯の無人移動体画像伝送システムの無線局のバックアップ回線として使用される。","c":"電波の周波数帯や出力、使用するアンテナの特性、変調方式、伝送速度などによって通信可能な距離が変動することはない。"},"answer":"c"},{"number":45,"question":"送受信アンテナ間距離：200m、使用周波数：3.0GHzのときのフレネルゾーンの半径として、正しいものを1つ選びなさい。ただし、光の速度は3×10⁸m/sとする。","choices":{"a":"1.23m","b":"2.23m","c":"3.23m"},"answer":"b"},{"number":46,"question":"GNSSを使用した飛行における注意事項として、誤っているものを1つ選びなさい。","choices":{"a":"自動操縦のためにあらかじめ地図上で設定したWay PointはGNSS（Global Navigation Satellite System）の測位精度の影響を受けにくいため、精度が悪化した場合は実際の飛行経路の誤差が大きくなる。","b":"GNSSの測位精度に影響を及ぼすものとしては、GNSS衛星の時計の精度、捕捉しているGNSS衛星の数、障害物などによるマルチパス、受信環境のノイズなどが挙げられる。","c":"一般的に位置精度は、水平方向に比べ高度方向の誤差が大きくなる。"},"answer":"a"},{"number":47,"question":"操縦者の義務として、正しいものを1つ選びなさい。","choices":{"a":"航空法においては、無人航空機を安全に飛行させるため、操縦者に対して様々な義務を課しているが、その中に根本的なルールは含まれていない。","b":"カテゴリーIII飛行を行う場合には、操縦者は一等無人航空機操縦士の技能証明の取得が必要である。","c":"カテゴリーIII飛行の運航の管理が適切に行われることについて、国土交通大臣の許可・承認を受ける必要があるが、運航管理体制の構築に当たっては、操縦者がリスクの高い飛行を行うことについて無人航空機を飛行させる者としての責任を自覚し、運航の補助的な役割を果たさなければならない。"},"answer":"b"},{"number":48,"question":"運航者がプロセスごとに行うべき点検項目として、誤っているものを1つ選びなさい。","choices":{"a":"飛行前の点検では、各機器は緩く取り付けられているかについて確認する。","b":"飛行前の点検では、発動機やモーターに異音はないかについて確認する。","c":"飛行前の点検では、機体（プロペラ、フレーム等）に損傷やゆがみはないかについて確認する。"},"answer":"a"},{"number":49,"question":"運航時の点検及び確認事項として、正しいものを1つ選びなさい。","choices":{"a":"ガソリンは危険物に該当するため、乗用車等で運搬する場合には、消防法で定められた22ℓ以下の専用の容器で運搬しなければならない。","b":"モーター駆動の場合には機体の振動が大きいため、ネジ類の緩みなどを特に注意して点検する必要がある。","c":"投下場所に補助者を配置しない場合、物件投下を行う際の高度は原則1m以上2m以内である必要がある。"},"answer":"a"},{"number":50,"question":"無人航空機に係るセキュリティ確保として、誤っているものを1つ選びなさい。","choices":{"a":"無人航空機は、それ自体の財産的な価値を狙った盗難の他、犯罪やプライバシー侵害等の目的で悪用することを意図した運航の妨害や、ホークアイの奪取の危険がある。","b":"無人航空機が悪用された場合、第三者に被害が及ぶことが懸念されることから、無人航空機の所有者及び操縦者は、このような危険から当該無人航空機を守るため、セキュリティの確保に取り組まなければならない。","c":"無人航空機のセキュリティ対策として、例えば当該無人航空機及びその遠隔操縦のための機器を適切に管理することで、盗難等を防止することが望ましい。"},"answer":"a"},{"number":51,"question":"回転翼航空機（マルチローター）の降下について、正しいものを1つ選びなさい。","choices":{"a":"機体を降下させるには、スロットル操作を徐々に弱め揚力を減少させる。","b":"機体を垂直降下させる時に、吹きおろした空気が再び吸い込まれ、回転翼の上下で空気の再循環が発生し急激に重力を失う現象「ボルテックス・リング・ステート」が発生する。","c":"降下の際は傾斜方向の移動を合わせて操作することで、墜落防止対策となる。"},"answer":"a"},{"number":52,"question":"回転翼航空機（ヘリコプター）の着陸方法として、誤っているものを1つ選びなさい。","choices":{"a":"地面に近づくにつれ、降下速度を遅くし、着陸による衝撃を抑えること。","b":"地面効果範囲内のホバリングは避け、速やかに着陸させること。","c":"接地後、ローターが再始動するまで、機体に近づかないこと。"},"answer":"c"},{"number":53,"question":"手動操縦・自動操縦の特徴とメリットとして、正しいものを1つ選びなさい。","choices":{"a":"手動操縦は送信機の附属無線機により機体の移動を命令して行う。","b":"手動操縦は、操縦者の操縦技量によって飛行の安定性に差が生じるが、操縦技量が向上すると自動操縦に匹敵するような複雑で変化に対応した機体の操作が行える。","c":"手動操縦では、無人航空機の安定飛行に必要なGNSS（Global Navigation Satellite System）受信機やセンサを用いた機体を、コントロールースティックで意図した方向に飛行させるが、その制御は全て人が行う。"},"answer":"c"},{"number":54,"question":"自動操縦と手動操縦の切り替えにおける操作上の注意と対応として、誤っているものを1つ選びなさい。","choices":{"a":"自動操縦中、干渉指令により手動操作に切り替える場合がある。","b":"自動操縦中、何らかの原因で不安定な飛行と判断した場合に、手動操作に切り替える場合がある。","c":"自動操縦から手動操縦に切り替えた後は、急な飛行速度の低下や失速に備えた操作準備や、障害物への接近を避けるための機体方向の確認、ホバリングしての機体の安定性や周囲の安全の確認などが必要となる。"},"answer":"a"},{"number":55,"question":"カテゴリーIII飛行の際に緊急対応が求められた場合に備えて行われる訓練に際し、考慮すべき項目の例として、正しいものを1つ選びなさい。","choices":{"a":"緊急着陸時の安全優先順位の明確化","b":"機体が発火した際の消火方法","c":"常用連絡網の作成"},"answer":"b"},{"number":56,"question":"安全に配慮した飛行として、誤っているものを1つ選びなさい。","choices":{"a":"無人航空機の飛行にあたっては、法令等に基づく基準や要件に適合させるのは当然だが、様々な要素により、飛行中、操縦が困難になること、又は予期せぬ機体故障等が発生する場合があることから、運航者は、運航上の「リスク」をゼロにすることが安全確保上非常に重要である。","b":"運航者は行おうとする運航の形態に応じ、事故等につながりかねない危険性のある要素（ハザード）を具体的に可能な限り多く特定し、それによって生じる「リスク」を評価したうえで、「リスク」の発生確率を低減させたり、「リスク」の結果となる被害を軽減したりする措置を講じることで、「リスク」を許容可能な程度まで低減する必要がある。","c":"リスク管理の考え方は、特にカテゴリーIII飛行において重要となるが、その他の飛行においても十分に理解したうえで、安全に配慮した計画や飛行を行うことが求められる。"},"answer":"a"},{"number":57,"question":"事故・インシデントへの対応として、正しいものを1つ選びなさい。","choices":{"a":"無人航空機の運航中に万が一事故やインシデントが発生した場合を想定し、事前に負傷者搬送先を定義しておく。","b":"負傷者や第三者物件への物損が発生した場合は、直ちに当該無人航空機の飛行を中止するとともに、人命救助を最優先に行動し、消防署や警察に連絡するなど危険を防止するための必要な措置を講じなければならない。","c":"負傷者や第三者物件への物損が発生した場合は、「無人航空機の事故及び重大インシデントの報告要領」に従って、速やかに国際ドローン庁長官に事故等の報告をしなければならない。"},"answer":"b"},{"number":58,"question":"無人航空機の運航リスクの評価として、誤っているものを1つ選びなさい。","choices":{"a":"無人航空機の飛行にあたって、リスク軽減策の検討とその結果に基づくリスク評価の検討は安全確保上非常に重要である。","b":"運航形態に応じ、事故等につながりかねない具体的な「ハザード」を可能な限り多く特定し、それによって生じる「リスク」を評価したうえで、リスクを許容可能な程度まで低減する。","c":"リスクを低減するためには、①事象の発生確率を低減するか、②事象発生による被害を軽減するか、の両方を検討したうえで必要な対策をとる。"},"answer":"a"},{"number":59,"question":"カテゴリーIII飛行におけるリスク軽減策を記載した飛行マニュアルに記載する事項として、正しいものを1つ選びなさい。","choices":{"a":"無人航空機を飛行させる者の身体的特徴に関する事項","b":"知識及び能力を習得するための訓練方法","c":"知識及び能力を継承させるための訓練方法"},"answer":"b"},{"number":60,"question":"セマンティックモデルについて、誤っているものを1つ選びなさい。","choices":{"a":"異常対応手順により想定飛行空間へと復旧するのに必要な飛行空間を想定外飛行空間として確保する。","b":"想定飛行空間と想定外飛行空間を合わせたものが「オペレーション空間」であり、その空間から万一外れてしまった緊急事態では、直ちに「緊急時対応手順」と「緊急時対応計画」を実行する。","c":"飛行の離着陸リスクを検討する際には、オペレーション空間からさらに安全マージンとしての「離着陸リスク緩衝地域」を合わせた範囲を検討し、そのリスクを一定の範囲まで低減するように計画する。"},"answer":"c"},{"number":61,"question":"リスク評価手法として、正しいものを1つ選びなさい。","choices":{"a":"Step5では、オペレーション空間に隣接するエリアについても評価し、そのリスクが高い場合には、他の隣接エリアに緊急避難場所を設定する。","b":"Step6では、これまでのステップで評価されたリスクに対する要求事項を十分満足することを確認し、各対策や安全目標を達成するため、リスク評価結果に基づき飛行マニュアルを作成する。","c":"Step6において、リスク評価の結果必要とされる対策や安全目標を達成することができない場合は、運航計画（CONOPS）を破棄して初めから作り直す。"},"answer":"b"},{"number":62,"question":"天気図の見方として、誤っているものを1つ選びなさい。","choices":{"a":"気温は、天気記号の右上の数字で、摂氏の度数を表す。","b":"大気の圧力を気圧といい、単位はヘクトパスカル（hPa）で標準大気圧（1気圧）は、1013hPaである。","c":"気圧の等しい点を結んだ線を等圧線という。"},"answer":"a"},{"number":63,"question":"前線について、正しいものを1つ選びなさい。","choices":{"a":"寒冷前線は、発達した鱗雲により、突風や雷を伴い短時間で断続的に強い雨を降らせる。","b":"寒冷前線が接近してくると南から南西よりの風が通過後は風向きが急変し、西から北東よりの風に変わり、気温が下がる。","c":"温暖前線が近づくと、層状の厚い雲が段々と広がり、気温、湿度は次第に高くなり、時には雷雨を伴うときもあるが、弱い雨が絶え間なく降る。"},"answer":"c"},{"number":64,"question":"風速について、誤っているものを1つ選びなさい。","choices":{"a":"風は必ずしも一定の強さで吹いているわけではなく、単に風速と言えば、観測時の前30分間における平均風速のことをいう。","b":"平均風速の最大値を最大風速、瞬間風速の最大値を最大瞬間風速という。","c":"風は地面の摩擦を受けるため、一般的に上空では強く、地表に近づくにつれて弱くなる。"},"answer":"a"},{"number":65,"question":"気象に関する注意事項として、正しいものを1つ選びなさい。","choices":{"a":"気温の低い場合はバッテリーの持続時間（飛行可能時間）が普段より短くなる可能性があるため注意が必要である。","b":"地表面が暖められると上昇気流が発生するため、広い面積のパラボラアンテナやアスファルト・コンクリートの地面が多い市街地は注意が必要である。","c":"広い運動場のような場所では、強い日射により上昇気流がおこりダウンバーストが発生する可能性がある。"},"answer":"a"},{"number":66,"question":"飛行機におけるリスク軽減策を踏まえた運航の計画の立案の例として、誤っているものを1つ選びなさい。","choices":{"a":"上昇させる場合は、取扱説明書等で指定された上昇角度以内で飛行させる。","b":"旋回させる場合は、取扱説明書等で指定された旋回面積以内で飛行させる。","c":"降下させる場合は、取扱説明書等で指定された降下速度以内で飛行させる。"},"answer":"b"},{"number":67,"question":"回転翼航空機（マルチローター）の使用機体と飛行計画を元にしたリスク軽減策の検討要素の例として、正しいものを1つ選びなさい。","choices":{"a":"飛行経路において人や物件との必要な安全距離を確保する。","b":"緊急着陸地点の措置指定方法を飛行前に検討する。","c":"自動帰還時の湿度を障害物等が回避できる安全な水準に設定する。"},"answer":"a"},{"number":68,"question":"大型機におけるリスク軽減策を踏まえた運航の計画の立案の例として、誤っているものを1つ選びなさい。","choices":{"a":"障害物回避など機体の進行方向を変える場合は、時間的、距離的な余裕を十分に考慮した飛行経路及び飛行速度を設定する。","b":"緊急着陸地点は、無人の場所を選定する。","c":"離着陸地点を含む飛行経路近隣エリアへの事前説明、調整を計画する。"},"answer":"b"},{"number":69,"question":"目視外飛行で補助者を配置する場合に、無人航空機に装備すべき機能として正しいものを1つ選びなさい。","choices":{"a":"自動操縦システムを装備し、機体に設置した自動レーダー等により機体の外の様子が監視できる。","b":"地上において、無人航空機の位置及び異常の有無を把握できる。","c":"不具合発生時にオートストップ機能が正常に作動する。"},"answer":"b"},{"number":70,"question":"補助者を配置する場合の目視外飛行における、リスク軽減策を踏まえた運航の計画の立案の例として、誤っているものを1つ選びなさい。","choices":{"a":"飛行経路全体が見渡せる位置に飛行状況及び周囲の気象状況の変化等を常に監視できる双眼鏡等を有する補助者を配置し、操縦者へ必要な助言を行うこと。","b":"操縦者が安全に着陸できる場所を確認し、補助者へ適切な助言を行うことができること。","c":"補助者にも機体の特性を理解させておくこと。"},"answer":"b"}],"4":[{"number":1,"question":"無人航空機の操縦者の役割と責任として、誤っているものを1つ選びなさい。","choices":{"a":"安全のために、法令やルールを遵守すること。","b":"飛行に際しては、粉塵の発生に注意をすること。","c":"自然を侮らず、謙虚な気持ちで、無理をしない。"},"answer":"b"},{"number":2,"question":"飛行計画の作成・現地調査として、正しいものを1つ選びなさい。","choices":{"a":"計画は、ドローン情報基盤システム（飛行計画通報機能）に事前に通報する。ただし、あらかじめ通報することが困難な場合には事後に通報してもよい。","b":"現地調査の際、満潮や干潮の時刻等を確認する。","c":"現地調査の際、標高（海抜高度）、障害物の位置、目標物等を確認する必要はない。"},"answer":"a"},{"number":3,"question":"安全な飛行の確保として、誤っているものを1つ選びなさい。","choices":{"a":"アルコール等の摂取に関する注意事項を守る。","b":"特定飛行を行う際には、許可書又は承認書の原本又は写し、技能証明書、飛行日誌を最寄りの事業所に保管する。","c":"飛行中は気象の変化に注意し、天候が悪化しそうになれば、飛行途中でもただちに帰還させるか、又は緊急着陸するなど、安全を第一に判断する。"},"answer":"b"},{"number":4,"question":"事故が起きた時の対応として、正しいものを1つ選びなさい。","choices":{"a":"機体が墜落した場合には、地上又は水上における交通への支障やバッテリーの発火等により周囲に危険を及ぼすことがないよう、電源を切るなど速やかに措置を講ずる。","b":"事故記録改ざん防止のために、飛行ログ等の記録は極力残さない。","c":"無人航空機の飛行による人の死傷事案が発生した場合には、事故の内容に応じ、直ちに警察署、消防署、その他必要な機関等へ連絡するとともに、都道府県知事に報告する。"},"answer":"a"},{"number":5,"question":"航空法における定義や無人航空機の登録として、誤っているものを1つ選びなさい。","choices":{"a":"重量が100g未満のものは、無人航空機ではなく、「模型航空機」に分類される。","b":"小型無人機等飛行禁止法において規制対象となる「小型無人機」については大きさや重さにかかわらず対象となり、100g未満のものも含まれる。","c":"全ての無人航空機（重量が100g未満のものを含む。）は、国の登録を受けたものでなければ、原則として航空の用に供することができない。"},"answer":"c"},{"number":6,"question":"次の記述のうち、正しいものを1つ選びなさい。","choices":{"a":"社会生活基本調査の結果を受け設定されている人口集中地区の上空は、規制対象となる飛行の空域に該当する。","b":"規制対象となる飛行の空域における飛行又は規制対象となる飛行の方法による飛行のいずれかに該当する飛行を「非標準飛行」という。","c":"規制対象となる飛行の空域における飛行は、航空機の航行の安全への影響や地上及び水上の人及び物件への危害を及ぼすおそれがあることから原則として禁止されている。"},"answer":"c"},{"number":7,"question":"特定飛行を行う場合の航空法上の手続き等として、誤っているものを1つ選びなさい。","choices":{"a":"カテゴリーIIB飛行に関しては、技能証明を受けた者が機体認証を受けた無人航空機を飛行させる場合には、特段の手続き等なく飛行可能である。","b":"カテゴリーIIB飛行の場合、安全確保措置として、事故時の損害賠償案を作成し、万が一事故が発生した場合にはこれを遵守しなければならない。","c":"カテゴリーIIA飛行に関しては、技能証明を受けた者が機体認証を受けた無人航空機を飛行させる場合であっても、あらかじめ運航管理の方法について国土交通大臣の審査を受け、飛行の許可・承認を受けることにより可能となる。"},"answer":"b"},{"number":8,"question":"計器飛行方式及び有視界飛行方式として、正しいものを1つ選びなさい。","choices":{"a":"有視界飛行方式（VFR）は、航空交通管制機関が与える指示等に常時従って行う飛行の方式である。","b":"高速で高高度を移動する旅客機は、常に計器飛行方式（IFR）で飛行する。","c":"有視界飛行方式（VFR）は、計器飛行方式（IFR）以外の飛行の方式とされ、航空機の操縦者の判断に基づき飛行する方式である。"},"answer":"c"},{"number":9,"question":"航空機の管制区域として、誤っているものを1つ選びなさい。","choices":{"a":"国は、航空交通の安全及び秩序を確保するため、航空交通管制業務を実施する区域（管制区域）を設定している。","b":"航空交通管制区は、地表又は水面から150m以上の高さの空域のうち国が指定した空域であり、この空域を計器飛行方式により飛行する航空機は航空交通管制機関と常時連絡を取り、飛行の方法等についての指示に従って飛行を行わなければならない。","c":"航空交通管制圏は、航空機の離着陸が頻繁に実施される空港等及びその周辺の空域であり、全ての航空機が航空交通管制機関と連絡を取り、飛行の方法等の指示に従って飛行を行わなければならない。"},"answer":"b"},{"number":10,"question":"無人航空機登録制度の概要として、正しいものを1つ選びなさい。","choices":{"a":"全ての無人航空機（重量が100g未満の模型航空機は除く。）は、国の登録を受けたものでなければ、原則として航空の用に供することができない。","b":"登録の有効期間は1年以上3年未満である。","c":"登録記号を表示し、全ての航空機にリモートID機能を備えなければならない。"},"answer":"a"},{"number":11,"question":"リモートID機能として、誤っているものを1つ選びなさい。","choices":{"a":"機体への物理的な登録記号の表示に加え、識別情報を電波で遠隔発信するリモートID機能を事務所に備えなければならない。","b":"警察庁、都道府県警察又は海上保安庁が警備その他の特に秘匿を必要とする業務のために行う飛行の場合、リモートID機能の搭載が免除される。","c":"リモートID機能は、識別情報を電波で遠隔発信するためのものであり、当該機器は技術規格書に準拠して開発・製造される。"},"answer":"a"},{"number":12,"question":"規制対象となる飛行の方法として、正しいものを1つ選びなさい。","choices":{"a":"無人航空機の操縦者は、当該無人航空機及びその周囲の状況を目視により常時監視して飛行させることが原則とされ、それ以外の飛行の方法（目視外飛行）は、航空法に基づく規制の対象となる。","b":"「目視により常時監視」とは、飛行させる者が自分の目で見ることを指し、双眼鏡やモニター（FPV（First Person View）を含む。）による監視や補助者による監視は含まれない（眼鏡やコンタクトレンズの使用は「目視に準ずるもの」に含まれる）。","c":"無人航空機の操縦者は、当該無人航空機と地上又は水上の人又は物件との間に30m以上の距離（無人航空機と人又は物件との間の実測曲線距離）を保って飛行させることが原則とされ、それ以外の飛行の方法は、航空法に基づく規制の対象となる。"},"answer":"a"},{"number":13,"question":"教則に規定されている「工作物」に該当しないものを1つ選びなさい。","choices":{"a":"倉庫","b":"鉄道車両","c":"橋梁"},"answer":"b"},{"number":14,"question":"教則に規定されている「多数の者の集合する催し」に該当するものを1つ選びなさい。","choices":{"a":"祭礼","b":"信号待ちによる人混み","c":"友人同士で行うフットサル"},"answer":"a"},{"number":15,"question":"教則に規定されている「多数の者の集合する催し」に該当しないものを1つ選びなさい。","choices":{"a":"町内会の盆踊り大会","b":"デモ（示威行為）","c":"自己啓発セミナー"},"answer":"c"},{"number":16,"question":"教則に規定されている「危険物」に該当するものを1つ選びなさい。","choices":{"a":"毒物類","b":"液晶画面","c":"盗聴器発見機"},"answer":"a"},{"number":17,"question":"航空法の規制対象となる飛行の空域及び方法の例外として、誤っているものを1つ選びなさい。","choices":{"a":"煙突や鉄塔などの高層の構造物の周辺は、高度150m以上の空域であっても、当該構造物から30m以内の区域については、無人航空機の飛行禁止空域から除外されている。","b":"煙突や鉄塔などの高層の構造物から30m以内の空域における飛行の場合、当該構造物の関係者による飛行を除き、飛行の方法に関する手続き等が必要となる。","c":"十分な強度を有する紐等（30m以下）で係留し、飛行可能な範囲内への第三者の立入管理等の措置を講じて無人航空機を飛行させる場合は、人口集中地区、夜間飛行、目視外飛行、第三者から30m以内の飛行及び物件投下に係る手続き等が必要である。"},"answer":"c"},{"number":18,"question":"飛行前の確認事項として、正しいものを1つ選びなさい。","choices":{"a":"内部点検及び定期点検による無人航空機の状況の確認","b":"無人航空機を着陸させる空域及びその周囲の水路の確認","c":"飛行に必要な気象情報の確認"},"answer":"c"},{"number":19,"question":"航空機又は他の無人航空機との衝突防止のための注意事項として、誤っているものを1つ選びなさい。","choices":{"a":"飛行前において、航行中の航空機を確認した場合には、飛行を行わないこと。","b":"飛行中の他の無人航空機を確認した場合には、飛行日時、飛行経路、飛行高度等について、他の無人航空機を飛行させる者と交渉し、進路を譲ってもらうこと。","c":"飛行中において、航行中の航空機を確認した場合には、地上に降下させるなど、接近又は衝突を回避するための適切な措置を取ること。"},"answer":"b"},{"number":20,"question":"重大インシデントの報告として、正しいものを1つ選びなさい。","choices":{"a":"事故が発生するおそれがあると認める事態（重大インシデント）が発生した場合、国土交通大臣への報告は義務付けられていない。","b":"重大インシデントの対象としては、飛行中航空機との衝突又は接触のおそれがあったと認めた事態、重傷に至らない無人航空機による人の負傷等が含まれる。","c":"無人航空機の制御が不能となった事態及び無人航空機が発火した事態（飛行前及び飛行中に発生したものに限る。）は、重大インシデントに含まれる。"},"answer":"b"},{"number":21,"question":"飛行日誌の携行及び記載として、誤っているものを1つ選びなさい。","choices":{"a":"無人航空機を飛行させる者は、特定飛行をする場合には、飛行日誌を携行（携帯）することが義務付けられる。","b":"飛行日誌は、紙又は電子データ（システム管理を含む。）の形態を問わないが、特定飛行を行う場合には、紙に出力したものを参照する必要がある。","c":"特定飛行に該当しない無人航空機の飛行を行う場合であっても、飛行日誌に記載することが望ましい。"},"answer":"b"},{"number":22,"question":"特定飛行を行う者が飛行日誌に記載すべき事項のうち、日常点検記録に関する情報として、正しいものを1つ選びなさい。","choices":{"a":"日常点検の実施の年月日・場所","b":"実施者の経験年数","c":"日常点検の過程"},"answer":"a"},{"number":23,"question":"航空法における違反行為と罰則として、誤っているものを1つ選びなさい。","choices":{"a":"航空機又は他の無人航空機との衝突防止をしなかったときは、6か月以下の禁錮に処せられる可能性がある。","b":"他人に迷惑を及ぼす飛行を行ったときは、50万円以下の罰金に処せられる可能性がある。","c":"機体認証で指定された使用の条件の範囲を超えて特定飛行をおこなったときは、50万円以下の罰金に処せられる可能性がある。"},"answer":"a"},{"number":24,"question":"無人航空機の運航管理体制として、正しいものを1つ選びなさい。","choices":{"a":"カテゴリーII飛行のうち、カテゴリーIIB飛行については、技能証明を受けた操縦者が機体認証を受けた無人航空機を飛行させる場合には、特段の手続きなく飛行可能である。","b":"カテゴリーII飛行のうち、カテゴリーIIA飛行については、技能証明を受けた操縦者が機体認証を受けた無人航空機を飛行させる場合であっても、あらかじめ「運航管理の方法」について国土交通大臣の審査を受け、飛行の届出を行う必要がある。","c":"カテゴリーIII飛行を行う場合には、一等又は二等無人航空機操縦士の技能証明を受けた操縦者が第一種又は第二種機体認証を受けた無人航空機を飛行させることが求められることに加え、あらかじめ「運航管理の方法」について国土交通大臣の審査を受け、飛行の許可・承認を受ける必要がある。"},"answer":"a"},{"number":25,"question":"技能証明試験に合格した場合であっても、技能証明を拒否又は保留することができる者として、誤っているものを1つ選びなさい。","choices":{"a":"てんかんや認知症等の無人航空機の飛行に支障を及ぼすおそれがある病気にかかっている者","b":"アルコールや大麻、覚せい剤等の中毒者","c":"航空法等に違反する行為をするおそれがある者"},"answer":"c"},{"number":26,"question":"小型無人機等飛行禁止法の制度概要として、正しいものを1つ選びなさい。","choices":{"a":"国会議事堂などの重要施設に対する危険を完全に防除するための法律である。","b":"国政の中枢機能等、良好な国際関係、我が国を防衛するための基盤並びに国民生活及び農耕作活動の基盤の維持並びに公共の安全の確保に資するために制定された。","c":"重要施設及びその周囲おおむね300mの周辺地域の上空における小型無人機等の飛行を禁止する法律である。"},"answer":"c"},{"number":27,"question":"小型無人機の飛行禁止の対象となる重要施設として、誤っているものを1つ選びなさい。","choices":{"a":"旅券発行機関","b":"防衛関係施設","c":"原子力事業所"},"answer":"a"},{"number":28,"question":"小型無人機の飛行禁止の対象となる空港として、誤っているものを1つ選びなさい。","choices":{"a":"大阪国際空港","b":"成田国際空港","c":"札幌空港"},"answer":"c"},{"number":29,"question":"以下に挙げる周波数帯のうち、画像伝送用、データ伝送用にも利用されるものはどれか。","choices":{"a":"73MHz帯","b":"920MHz帯","c":"2.4GHz帯"},"answer":"c"},{"number":30,"question":"FPV無人航空機を用いる場合として、正しいものを1つ選びなさい。","choices":{"a":"アマチュア無線によるFPV無人航空機については、現在、無人航空機の操縦に2.4GHz帯の免許不要局を使用し、無人航空機からの画像伝送に5GHz帯のアマチュア無線局を使用する場合が多いが、5GHz帯のアマチュア無線は、周波数割当計画上、一次業務に割り当てられている。","b":"同一帯域を使用する他の一次業務の無線局の運用に妨害を与えないように運用しなければならない。","c":"5.7GHz帯では無人移動体画像伝送システムが用いられているほか、5.8GHz帯は、医療機器システムに割り当てられており、主としてCTスキャンやレントゲンに用いられているので、それら付近での使用は避ける等、運用の際には配慮が必要である。"},"answer":"b"},{"number":31,"question":"飛行機の特徴として、誤っているものを1つ選びなさい。","choices":{"a":"翼に揚力を発生させて自重を支えることができるのが特徴であるため比較的少ないエネルギーで飛行し、長距離飛行が可能になる。","b":"エレベーター（左右ロール方向）、エルロン（上下ピッチ方向）、ラダー（左右ヨー方向）、スロットル（推進パワー）の複合的な操縦で飛行する。","c":"離着陸には機体のサイズに合わせた滑走路が必要となる。"},"answer":"b"},{"number":32,"question":"回転翼航空機（ヘリコプター）の大型機（最大離陸重量25kg以上）の特徴として、正しいものを1つ選びなさい。","choices":{"a":"慣性力が大きく、操舵時の機体挙動が遅れ気味になる。","b":"定点で位置を維持するホバリングでは、ゆっくりと操舵することが必要となる。","c":"一般的に、小型の機体よりエンジン騒音は大きくなるが、ローター騒音は小さくなる。"},"answer":"a"},{"number":33,"question":"回転翼航空機（マルチローター）を操縦する際に、機体の動きを指示するために用いられる用語として、誤っているものを1つ選びなさい。","choices":{"a":"スロットルは、上昇・降下を意味する。","b":"エレベーターは、前後移動を意味する。","c":"エルロンは、機首方向の旋回を意味する。"},"answer":"c"},{"number":34,"question":"目視外飛行において、周囲の安全を確認する補助者が配置された場合に必要な装備として、正しいものを1つ選びなさい。","choices":{"a":"地上応答システム及び機体の内部の様子が監視できる機体","b":"搭載カメラや機体の高度、速度、位置、不具合状況等を地上で監視できる操縦装置","c":"不具合発生時に対応する衝突被害軽減機能"},"answer":"b"},{"number":35,"question":"無人航空機の飛行原理として、誤っているものを1つ選びなさい。","choices":{"a":"機体が運動すると、機体には飛行機と同様に抗力も作用するが、推力の大きさを重力以上にし、機体姿勢を変化させてこれに抗する。","b":"機体に働く力が釣り合ったとき、機体は速度と姿勢を一定とする定常飛行（釣り合い飛行）を行う。","c":"飛行中の航空機に流入する空気の機体に対する角度を仰角と俯角で表す。"},"answer":"c"},{"number":36,"question":"揚力発生の特徴として、正しいものを1つ選びなさい。","choices":{"a":"回転翼航空機（マルチローター）はプロペラからの反トルクを相殺するために、偶数個のプロペラを半数ずつ異なる向きに回転させるのが一般的である。","b":"回転翼航空機（マルチローター）は各プロペラの回転数を変化させ、推力を一定に保ったうえでトルクを変化させてピッチ、ロール、ヨーの運動を行う。","c":"回転翼航空機（ヘリコプター）はテールローターの反トルクをメインローターで相殺する。"},"answer":"a"},{"number":37,"question":"揚抗比30の無推力の定常滑空飛行状態における高度200mからの滑空距離として、正しいものを1つ選びなさい。","choices":{"a":"60m","b":"600m","c":"6,000m"},"answer":"c"},{"number":38,"question":"無人航空機の飛行に用いられる各種センサの原理及び使用環境として、正しいものを1つ選びなさい。","choices":{"a":"ジャイロセンサは、単位時間当たりの回転間隔の変化を検出する装置であり、これにより、風などで機体が傾いたときに、無人航空機の傾きや向きの変化を検出し、フライトコントロールシステムに情報を伝える。","b":"加速度センサは2次元の慣性運動（直行2軸方向の並進運動）を検出する装置であり、無人航空機の速度の変化量を検出するセンサである。","c":"地磁気センサは、地球の磁力を検出して方位を測定する。"},"answer":"c"},{"number":39,"question":"バッテリーに関する用語として、誤っているものを1つ選びなさい。","choices":{"a":"満充電から、電圧が決められた最低電圧（終止電圧）になるまでの間に、利用できる電気量を容量という。","b":"放電時の電流の大きさや温度によって、利用可能な容量は変化する。","c":"満充電で放電できる電気量と現時点で放電できる電気量の比率をエネルギー容量比率という。"},"answer":"c"},{"number":40,"question":"送信機について、正しいものを1つ選びなさい。","choices":{"a":"電波混信の予防として、飛行させる前に測定器などで周辺の電波の状態を確認することが望ましい。","b":"電波混信は、無人航空機で使用される送信機からの電波だけでなく、無線LANやWi-Fi、高圧送電線の影響を受ける場合もあるため、無人航空機の飛行時には極力周囲の電波を切っておくことが好ましい。","c":"無人航空機は、送信機及び受信機のスティックを操作して、機体の重心を中心とする3軸の回転やローターの推力の増減といった機体の動きの制御を行う。"},"answer":"a"},{"number":41,"question":"リチウムポリマーバッテリーの特徴として、誤っているものを1つ選びなさい。","choices":{"a":"メモリ効果（継ぎ足し充電などで浅い充放電を行った場合に、見かけ放電容量が減少する現象）が小さい。","b":"電解質が可燃物である。","c":"電解質が完全な液体である。"},"answer":"c"},{"number":42,"question":"物件投下のために装備される機器として、正しいものを1つ選びなさい。","choices":{"a":"無人航空機で物件投下する機器には、人員等を機体から落下させる装置や人工雪噴霧のために液体や粒剤を散布する装置などがある。","b":"物件投下装置は、とある高度に達するまでは物件が落下しない構造となっている。","c":"搭載方法や投下手順が定められているため、物件投下装置の特性と機能を熟知しなければならない。"},"answer":"c"},{"number":43,"question":"電波の特性として、誤っているものを1つ選びなさい。","choices":{"a":"電波は、5つ以上の波が重なると、強め合ったり、弱め合ったりする。","b":"電波は、進行距離の2乗に反比例する形で電力密度が減少する。","c":"周波数により特性は異なるものの、電波は水中では吸収されて大きく減衰される。"},"answer":"a"},{"number":44,"question":"無人航空機以外も含めた日本の電波の利用状況として、正しいものを1つ選びなさい。","choices":{"a":"電波の特性として、波長が長いほど直進性が弱く情報伝達容量が小さくなるが、減衰はしにくい。","b":"無人航空機の制御用通信に多く使用される極超短波は10cm～1mの波長で、超短波に比べて直進性が更に強くなるが、山や建物の陰には回り込んで伝わることができない。","c":"極超短波は伝送できる情報量が限られているが、小型のアンテナと送受信設備で通信できることから、幅広く利用される。"},"answer":"a"},{"number":45,"question":"地磁気方位について、誤っているものを1つ選びなさい。","choices":{"a":"地磁気センサにより、地球の磁気を検出することで機体の向き（方位）や姿勢を知ることができる。","b":"地磁気センサは正常な方位を計測しない場合がある。","c":"地磁気の検出には、酸素や二酸化炭素が影響を与える。"},"answer":"c"},{"number":46,"question":"電動機における整備・点検・保管・交換・廃棄について、正しいものを1つ選びなさい。","choices":{"a":"運航者（無人航空機を運航する者をいう。）は飛行前後だけではなく、無人航空機毎に定められた一定の期間や一定の総飛行時間ごとに整備点検を行う必要がある。","b":"運航者は所属団体が設定する整備内容を熟知し、任意のタイミングで整備等の整備を行う必要がある。","c":"リチウムポリマーバッテリーが膨らんでいる場合は、過充電などでバッテリー内部に可燃性ガスが発生している可能性があるため、3週間以内に交換を行う。"},"answer":"a"},{"number":47,"question":"安全運航のためのプロセスと点検項目として、誤っているものを1つ選びなさい。","choices":{"a":"飛行前の準備では、飛行に必要な許可・承認や機体登録等の有効期間が切れていないかのみを最終確認すればよい。","b":"飛行前の点検は必ず機体を飛行させる前に都度行うべき最終点検である。ここではバッテリーのチェックや機体の異常チェックなど、無人航空機が正常に飛行できることを最終確認する。","c":"飛行中の監視では、飛行中の機体の状態チェックや、飛行している機体の周囲の状況など、安全な飛行のためにチェックしなければならない項目を継続的に確認する。"},"answer":"a"},{"number":48,"question":"運航者がプロセスごとに行うべき点検項目として、正しいものを1つ選びなさい。","choices":{"a":"飛行前の点検では、通信系統、推進系統、電源系統及び自動制御系統は正常に作動するかを確認する。","b":"飛行前の点検では、製造番号が機体に表示されているかを確認する。","c":"飛行前の点検では、ニアプロID機能が正常に作動しているかを確認する。"},"answer":"a"},{"number":49,"question":"飛行申請について、誤っているものを1つ選びなさい。","choices":{"a":"航空法においては、一定のリスクのある無人航空機の飛行については、そのリスクに応じた安全を確保するための措置を講じることや、国土交通大臣から許可又は承認を取得した上で行うことを求めている。","b":"カテゴリーII飛行については、当該申請に係る飛行開始予定日の30開庁日前までに申請書を所定の提出先に提出する必要がある。","c":"カテゴリーIII飛行を行う場合には、一等無人航空機操縦士の技能証明を受けた者が第一種機体認証を受けた無人航空機を飛行させることに加えて、その運航の管理が適切に行われることについて、国土交通大臣から許可又は承認を取得する必要がある。"},"answer":"b"},{"number":50,"question":"無人航空機に係るセキュリティ確保として、正しいものを1つ選びなさい。","choices":{"a":"無人航空機にはプログラムに基づき自動又は自律で飛行するものも多くあり、そのようなものは、プログラムを不正に書き換えられる等により、当該無人航空機が奪取されたり操縦者の意図に反して悪用されたりする可能性がない。","b":"航空法に基づく機体認証・型式認証に係る安全基準は、無人航空機に係るサイバーセキュリティの観点からの適性が証明されることも求めている。","c":"認証を受けた機体は一定のサイバーセキュリティ対策がされていることから、機体認証・型式認証を受けた機体を利用することで、リスクの無効化を図ることができる。"},"answer":"b"},{"number":51,"quest
