ion":"回転翼航空機（マルチローター）が離着陸時に特に注意すべき事項として、誤っているものを1つ選びなさい。","choices":{"a":"降下を継続し着陸を行う際には、対地高度に応じて降下速度を減少させる。","b":"着地直前にコントローラーでローターの回転を停止させる。","c":"緊急時にはGNSS受信装置による機体位置推定機能を使用しない機体操作が求められる。"},"answer":"b"},{"number":52,"question":"飛行機の離陸方法として、正しいものを1つ選びなさい。","choices":{"a":"追い風方向に滑走できるエリアを確保できたら離陸操縦に入る。","b":"風速を考慮し適切なパワーをかけてエルロンによる上昇角度をとり離陸する。","c":"上昇角度は失速しないように設定する。安全な高度まで機体を上昇させる。"},"answer":"c"},{"number":53,"question":"手動操縦の特徴とメリットとして、誤っているものを1つ選びなさい。","choices":{"a":"操縦者の習熟度によって飛行高度の微調整や回転半径や飛行速度の調整、遠隔地での高精度な着陸など細かな操作が行え、複雑な構造物の点検作業や耕作地の農薬散布、映画のような芸術性を要求される空撮などでは手動操縦で行われることもある。","b":"安定した飛行に使われているGNSS受信機や電子コンパス、気圧センサなどが何らかの原因により機能不全に陥ったときには、リモート操縦による危険回避が求められる。","c":"定められた航路を高精度に飛行するなど、高い再現性を求められる操縦には不向きである。"},"answer":"b"},{"number":54,"question":"カテゴリーIII飛行において追加となる自動操縦の注意点について、正しいものを1つ選びなさい。","choices":{"a":"可能な限り野生動物や野鳥の立入りが少ない飛行経路及び送電線や構造物が障害とならない飛行範囲を事前に確認し、設定すること。","b":"飛行経路から離れた地点に、地上の第三者の立入りが少ないこと等の条件を考慮した緊急着陸地点や不時着エリアを予め設定すること。","c":"第三者がいる地上の状況が想定と異なる場合等に備え、手動操縦への切り替えも含め、状況変化に速やかに対応できる体制を整えておくこと。"},"answer":"c"},{"number":55,"question":"操縦者のパフォーマンスとして、誤っているものを1つ選びなさい。","choices":{"a":"操縦者は疲労を感じても飛行を継続してしまう傾向にあるため、適切に飛行時間を管理する必要がある。","b":"操縦者が高いストレスを抱えている状態は安全な飛行を妨げる要因となるため、操縦者との適切なコミュニケーションを運航の計画に組み込む等ストレス軽減を図る必要がある。","c":"前夜に飲酒した場合でも、翌日の操縦時までアルコールの影響を受けている可能性があることに注意が必要であり、目視によるアルコール確認の精度を高めることが有用である。"},"answer":"c"},{"number":56,"question":"安全マージンについて、正しいものを1つ選びなさい。","choices":{"a":"飛行経路を考慮し、周辺及び下方・側方に障害物がない水平な場所を離着陸場所と設定する。","b":"緊急時などに一時的着陸が可能なスペースを、前もって確認・確保しておく。","c":"飛行領域に安全半径（高度と同じ数値又は30mのいずれか長い方）を加えた範囲を、立入管理措置を講じて無人地帯とした後に、飛行する。"},"answer":"b"},{"number":57,"question":"カテゴリーIII飛行において追加となる安全確保や、飛行経路の安全な設定として、誤っているものを1つ選びなさい。","choices":{"a":"カテゴリーIII飛行の場合、地上の第三者への被害の可能性を低減させる対策として、必要最低限の数より多くのプロペラ及びモーターを有するなど、適切な冗長性を備えた機体を使用すること。","b":"カテゴリーIII飛行の場合、地上の第三者への被害を軽減させる対策として、防護ネットを展開するなど、落下時の衝撃エネルギーを軽減できる機能を有する機体を使用すること。","c":"飛行経路は、無人航空機が飛行する高度と経路において、障害となる建物や鳥などの妨害から避けられるよう設定する。"},"answer":"b"},{"number":58,"question":"カテゴリーIII飛行におけるリスク評価として、正しいものを1つ選びなさい。","choices":{"a":"建造物上空を飛行するカテゴリーIII飛行は、万一墜落等の事故が生じた場合には、建造物の構造及び骨格に甚大な被害をもたらすリスクの高い飛行となることから、より一層の安全に配慮すべきである。","b":"一等無人航空機操縦士の技能証明を受けた者が第一種機体認証を受けた無人航空機を飛行させることに加え、あらかじめ、その運航の管理が適切に行われることについて国による飛行の許可・承認を受けることが必要となる。","c":"無人航空機を飛行させる際の適切な運航管理の体制を維持するため、リスク評価の結果に基づくリスク軽減策の内容等を記載した飛行日誌を作成・遵守することが求められる。"},"answer":"b"},{"number":59,"question":"カテゴリーIII飛行におけるリスク軽減策を記載した飛行マニュアルに記載する事項として、誤っているものを1つ選びなさい。","choices":{"a":"飛行記録（訓練を含む。）の作成方法","b":"無人航空機を所有する者が遵守しなければならない事項","c":"訓練の実施・管理体制の明確化"},"answer":"b"},{"number":60,"question":"リスク評価のための基本的なコンセプトとして、誤っているものを1つ選びなさい。","choices":{"a":"飛行の空中リスクを検討する際には、オペレーション空間からさらに任意で「空中リスク緩衝空域」を合わせた範囲を検討し、そのリスクを一定の範囲まで低減するように計画する。","b":"「隣接エリア」は、オペレーション空間並びに地上リスク緩衝地域及び空中リスク緩衝空域に隣接する区域であり、無人航空機が制御不能な形で進入してしまった場合に高いリスクが想定される場合には、隣接エリアに進入しないための対策を検討する。","c":"安全確保措置を計画するに当たって、ロバスト性は重要な概念であり、安全確保措置により得られる「安全性の水準」（安全性の増加）と、計画されている安全性の確保が確実に実施されることを示す「保証の水準」（証明の方法）のどちらか高い方の水準を勘案して評価される。"},"answer":"c"},{"number":61,"question":"無人航空機における気象の重要性として、誤っているものを1つ選びなさい。","choices":{"a":"航空法では「当該無人航空機及びその周囲の状況を目視により常時監視して飛行させること。」とされているが、これは目視可能な距離外での無人航空機の飛行を禁止するだけではなく、近距離であっても無人航空機の飛行状況や他の物件との安全な距離が確保されていることを目視で確認できない雲中や濃霧等の気象状態では無人航空機を飛行させてはならないことを意味する。","b":"安全な飛行を実施するためには、まず一般的な天気予報だけではなく、どのような気象情報や予報が提供されているかを理解する必要がある。","c":"作業内容、時間、環境に応じて、雲や視程障害、風向風速及び降水等、自ら行う飛行に影響する気象情報を適切に入手、分析して、離陸から着陸に至るまで支障のある気象状況を極力避けられることを確認した後に飛行を開始しなければならない。"},"answer":"c"},{"number":62,"question":"高気圧について、正しいものを1つ選びなさい。","choices":{"a":"周囲よりも相対的に気圧が高いところを高圧部といい、その中で閉じた等圧線で囲まれたところを高気圧という。","b":"北半球では、時計回りに等圧線と約90度の角度で中心から外へ向かて風を吹き出している。","c":"高気圧の周辺部では下降気流が発生し一般的に天気はよい。"},"answer":"a"},{"number":63,"question":"前線について、誤っているものを1つ選びなさい。","choices":{"a":"閉塞前線は、温暖前線が寒冷前線に追いついた前線で、閉塞が進むと次第に低気圧の勢力が強くなる。","b":"停滞前線は、気団同士の勢力が変わらないため、ほぼ同じ位置に留まっている前線で、長雨をもたらす梅雨前線や秋雨前線がこれにあたる。","c":"梅雨前線とは、四季の変わり目に出現する長雨（菜種梅雨、梅雨、秋霖など）のうち、とくに顕著な長雨、大雨をもたらす停滞前線のことである。"},"answer":"a"},{"number":64,"question":"風速や突風について、正しいものを1つ選びなさい。","choices":{"a":"風速の変化の度合いは地表の粗度（樹木や建物などによる凹凸の程度）や風速の大きさにかかわらず一定である。","b":"低気圧が接近すると、寒冷前線付近の上昇気流によって発達した積乱雲により、強い雨や雷とともに突風が発生することがある。","c":"日本付近では、天気は西から東に変わるため、西から寒冷前線を伴う低気圧が接近するときは、突風の強さを予測することができる。"},"answer":"b"},{"number":65,"question":"飛行機の運航の特徴として、誤っているものを1つ選びなさい。","choices":{"a":"滑走により離着陸する飛行機は、回転翼航空機よりも広い離着陸エリアが必要である。","b":"回転翼航空機と比べて、飛行中の最小旋回半径が小さくなることが特徴である。","c":"飛行機の運航は、離陸、着陸共に、向い風を受ける方向から行う。"},"answer":"b"},{"number":66,"question":"回転翼航空機（ヘリコプター）の運航の特徴として、正しいものを1つ選びなさい。","choices":{"a":"回転翼航空機（ヘリコプター）は、構造上プロペラガードがない機体が一般的であるため、安全のためにプロペラガード付きの回転翼航空機（マルチローター）よりも狭い離着陸エリアが必要である。","b":"機体高度が、およそメインローター半径以下になると、地面効果の影響が顕著になりやすいため、推力変化及びホバリング時の安定・挙動に注意が必要である。","c":"前進させながら上昇させた方が必要パワーを多く消費するため、垂直上昇を行うことが望ましい。"},"answer":"b"},{"number":67,"question":"回転翼航空機（マルチローター）におけるリスク軽減策を踏まえた運航の計画の立案の例として、誤っているものを1つ選びなさい。","choices":{"a":"離陸地点は操縦者及び補助者との距離を3m以上保つか、機体の取扱説明書に推奨距離が記載されている場合はその指示に従う。","b":"離陸地点は周囲の物件から30m以上離すことができる場所を選定する。","c":"飛行経路での中間飛行高度の設定を行う。"},"answer":"c"},{"number":68,"question":"夜間飛行の運航として、正しいものを1つ選びなさい。","choices":{"a":"夜間飛行においては、原則として目視外飛行は実施せず、機体の向きを視認できる灯火が装備された機体を使用する。","b":"操縦者は事前に、第三者の立入りのある場所で、訓練を実施する。","c":"離着陸地点を含め、回避すべき障害物などには、安全確保のため目印が必要である。"},"answer":"a"},{"number":69,"question":"フェールセーフ機能の例として、誤っているものを1つ選びなさい。","choices":{"a":"電波断絶の場合に、離陸地点まで瞬時に戻る機能又は電波が復帰するまでの間、空中で位置を断続的に維持する機能","b":"GNSSの電波に異常が見られる場合に、その機能が復帰するまでの間、空中で位置を継続的に維持する機能、安全な自動着陸を可能とする機能又はGNSS等以外により位置情報を取得できる機能","c":"電池の電圧、容量又は温度等に異常が発生した場合に、発煙及び発火を防止する機能並びに離陸地点まで自動的に戻る機能又は安全な自動着陸を可能とする機能"},"answer":"a"},{"number":70,"question":"補助者を配置しない場合の目視外飛行として、リスク軽減策を踏まえた運航の計画の立案の例（追加事項）として、正しいものを1つ選びなさい。","choices":{"a":"空港等における進入表面等の上空の空域、航空機の離陸及び着陸の安全を確保するために必要なものとして国土交通大臣が告示で定める空域又は地表若しくは水面から200m以上の高さの空域の飛行は行わない。","b":"主要な飛行経路において飛行中に不測の事態が発生した場合に、付近の適切な場所に安全に着陸させる等の緊急時の対策手順を定めるとともに、第三者又は物件に危害を与えずに着陸ができる場所を予め選定する。","c":"飛行前に、飛行させようとする経路及びその周辺について、不測の事態が発生した際に適切に安全上の措置を講じることができる状態であることを現場確認する。"},"answer":"c"}],"5":[{"number":1,"question":"無人航空機の操縦者の意識や責任として、正しいものを1つ選びなさい。","choices":{"a":"計画の延期や即断する勇気を持つこと。","b":"危険な状況を乗り切ることの方が、危険を事前に回避することよりも重要である。","c":"操縦者は、飛行を開始してから終了するまで、全てに責任を問われる。"},"answer":"c"},{"number":2,"question":"現地調査や機体の点検として、誤っているものを1つ選びなさい。","choices":{"a":"現地調査の際、離着陸する場所の状況等を確認する。","b":"現地調査の際、地上の歩行者や自動車の通行、有人航空機の飛行などの状況等を確認する。","c":"飛行前には可能な限り機体の点検を行い、気になるところがあれば、可能な限り整備をしてから飛行を開始する。"},"answer":"c"},{"number":3,"question":"監視の実施として、正しいものを1つ選びなさい。","choices":{"a":"無人航空機の事故のうち、十分に監視をしていなかったことが原因となる事故は少数である。","b":"無人航空機の飛行する空域や場所には、他の航空機をはじめ、ビルや家屋といった建物などの飛行の支障となるものが数多く存在する。","c":"衝突防止装置を搭載した機体に関しては、衝突防止装置に全幅の信頼を置く形が好ましい。"},"answer":"b"},{"number":4,"question":"保険について、誤っているものを1つ選びなさい。","choices":{"a":"無人航空機の保険は、強制保険はなく、すべて任意保険である。","b":"保険の加入は金銭的負担が大きいので、加入しなくても特段問題ない。","c":"無人航空機の保険には、機体に対する保険、賠償責任保険などいろいろな種類や組合せがある。"},"answer":"b"},{"number":5,"question":"無人航空機の飛行に関する規制概要として、正しいものを1つ選びなさい。","choices":{"a":"無人航空機の登録の有効期間は1年である。","b":"無人航空機を識別するための登録記号を表示し、原則としてリモートID機能を備えなければならない。","c":"航空法において、無人航空機の飛行に当たって確保すべき安全は、無人航空機の航行の安全および地上又は水上の人又は物件の安全である。"},"answer":"b"},{"number":6,"question":"無人航空機の飛行形態の分類として、誤っているものを1つ選びなさい。","choices":{"a":"特定飛行に該当しない飛行を「カテゴリーI飛行」という。","b":"特定飛行に該当しない飛行の場合には、航空法上は簡易な手続きのみで飛行可能である。","c":"特定飛行のうち、無人航空機の飛行経路下において第三者の立入りを管理する措置を講じたうえで行うものを「カテゴリーII飛行」という。"},"answer":"b"},{"number":7,"question":"特定飛行を行う場合の航空法上の手続き等として、正しいものを1つ選びなさい。","choices":{"a":"カテゴリーIIA飛行及びカテゴリーIIB飛行はともに、機体認証及び技能証明の両方を有しており、かつ、あらかじめ使用する機体、操縦する者の技能及び運航管理の方法について国土交通大臣の審査を受け、飛行の許可・承認を受けることによって可能となる。","b":"カテゴリーIII飛行に関しては、最もリスクの高い飛行となることから、一等無人航空機操縦士の技能証明を受けた者が第一種機体認証を受けた無人航空機を飛行させることが求められる。","c":"カテゴリーIII飛行に関しては、あらかじめ運航管理の方法について国土交通大臣に届け出ることにより可能となる。"},"answer":"b"},{"number":8,"question":"計器飛行方式及び有視界飛行方式として、誤っているものを1つ選びなさい。","choices":{"a":"旅客機以外の航空機も、有視界飛行方式（VFR）ができない気象状態となった場合には計器飛行方式（IFR）で飛行する。","b":"小型機や回転翼航空機は計器飛行方式（IFR）で飛行することが多い。","c":"空港及びその周辺においては、有視界飛行方式で飛行する航空機も航空交通管制機関が与える指示等に従う必要がある。"},"answer":"b"},{"number":9,"question":"制限表面のうち、全ての空港に設定するものとして、正しいものを1つ選びなさい。","choices":{"a":"進入の最終段階及び離陸時における航空機の安全を確保するために必要な表面を進入表面という。","b":"空港周辺での旋回飛行等低飛行の安全を確保するために必要な表面を転移表面という。","c":"進入をやり直す場合等の側面方向への飛行の安全を確保するために必要な表面を水平表面という。"},"answer":"a"},{"number":10,"question":"登録を受けることができない無人航空機として、誤っているものを1つ選びなさい。","choices":{"a":"製造者が機体の安全性に懸念があるとして回収（リコール）しているような機体や、事故が多発していることが明らかである機体など、あらかじめ国土交通大臣が登録できないものと指定したもの","b":"表面に突起物がないため、摩擦力との関係で不具合を起こす可能性のある無人航空機","c":"遠隔操作又は自動操縦による飛行の制御が著しく困難である無人航空機"},"answer":"b"},{"number":11,"question":"リモートID機器及び規制対象となる飛行の空域として、正しいものを1つ選びなさい。","choices":{"a":"リモートID機能により発信される情報には、静的情報として無人航空機の製造番号及び登録記号、動的情報として位置、速度、高度、時刻などの情報が含まれており（所有者や使用者の情報は含まれない）、1秒に3回以上発信される。","b":"航空法に基づき原則として無人航空機の飛行が禁止されている「空港等の周辺の空域」には、空港やヘリポート等の周辺に設定されている進入表面等の上空の空域、（進入表面等がない）飛行場周辺の、航空機の離陸及び着陸の安全を確保するために必要なものとして国土交通大臣が告示で定める空域がある。","c":"航空機の離着陸が頻繁に実施される成田国際空港・東京国際空港・関西国際空港等では、進入表面若しくは転移表面の下の空域又は空港の敷地の上空の空域が、飛行禁止空域からは外れている。"},"answer":"b"},{"number":12,"question":"規制対象となる飛行の方法として、誤っているものを1つ選びなさい。","choices":{"a":"「人又は物件」とは、無人航空機を飛行させる者及びその関係者並びにこれらの者が所有又は管理する物件を指す。","b":"「物件」とは、(a)中に人が存在することが想定される機器、(b)建築物その他の相当の大きさを有する工作物等を指す。","c":"土地や自然物（樹木、雑草等）などは、「物件」に該当しない。"},"answer":"a"},{"number":13,"question":"教則に規定されている「車両等」に該当するものを1つ選びなさい。","choices":{"a":"軌道車両","b":"高架","c":"水門"},"answer":"a"},{"number":14,"question":"レベル3.5飛行について、正しいものを1つ選びなさい。","choices":{"a":"レベル3.5飛行は、比較的人口密度が高い地域において、第三者が存在する可能性が高い場所（夜間含む）で行うものであり、カテゴリーII飛行（レベル3飛行）に該当する。","b":"レベル3.5飛行は、飛行経路下に歩行者等がいない無人地帯であることをデジタル技術の活用（機上カメラ）によって確認することで立入管理措置を代替し、経路を特定したうえで行う飛行である。","c":"レベル3.5飛行の実施に際し、レベル3飛行に必要な要件へ適合していることを示す資料の作成、また、飛行の安全を確保するための運航条件等を事前に定める必要があり、作成した資料は、基本的に申請時に国土交通大臣への提出が必要となる。"},"answer":"b"},{"number":15,"question":"催し場所上空における飛行や危険物の輸送について、正しいものを1つ選びなさい。","choices":{"a":"多数の者の集合する催しが行われている場所の上空における飛行に際しては、風速5m/s以上の場合は慎重に飛行することや、機体が第三者及び物件に接触した場合の危害を無害化する構造を用意することが必要である。","b":"無人航空機の操縦者は、当該無人航空機により危険物を輸送することが常に禁止されている。","c":"無人航空機の飛行のために当該無人航空機で輸送する物件は、「危険物」の対象とならない。"},"answer":"c"},{"number":16,"question":"教則に規定されている「危険物」に該当しないものを1つ選びなさい。","choices":{"a":"放射性物質","b":"腐食性物質","c":"解離性物質"},"answer":"c"},{"number":17,"question":"航空法における用語等について、正しいものを1つ選びなさい。","choices":{"a":"自動車、航空機等の移動する物件に紐等を固定して又は人が紐等を持って移動しながら無人航空機を飛行させる行為（えい航）は、係留に該当する。","b":"「第三者」とは、無人航空機の飛行に直接又は間接的に関与していない者をいう。","c":"現に操縦はしていないが操縦する可能性のある者、補助者等無人航空機の飛行の安全確保に必要な要員は、「第三者」に該当する。"},"answer":"b"},{"number":18,"question":"飛行前の確認事項として、誤っているものを1つ選びなさい。","choices":{"a":"燃料の搭載量又はバッテリーの残量の確認","b":"火気の消火状況","c":"リモートID機能の作動状況"},"answer":"b"},{"number":19,"question":"飛行中の他の無人航空機を確認した場合における措置として、正しいものを1つ選びなさい。","choices":{"a":"当該無人航空機になるべく密着して飛行させること。","b":"接近又は衝突のおそれがあると認められる場合には、自分の無人航空機をその場に待機させること。","c":"飛行日時、飛行経路、飛行高度等について、他の無人航空機を飛行させる者と調整を行うこと。"},"answer":"c"},{"number":20,"question":"飛行計画の通報等として、誤っているものを1つ選びなさい。","choices":{"a":"無人航空機を飛行させる者は、特定飛行を行う場合には、原則として、あらかじめ、所定の事項等を記載した飛行計画を国土交通大臣に通報しなければならない。","b":"飛行計画は、国、地方自治体及び民間会社が提供している「ドローン情報基盤システム（飛行計画通報機能）」に入力することにより通報する。","c":"無人航空機を飛行させる者は、通報した飛行計画に従って特定飛行をしなければならない。"},"answer":"b"},{"number":21,"question":"特定飛行を行う者が飛行日誌に記載すべき事項のうち、無人航空機に関する情報として、正しいものを1つ選びなさい。","choices":{"a":"登録記号","b":"用途","c":"壁性能"},"answer":"a"},{"number":22,"question":"特定飛行を行う者が飛行日誌に記載すべき事項のうち、点検整備記録に関する情報として、誤っているものを1つ選びなさい。","choices":{"a":"点検整備の実施当日の天気・気温","b":"実施者の氏名","c":"点検・修理・改造・整備の内容・理由"},"answer":"a"},{"number":23,"question":"航空法における違反行為と罰則として、正しいものを1つ選びなさい。","choices":{"a":"飛行計画を通報せずに特定飛行を行ったときは、50万円以下の罰金に処せられる可能性がある。","b":"事故が発生した場合に報告をせず、又は虚偽の報告をしたときは、30万円以下の罰金に処せられる可能性がある。","c":"技能証明を携帯せずに特定飛行を行ったときは、30万円以下の罰金に処せられる可能性がある。"},"answer":"b"},{"number":24,"question":"カテゴリーIII飛行を行う場合の運航管理体制として、誤っているものを1つ選びなさい。","choices":{"a":"無人航空機を飛行させる者は、第三者上空飛行に当たり想定されるリスクの分析と評価を実施し、非常時の対処方針や緊急着陸場所の設定などの必要なリスク軽減策を講じることとする。","b":"カテゴリーIII飛行を行う場合には、あらかじめ「運航管理の方法」について国土交通大臣の審査を受け、飛行の許可・承認を受ける必要がある。","c":"飛行の許可・承認の審査において、無人航空機を飛行させる者が多額の流動資産を保有するなど賠償能力を有することの確認を行うこととしている。"},"answer":"c"},{"number":25,"question":"技能証明の交付手続きとして、正しいものを1つ選びなさい。","choices":{"a":"技能証明を受けようとする者は、「指定試験機関」が実施する学科試験、実地試験及び身体検査に合格したうえで、国土交通大臣に技能証明書の交付の申請手続きを行う必要がある。","b":"技能証明を受けようとする者は、実地試験に合格しなければ、学科試験を受けることができない。","c":"無人航空機の民間講習機関のうち国の登録を受けた「登録講習機関」の無人航空機講習（学科講習・実地講習）を修了した者にあっては、技能証明試験の全部を免除することができる。"},"answer":"a"},{"number":26,"question":"小型無人機等飛行禁止法における小型無人機の定義として、誤っているものを1つ選びなさい。","choices":{"a":"飛行機、回転翼航空機、滑空機、飛行船その他の航空の用に供することができる機器であって構造上人が乗ることができないもののうち、遠隔操作又は自動操縦により飛行させることができるものと定義されている。","b":"航空法の「無人航空機」と異なり、「小型無人機」は大きさや重さにかかわらず対象となり、100g未満のものも含まれる。","c":"航空機以外の航空の用に供することができる機器であって、当該機器を用いて人が飛行することができるものと定義されており、気球、ハンググライダー及びパラグライダー等が該当する。"},"answer":"c"},{"number":27,"question":"小型無人機の飛行禁止の対象となる空港として、正しいものを1つ選びなさい。","choices":{"a":"新千歳空港","b":"名古屋空港","c":"屋久島空港"},"answer":"a"},{"number":28,"question":"小型無人機等の飛行禁止の例外として、正しいものを1つ選びなさい。","choices":{"a":"小型無人機等の飛行禁止の例外は、所定の場合に限られており、原則として、航空法に基づく飛行の許可・承認や機体認証・技能証明を取得した場合であっても小型無人機等を飛行させることはできない。","b":"対象防衛関係施設及び対象空港の敷地又は区域の上空（レッドゾーン）においては、飛行禁止の例外に当たる場合であっても、国土交通大臣の同意が必要となることがある。","c":"飛行禁止の例外に当たる場合であっても、対象施設及びその周囲おおむね300mの周辺地域の上空で小型無人機等を飛行させる場合、対象施設の管理者等へ通報しなければならない。"},"answer":"a"},{"number":29,"question":"以下に挙げる携帯局の周波数帯のうち、最大送信出力が1Wではないものはどれか。ただし、地上から電波発射を行う無線局の場合ではないものとする。","choices":{"a":"169MHz帯","b":"2.4GHz帯","c":"5.7GHz帯"},"answer":"a"},{"number":30,"question":"携帯電話等を上空で利用する場合等として、誤っているものを1つ選びなさい。","choices":{"a":"上空で利用した場合、通信品質の安定性や地上の携帯電話等の利用への影響が懸念される。","b":"一定の条件下で利用することで、既設の無線局の運用等に支障を与えずに上空で利用できるよな制度整備までにはなされていない。","c":"地方公共団体が定める条例に基づき、無人航空機の利用方法が制限されたり、都市公園や施設の上空など特定の場所において、無人航空機の飛行が制限されたりする場合がある。"},"answer":"b"},{"number":31,"question":"飛行機の特徴として、正しいものを1つ選びなさい。","choices":{"a":"横方向の移動はバンクターン（旋回）で行う。","b":"過度の低速飛行や過度の上昇角度、過度の旋回半径小により翼面に空気が膨張する失速という状態に陥ることがある。","c":"自動飛行を行う場合は、発射装置や回収装置などの地上設備が必須である。"},"answer":"a"},{"number":32,"question":"回転翼航空機（マルチローター）の特徴として、誤っているものを1つ選びなさい。","choices":{"a":"機体外周に配置されたローターを高速回転させ、上昇・降下や前後左右移動、ホバリングや機体を水平回転させることができる。","b":"大きなエネルギー消費により、複数のローターを高速回転させ揚力を得て飛行する。","c":"風の影響を受けやすく飛行の安定性を高めるため、フライトコントロールシステムを用いローターの回転数を上げることで、機体の姿勢や位置を安定させている。"},"answer":"c"},{"number":33,"question":"回転翼航空機（マルチローター）の最大離陸重量25kg以上の大型機の特徴として、正しいものを1つ選びなさい。","choices":{"a":"機体の対角寸法やローターのサイズやモーターパワーが大きくなり、飛行時の慣性力も増加し、上昇・降下や加減速などに要する時間と距離が比較的短くなる。","b":"離着陸やホバリング時の対空抵抗効果等の範囲が広がり、高度な操縦技術を要する。","c":"飛行時機体から発せられる騒音が大きくなり、周囲への影響範囲が広がる。"},"answer":"c"},{"number":34,"question":"目視外飛行で周囲の安全を確認する補助者が配置された場合に必要な装備について、不具合発生時に対応する危機回避機能（フェールセーフ機能）に含まれるものとして、誤っているものを1つ選びなさい。","choices":{"a":"電波断絶の自動帰還や空中停止機能","b":"GNSS（Global Navigation Satellite System）電波異常時の空中停止や安全な自動着陸","c":"電池異常時の自動爆破消滅等の機能"},"answer":"c"},{"number":35,"question":"迎角と横滑り角の関係として、正しいものを1つ選びなさい。","choices":{"a":"機体の前後・上下を含む面に空気流入の向きを投影したときに、前後軸とのなす角を迎角という。上方から空気が流入するときに迎角は正である。","b":"機体の前後・上下を含む面と空気流入の向きの面のなす角を横滑り角という。機体右側から空気流入するときに横滑り角は正である。","c":"機体に作用する揚力と抗力などの空気力、モーメントは流入空気の速さではなく、迎角、横滑り角で決まる。"},"answer":"b"},{"number":36,"question":"飛行原理と飛行性能として、誤っているものを1つ選びなさい。","choices":{"a":"回転翼航空機（ヘリコプター）のメインローターは1回転する間にブレードのピッチ角を周期的に変化させる可変ピッチ機構を持ち、これによって機体のピッチ、ロールの姿勢制御を行い、テールローターの推力を変化させてヨーの姿勢制御を行う。","b":"カテゴリーIII飛行を行うにあたっては、無人航空機の飛行性能及びこれに影響を与える要因について理解することが必要となる。","c":"無人航空機には、ペイロードを搭載できない機体を除き、機体ごとに安全に飛行できるペイロードの限界体積が定められている。"},"answer":"c"},{"number":37,"question":"高度500mを飛行する無人航空機が揚力を失い落下を始める場合における、落下開始地点から地上に墜落するまでの水平距離として、正しいものを1つ選びなさい。ただし、無人航空機を質点とみなせるものとし、空気抵抗は無視できると仮定する。また、重力加速度は9.8m/s²、飛行速度は20m/sとする。","choices":{"a":"約200m","b":"約400m","c":"約600m"},"answer":"a"},{"number":38,"question":"高度センサについて、誤っているものを1つ選びなさい。","choices":{"a":"気圧センサは、気圧の変化を気象衛星システムを利用して読み取り、高度を計測する。","b":"超音波センサは音波の反射時間から高度を計測する。","c":"LiDARはレーザー光（赤外線）を照射し、反射時間から高度を計測する。"},"answer":"a"},{"number":39,"question":"バッテリーに関する用語として、正しいものを1つ選びなさい。","choices":{"a":"充電率において、0%は仕様上の完全放電状態を、100%は満充電状態を表す。","b":"電圧（V）は、｛抵抗（R）×電流（A）｝²で求めることができる。","c":"出力（W）は、放電時電圧（V）÷電流（A）で求めることができる。"},"answer":"a"},{"number":40,"question":"スティック操作による機体の動きの割り当てとして、誤っているものを1つ選びなさい。","choices":{"a":"回転翼航空機の場合、モード1を右側スティックの上下操作、モード2を左側スティックの上下操作にすることで、スロットルが可能となる。","b":"回転翼航空機の場合、モード1を左側スティックの上下操作、モード2を右側スティックの上下操作にすることで、エレベーターが可能となる。","c":"回転翼航空機の場合、モード1及びモード2をそれぞれ左側スティックの左右操作にすることで、エルロンが可能となる。"},"answer":"c"},{"number":41,"question":"リチウムポリマーバッテリーの取り扱い上の注意点として、正しいものを1つ選びなさい。","choices":{"a":"充電器は満充電になっても充電を停止しないため、過充電となる場合がある。","b":"過放電や過充電を行うと、急速に劣化が進み、寿命が短くなる。","c":"過放電や過充電の状態では、通常利用時よりも多くのウイルスがバッテリー内部に発生する。"},"answer":"b"},{"number":42,"question":"物件投下のために装備される機器として、誤っているものを1つ選びなさい。","choices":{"a":"物件投下用のウインチ機構で吊り下げる場合は、物件の外観変化度合い、投下前後の内心亀裂の変化に注意しなければならない。","b":"農薬を散布する装置は、決められた飛行速度、飛行高度など使用の詳細が定められている。","c":"農薬散布については、風などの影響で、対象区域外に飛散させないよう注意しなければならない。"},"answer":"a"},{"number":43,"question":"マルチパスについて、正しいものを1つ選びなさい。","choices":{"a":"送信アンテナから放射された電波が山や建物などによる反射、屈折等により単一の経路を通って伝搬される現象をマルチパスという。","b":"反射屈折した電波は、到達するまでに相当程度の遅れを生じ、長時間、操縦不能になる要因となっている。","c":"マルチパスによって電波が弱くなり一時的に操縦不能になった場合は、送信機をできるだけ高い位置に持ち、アンテナの向きを変えて操縦の復帰を試みる。"},"answer":"c"},{"number":44,"question":"マイクロ波について、誤っているものを1つ選びなさい。","choices":{"a":"マイクロ波は1～10cmの波長（周波数3～30GHz）で、回折性が強い性質を持つため、特定の方向に向けて発射するのに適している。","b":"マイクロ波は伝送できる情報量が非常に大きいことから、衛星通信、衛星放送や無人航空機の画像伝送、無線LANに利用される。","c":"レーダーはマイクロ波の直進性を活用したシステムであり、気象レーダーや船舶用レーダー等にマイクロ波が利用されている。"},"answer":"a"},{"number":45,"question":"無人航空機の磁気キャリブレーションとして、正しいものを1つ選びなさい。","choices":{"a":"無人航空機の磁気キャリブレーションとは、飛行前にその場所の地磁気を検出して方位を取得し、操縦者や補助者に認識させることである。","b":"磁気キャリブレーションが正しく行われていないと、機体が炎上する可能性がある。","c":"飛行させる場所により、地磁気の方向は異なるので、磁気キャリブレーションを行うことが重要である。"},"answer":"c"},{"number":46,"question":"リチウムポリマーバッテリーの保管方法における留意点として、誤っているものを1つ選びなさい。","choices":{"a":"満充電の状態での保管又は飛行後の放電状態での保管は、電池の劣化が進みやすく電池が膨らみ、使用不可になることが多いので行わないこと。","b":"短絡すると発火する危険があるため、ポリマー因子が短絡しないように細心の注意を払うこと。","c":"万が一発火しても安全を保てる不燃性のケースに入れ、突起物が当たってバッテリーを傷つけない状態で保管すること。"},"answer":"b"},{"number":47,"question":"安全運航のためのプロセスと点検項目として、正しいものを1つ選びなさい。","choices":{"a":"飛行後の点検は、無人航空機が飛行を終えて着陸したあとに行うべき点検である。ここでは飛行の結果、無人航空機の各部品の耐用年数等を確認する。","b":"運航終了後の点検は、当日の運航が終了したあとに行うべき点検である。ここでは無人航空機やバッテリーを安全に廃棄するための点検や、飛行日誌の作成などを確認する。","c":"異常事態発生時の点検は、飛行中に異常事態が発生した際に確認すべき点検である。ここでは危機回避行動を行い、安全に着陸するための確認項目を確認する。"},"answer":"c"},{"number":48,"question":"運航者がプロセスごとに行うべき点検項目として、誤っているものを1つ選びなさい。","choices":{"a":"飛行中の監視では、無人航空機の離着陸状況について点検する。","b":"飛行中の監視では、飛行空域及びその周囲の気象の変化について点検する。","c":"飛行中の監視では、飛行空域及びその周囲の状況について点検する。"},"answer":"a"},{"number":49,"question":"カテゴリーIIIの飛行申請について、正しいものを1つ選びなさい。","choices":{"a":"無人航空機を飛行させる者は、飛行の形態に応じてリスクの分析と評価を行い、その結果に基づく非常時の対処方針や緊急着陸場所の設定などのリスク軽減策の内容を記載した飛行マニュアルの提出を除いて、運航の管理が適切に行われることについて申請しなければならない。","b":"飛行の許可・承認の審査において、無人航空機を飛行させる者が適切な保険に加入するなど責任及び自覚を有することの確認を行うこととしている。","c":"カテゴリーIII飛行については、通達「無人航空機の飛行に関する許可・承認の審査要領（カテゴリーIII飛行）」に従って、当該申請に係る飛行開始予定日の20開庁日前までに申請書を国土交通省航空局に提出しなければならない。"},"answer":"c"},{"number":50,"question":"カテゴリーIII飛行のリスク評価結果による保険、セキュリティとして、誤っているものを1つ選びなさい。","choices":{"a":"カテゴリーIII飛行は、第三者上空を飛行するリスクの高い運航であることから、その飛行の許可・承認の審査に先立って、無人航空機を飛行させる者が賠償能力を有することの確認を行うこととしている。","b":"カテゴリーIII飛行は、その飛行の形態に応じたリスク評価を行い、その結果に基づき、必要な保険に加入することが望ましい。","c":"無人航空機の選定においては、飛行の形態に応じたリスク評価の結果に基づき必要なセキュリティ対策が講じられていることも考慮しなければならない。"},"answer":"a"},{"number":51,"question":"回転翼航空機（マルチローター）がGNSS（Global Navigation Satellite System）を使用しないホバリングや着陸として、正しいものを1つ選びなさい。","choices":{"a":"ホバリング中GNSS受信機能を無効にすると、機体周辺の気流の影響で水平位置が不安定となるため、エレベーター操作及びスロットル操作により水平位置を安定させホバリング飛行を維持させる。","b":"GNSSを使用しない着陸にあっては、ホバリングを安定させながら、エレベーター操作により機体を降下させ着陸させる。","c":"GNSSを使用しない着陸の場合、機体を垂直降下させる時に発生する「ボルテックス・リング・ステート」や、「地面効果」を抑制するために、細かくエレベーター又はエルロン操作などを行いながら、機体を着地させ着陸を完了させる。"},"answer":"c"},{"number":52,"question":"飛行機の着陸方法として、誤っているものを1つ選びなさい。","choices":{"a":"向かい風方向に滑走できるエリアを確保できたら着陸操縦に入る。","b":"地面に近づくにつれ、降下速度を遅くし、垂直着陸による衝撃を抑えること。","c":"目測の誤りにより滑走路を逸脱することがあるので、厳重な注意が必要である。"},"answer":"b"},{"number":53,"question":"自動操縦の特徴とメリットとして、正しいものを1つ選びなさい。","choices":{"a":"飛行を制御するアプリケーションソフトに搭載されている地図情報に、飛行しながら複数の飛行時のウェイポイント（経過点）を設定し飛行経路を作成する。","b":"ウェイポイントは地図上の位置情報の設定だけでなく、風向きや温度、湿度など詳細な設定が可能である。","c":"手動操縦に比較して、再現性の高い飛行を行うことができるため、経過観察が必要とされる用地や、離島への輸送、生育状況を把握する耕作地などの飛行に利用される。"},"answer":"c"},{"number":54,"question":"機体のフェールセーフ機能として、誤っているものを1つ選びなさい。","choices":{"a":"送信電波や電源容量の減少などにより飛行が継続できない場合、又は継続できないことが予想される場合は、予め飛行制御アプリケーションのフェールセーフ機能により、自動帰還モードへ切り替わり、離陸地点へ飛行する。","b":"フェールセーフ機能発動時、機体の動作をホバリング、その地点での着陸、自動帰還などの設定を行うことができる機体もある。","c":"フェールセーフ機能発動中にバッテリー残量不足等の飛行が継続できない場合、又は予想される場合、機体は自動的に停止したうえで降下し、着陸を試みる。"},"answer":"c"},{"number":55,"question":"CRM（Crew Resource Management）について、正しいものを1つ選びなさい。","choices":{"a":"事故等の防止のためには、操縦技量の向上は有効な対策だが、これだけでは人間の特性や能力の限界の観点からヒューマンエラーを完全になくすことはできない。","b":"ヒューマンエラーに対処するためには、全ての利用可能な物的リソース、ソフトウェア及び通信網を活用した「CRM（Crew Resource Management）」という概念が有効である。","c":"CRMを実現するために「TEM（Try and Error Management）」という手法が取り入れられている。"},"answer":"a"},{"number":56,"question":"安全確保のための基礎として、誤っているものを1つ選びなさい。","choices":{"a":"飛行の逸脱を防止するためには、ブロックエリア機能を使用することにより、飛行禁止空域を設定することが有効である。","b":"飛行の逸脱を防止するためには、衝突防止機能として無人航空機に取り付けたセンサを用いて、周囲の障害物を認識・回避することが有効である。","c":"安全を確保するための運航体制として、操縦と安全管理の役割を分割させる目的で操縦者に加えて、安全管理者（運航管理者）を配置することが望ましい。"},"answer":"a"},{"number":57,"question":"飛行経路の安全な設定や、カテゴリーIII飛行において追加となる経路設定の注意点として、正しいものを1つ選びなさい。","choices":{"a":"障害物付近を飛行せざるを得ない経路を設定する際は、機体の性能にかかわらず安全な距離を保つように心がける。","b":"操縦者の目視が限界域付近となる飛行では、付近の障害物との距離差が曖昧になりやすいため、事前に飛行経路付近の障害物との距離を現地で確認し、必要と判断した場合は目印を配置する。","c":"カテゴリーIII飛行においては、可能な限り第三者の立入りが少ない飛行経路を設定する。"},"answer":"c"},{"number":58,"question":"カテゴリーIII飛行におけるリスク分析及び評価において考慮すべき事項として、誤っているものを1つ選びなさい。","choices":{"a":"飛行の日時、飛行の目的等を含む運航計画","b":"飛行経路における人との衝突リスク（地上リスク）及び航空機との衝突リスク（空中リスク）","c":"電波環境（自動操縦の場合及び無線通信ネットワークを利用して操縦を行う場合に限る。）"},"answer":"c"},{"number":59,"question":"カテゴリーIII飛行におけるリスク軽減策を記載した飛行マニュアルに記載する事項として、正しいものを1つ選びなさい。","choices":{"a":"飛行後の周囲の安全確認の方法","b":"無人航空機を着陸させる周辺地域の安全管理体制","c":"事故等の報告要領に定める事態への対応及び連絡体制"},"answer":"c"},{"number":60,"question":"リスク評価のための基本的なコンセプトやリスク評価手法として、誤っているものを1つ選びなさい。","choices":{"a":"安全確保措置に必要とされるロバスト性の水準は、運航形態のリスクに応じて検討し、低、中、高の3つの異なる水準があり、安全性の水準と保証の水準の低い方に準じて評価する。","b":"リスク評価における「総合リスクモデル」とは、無人航空機の運航に伴うリスク、ハザード、脅威、安全確保措置の地域限定的な枠組みである。","c":"リスク評価の最初のステップとして「運航計画（CONOPS）」を明確にする。"},"answer":"b"},{"number":61,"question":"安全な飛行を行うために確認すべき気象の情報源として、正しいものを1つ選びなさい。","choices":{"a":"アメダス","b":"一次レーダー","c":"確定天気図"},"answer":"a"},{"number":62,"question":"低気圧について、誤っているものを1つ選びなさい。","choices":{"a":"周囲よりも相対的に気圧が低いところを低圧部といい、その中で閉じた等圧線で囲まれたところを低気圧という。","b":"北半球では反時計回りに低気圧の中心から周囲へ風が吹き込む。","c":"中心部では上昇気流が起こり、雲が発生し一般的に天気は悪い。"},"answer":"b"},{"number":63,"question":"雲と降水について、正しいものを1つ選びなさい。","choices":{"a":"雲には20種雲形と呼ばれる20種類の雲の形がある。","b":"上層雲として巻雲・巻層雲・巻積雲が、中層雲として高層雲・乱層雲・高積雲が、低層雲と下層から発達する雲として積雲・積乱雲・層積雲・層雲がある。","c":"積雲系の雲では連続的な降水が、層雲系であれば断続的でしゅう雨性の降水を伴う傾向がある。"},"answer":"b"},{"number":64,"question":"海陸風について、誤っているものを1つ選びなさい。","choices":{"a":"海陸風は海と陸との気温差によって生じる局地的な風で、日本では、日差しの強い夏の沿岸部で顕著に見られる。","b":"地表付近において、日中は、暖まりやすい陸上に向かって風が吹き、夜間は、冷めにくい海上に向かって風が吹く。","c":"風が入れ替わるときには、ほぼ無風状態になり、「朝凪」「夕凪」と呼ばれる。"},"answer":"c"},{"number":65,"question":"飛行機の運航の特徴として、正しいものを1つ選びなさい。","choices":{"a":"回転翼航空機と違いホバリング（空中停止）はできない。","b":"上空待機を行う場合は左右を行き来するように旋回飛行を行う。","c":"着陸は失速しない程度に速度を下げて行うため、高度なエルロン操作が必要となる。"},"answer":"a"},{"number":66,"question":"回転翼航空機（ヘリコプター）の運航の特徴として、誤っているものを1つ選びなさい。","choices":{"a":"山間部又は斜面に沿って飛行させる場合、吹き下ろし風が強いと上昇できない場合があり、注意が必要である。","b":"垂直降下又は降下を伴う低速前進時は、ボルテックス・リング・ステートとなり、急激に高度が低下し回復できない危険性がある。","c":"オートローテーション機構を装備している機体は、動力が停止しても自動で着陸が可能である。"},"answer":"c"},{"number":67,"question":"回転翼航空機（マルチローター）におけるリスク軽減策を踏まえた運航の計画の立案の例として、正しいものを1つ選びなさい。","choices":{"a":"飛行中断に備え、飛行経路上又はその近傍に緊急着陸地点を事前に選定する。","b":"プロペラガード等の安全装備がない機体の場合、第三者の立入りを制限できる場所の選定及び補助者の配置が必須となる。","c":"操縦者は操縦中、常に保護具を使用する。"},"answer":"a"},{"number":68,"question":"夜間飛行のリスク軽減を図るための対策と提案として、誤っているものを1つ選びなさい。","choices":{"a":"操縦者は、夜間飛行の訓練を修了したものに限定する。","b":"夜間における機体灯火の視認可能範囲など、飛行責任を明確にする。","c":"操縦者と補助者の連絡方法の有効性を確認する。"},"answer":"b"},{"number":69,"question":"目視外飛行で補助者を配置しない場合に、無人航空機に求められる追加要件として、正しいものを1つ選びなさい。","choices":{"a":"航空機からの視認をできる限り容易にするため、発煙筒を装備する。または飛行時に機体を認識しやすい塗色を行う。","b":"地上において、機体や地上に設置されたカメラ等により飛行経路全体の航空機の状況が1時間おきに確認できる。","c":"第三者に危害を加えないことを、製造事業者等が証明した機能を有する。"},"answer":"c"},{"number":70,"question":"補助者を配置しない場合の目視外飛行における、リスク軽減策を踏まえた運航の計画の立案の例（追加事項）として、誤っているものを1つ選びなさい。","choices":{"a":"飛行範囲の外周から落下距離の範囲内を立入管理区画とし、飛行経路には第三者が存在する可能性が低い場所の設定基準を準用する。","b":"立入管理区画を設定した場合は、当該立入管理区画に立看板等を設置するとともに、インターネットやポスター等により、問い合わせ先を明示した上で上空を無人航空機が飛行することを第三者に対して周知する。","c":"立入管理区画に道路、鉄道、家屋等、第三者が存在する可能性を排除できない場所が含まれる場合には、第三者の強制排除措置を講じる。"},"answer":"c"}]};
const EXAM_MINUTES = 75;

const STORAGE_KEY = 'cbt_ippan_progress_v1';
const RESULT_KEY = 'cbt_ippan_results_v1';

const BLOCK_SIZE = 10; // 演習モードは10問ごとに採点

// localStorageが使えない環境（file://プロトコル、プライベートブラウジング、
// 一部のアプリ内ブラウザ等）でもアプリ自体は止まらないよう、
// メモリ内フォールバックストレージを用意する。
let _memoryStorage = {};
let _storageWarned = false;
function _safeGetItem(key){
  try{
    return localStorage.getItem(key);
  }catch(e){
    return (key in _memoryStorage) ? _memoryStorage[key] : null;
  }
}
function _safeSetItem(key, value){
  try{
    localStorage.setItem(key, value);
  }catch(e){
    _memoryStorage[key] = value;
    if(!_storageWarned){
      _storageWarned = true;
      console.warn('localStorageが利用できないため、進捗はこのページを開いている間のみ一時保存されます。', e);
    }
  }
}

function loadProgress(){
  try{ return JSON.parse(_safeGetItem(STORAGE_KEY) || '{}'); }catch(e){ return {}; }
}
function saveProgress(state){
  _safeSetItem(STORAGE_KEY, JSON.stringify(state));
}
function clearProgress(round){
  const all = loadProgress();
  delete all[round];
  saveProgress(all);
}
function loadResults(){
  try{ return JSON.parse(_safeGetItem(RESULT_KEY) || '{}'); }catch(e){ return {}; }
}
function saveResult(round, result){
  const all = loadResults();
  all[round] = result;
  _safeSetItem(RESULT_KEY, JSON.stringify(all));
}

function fmtTime(sec){
  sec = Math.max(0, sec);
  const m = Math.floor(sec/60), s = sec%60;
  return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

// ============ EXAM LOGIC ============
function beginExam(round){
  const all = loadProgress();
  const existing = all[round];
  const questions = QUESTION_BANK[round];

  if(existing && !existing.submitted){
    state = existing;
  } else {
    state = {
      round: round,
      answers: {},      // qnum -> 'a'|'b'|'c'
      flags: {},         // qnum -> true
      currentIndex: 0,
      timeLeft: EXAM_MINUTES*60,
      submitted: false,
      startedAt: Date.now()
    };
    all[round] = state;
    saveProgress(all);
  }
  renderExam();
  startTimer();
}

function persistState(){
  const all = loadProgress();
  all[state.round] = state;
  saveProgress(all);
}

function startTimer(){
  stopTimer();
  timerHandle = setInterval(()=>{
    state.timeLeft--;
    persistState();
    updateTimerDisplay();
    if(state.timeLeft <= 0){
      stopTimer();
      submitExam(true);
    }
  }, 1000);
}
function stopTimer(){
  if(timerHandle){ clearInterval(timerHandle); timerHandle = null; }
}
function updateTimerDisplay(){
  const el = document.getElementById('timerDisplay');
  if(!el) return;
  el.textContent = fmtTime(state.timeLeft);
  el.classList.remove('warn','crit');
  if(state.timeLeft <= 300) el.classList.add('crit');
  else if(state.timeLeft <= 900) el.classList.add('warn');
}

function renderExam(){
  const questions = QUESTION_BANK[state.round];
  const app = document.getElementById('app');

  const answeredCount = Object.keys(state.answers).length;

  app.innerHTML = `
    <div class="examhead">
      <div class="left">
        <div class="title">第${state.round}回 一等学科試験（模擬）</div>
        <div class="qpos" id="qposLabel"></div>
      </div>
      <div class="right">
        <button class="flagbtn" id="flagBtn">🚩 フラグ</button>
        <div class="timer" id="timerDisplay">${fmtTime(state.timeLeft)}</div>
        <button class="btn btn-secondary" id="endExamBtn">試験を終了</button>
      </div>
    </div>
    <div class="main">
      <div class="examcol">
        <div class="qcard" id="qcard"></div>
        <div class="navbtns">
          <button class="btn btn-secondary" id="prevBtn">← 前の問題</button>
          <button class="btn btn-primary" id="nextBtn">次の問題 →</button>
        </div>
      </div>
      <div class="navcol">
        <div class="progresswrap">
          <h3>進捗</h3>
          <div class="progressbar"><div id="progressFill" style="width:0%"></div></div>
          <div class="progresslabel" id="progressLabel"></div>
        </div>
        <h3>問題ナビゲータ</h3>
        <div class="legend">
          <span><i class="dot answered"></i>解答済み</span>
          <span><i class="dot unanswered"></i>未解答</span>
          <span><i class="dot flagged"></i>フラグ</span>
        </div>
        <div class="palette" id="palette"></div>
        <div class="submitwrap">
          <button class="btn btn-danger btn-block" id="submitBtn">解答を終了して採点する</button>
        </div>
      </div>
    </div>
  `;

  updateTimerDisplay();
  document.getElementById('prevBtn').addEventListener('click', ()=> navigate(-1));
  document.getElementById('nextBtn').addEventListener('click', ()=> navigate(1));
  document.getElementById('flagBtn').addEventListener('click', toggleFlag);
  document.getElementById('endExamBtn').addEventListener('click', ()=> confirmSubmit());
  document.getElementById('submitBtn').addEventListener('click', ()=> confirmSubmit());

  document.onkeydown = (e)=>{
    if(!state || state.submitted) return;
    if(e.key === 'ArrowRight') navigate(1);
    if(e.key === 'ArrowLeft') navigate(-1);
    if(['a','b','c','A','B','C'].includes(e.key)) selectChoice(e.key.toLowerCase());
    if(e.key.toLowerCase() === 'f') toggleFlag();
  };

  renderQuestion();
  renderPalette();
}

function renderQuestion(){
  const questions = QUESTION_BANK[state.round];
  const q = questions[state.currentIndex];
  document.getElementById('qposLabel').textContent = `問題 ${state.currentIndex+1} / ${questions.length}`;

  const selected = state.answers[q.number];
  const isFlagged = !!state.flags[q.number];
  document.getElementById('flagBtn').classList.toggle('on', isFlagged);

  const order = ['a','b','c'];
  const choicesHtml = order.map(letter=>{
    const sel = selected === letter ? 'selected' : '';
    return `
      <label class="choice ${sel}" data-letter="${letter}">
        <input type="radio" name="choice" value="${letter}">
        <span class="letter">${letter.toUpperCase()}</span>
        <span class="body">${q.choices[letter]}</span>
      </label>`;
  }).join('');

  document.getElementById('qcard').innerHTML = `
    <div class="qnum-badge">問題 ${q.number}</div>
    <p class="qtext">${q.question}</p>
    <div class="choices">${choicesHtml}</div>
  `;

  document.querySelectorAll('.choice').forEach(el=>{
    el.addEventListener('click', ()=> selectChoice(el.dataset.letter));
  });

  document.getElementById('prevBtn').disabled = state.currentIndex === 0;
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.textContent = state.currentIndex === questions.length-1 ? '最後の問題です' : '次の問題 →';

  const answeredCount = Object.keys(state.answers).length;
  document.getElementById('progressFill').style.width = (answeredCount/questions.length*100)+'%';
  document.getElementById('progressLabel').textContent = `${answeredCount} / ${questions.length} 問 解答済み`;
}

function selectChoice(letter){
  const questions = QUESTION_BANK[state.round];
  const q = questions[state.currentIndex];
  state.answers[q.number] = letter;
  persistState();
  renderQuestion();
  renderPalette();
}

function toggleFlag(){
  const questions = QUESTION_BANK[state.round];
  const q = questions[state.currentIndex];
  if(state.flags[q.number]) delete state.flags[q.number];
  else state.flags[q.number] = true;
  persistState();
  renderQuestion();
  renderPalette();
}

function navigate(delta){
  const questions = QUESTION_BANK[state.round];
  const newIndex = state.currentIndex + delta;
  if(newIndex < 0 || newIndex >= questions.length) return;
  state.currentIndex = newIndex;
  persistState();
  renderQuestion();
  renderPalette();
}

function renderPalette(){
  const questions = QUESTION_BANK[state.round];
  const palette = document.getElementById('palette');
  palette.innerHTML = questions.map((q, idx)=>{
    const answered = state.answers[q.number] !== undefined;
    const flagged = !!state.flags[q.number];
    const current = idx === state.currentIndex;
    let cls = 'pnode';
    if(answered) cls += ' answered';
    if(current) cls += ' current';
    if(flagged) cls += ' flagged';
    return `<div class="${cls}" data-idx="${idx}">${idx+1}</div>`;
  }).join('');
  palette.querySelectorAll('.pnode').forEach(el=>{
    el.addEventListener('click', ()=>{
      state.currentIndex = parseInt(el.dataset.idx, 10);
      persistState();
      renderQuestion();
      renderPalette();
    });
  });
}

function confirmSubmit(){
  const questions = QUESTION_BANK[state.round];
  const unanswered = questions.length - Object.keys(state.answers).length;
  const app = document.getElementById('app');
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h3>採点しますか？</h3>
      <p>${unanswered > 0 ? `未解答の問題が ${unanswered} 問あります。` : '全問解答済みです。'}<br>採点すると回答内容は確定し、修正できません。</p>
      <div class="modalbtns">
        <button class="btn btn-secondary" id="cancelSubmit">戻る</button>
        <button class="btn btn-danger" id="confirmSubmitBtn">採点する</button>
      </div>
    </div>
  `;
  app.appendChild(overlay);
  document.getElementById('cancelSubmit').addEventListener('click', ()=> overlay.remove());
  document.getElementById('confirmSubmitBtn').addEventListener('click', ()=>{
    overlay.remove();
    submitExam(false);
  });
}

function submitExam(timeUp){
  stopTimer();
  const questions = QUESTION_BANK[state.round];
  let correct = 0;
  const detail = questions.map(q=>{
    const picked = state.answers[q.number] || null;
    const isCorrect = picked === q.answer;
    if(isCorrect) correct++;
    return { number:q.number, question:q.question, choices:q.choices, answer:q.answer, picked };
  });
  const total = questions.length;
  const passed = correct >= Math.ceil(total * PASS_RATIO) || correct >= 63 && total===70;
  const result = {
    round: state.round, correct, total,
    passed: correct/total >= PASS_RATIO,
    detail, timeUp: !!timeUp,
    finishedAt: Date.now()
  };
  state.submitted = true;
  persistState();
  saveResult(state.round, result);
  renderResults(result);
}

// ============ RESULTS ============
function renderResults(result){
  const app = document.getElementById('app');
  const passed = result.passed;
  const passLine = Math.ceil(result.total * PASS_RATIO);

  let currentFilter = 'all';

  function filterDetail(){
    if(currentFilter === 'wrong') return result.detail.filter(d => d.picked !== d.answer);
    if(currentFilter === 'flagged'){
      const flags = (loadProgress()[result.round]||{}).flags || {};
      return result.detail.filter(d => flags[d.number]);
    }
    return result.detail;
  }

  function renderList(){
    const list = filterDetail();
    document.getElementById('reviewList').innerHTML = list.map(d=>{
      const skipped = d.picked === null;
      const isCorrect = d.picked === d.answer;
      const tag = skipped ? '<span class="tag skip">未解答</span>' : (isCorrect ? '<span class="tag correct">正解</span>' : '<span class="tag wrong">不正解</span>');
      const order = ['a','b','c'];
      const choicesHtml = order.map(letter=>{
        let cls = 'rchoice';
        if(letter === d.answer) cls += ' iscorrect';
        else if(letter === d.picked) cls += ' iswrongpick';
        return `<div class="${cls}"><span class="rletter">${letter.toUpperCase()}</span><span>${d.choices[letter]}</span></div>`;
      }).join('');
      return `
        <div class="review-item">
          <div class="rhead"><span class="rqnum">問題 ${d.number}</span>${tag}</div>
          <p class="rqtext">${d.question}</p>
          ${choicesHtml}
        </div>`;
    }).join('') || '<p style="color:#9aa1ac;font-size:14px;">該当する問題はありません。</p>';
  }

  app.innerHTML = `
    <div class="result-wrap">
      <div class="top-actions">
        <button class="btn btn-secondary" id="backHomeBtn">← 回選択に戻る</button>
        <button class="btn btn-primary" id="retryBtn">この回をもう一度受験する</button>
      </div>
      <div class="result-banner ${passed?'pass':'fail'}">
        <div class="result-score">${result.correct}/${result.total}</div>
        <div class="result-meta">
          <h2>${passed ? '合格ライン到達' : '合格ラインに未到達'}</h2>
          <p>第${result.round}回・合格基準 ${passLine}問以上（正答率90%）${result.timeUp ? '・時間切れによる自動採点' : ''}</p>
        </div>
      </div>
      <div class="filterbar">
        <button class="filterbtn active" data-f="all">すべて（${result.detail.length}）</button>
        <button class="filterbtn" data-f="wrong">不正解・未解答（${result.detail.filter(d=>d.picked!==d.answer).length}）</button>
        <button class="filterbtn" data-f="flagged">フラグ付き</button>
      </div>
      <div id="reviewList"></div>
    </div>
    <footer class="credit">学習用模擬演習ツール（本番のCBT試験とは別物です）</footer>
  `;

  renderList();

  document.querySelectorAll('.filterbtn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.filterbtn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.f;
      renderList();
    });
  });

  document.getElementById('backHomeBtn').addEventListener('click', renderStart);
  document.getElementById('retryBtn').addEventListener('click', ()=>{
    clearProgress(result.round);
    beginExam(result.round);
  });
  document.onkeydown = null;
}

// ============ PRACTICE MODE (10問ずつ採点) ============
function loadPractice(){
  try{ return JSON.parse(_safeGetItem(PRACTICE_KEY) || '{}'); }catch(e){ return {}; }
}
function savePracticeAll(all){
  _safeSetItem(PRACTICE_KEY, JSON.stringify(all));
}
function clearPractice(round){
  const all = loadPractice();
  delete all[round];
  savePracticeAll(all);
}

let pstate = null; // active practice state

function persistPractice(){
  const all = loadPractice();
  all[pstate.round] = pstate;
  savePracticeAll(all);
}

function blockRange(questions, block){
  const start = block * BLOCK_SIZE;
  return questions.slice(start, Math.min(start + BLOCK_SIZE, questions.length));
}
function blockCount(questions){
  return Math.ceil(questions.length / BLOCK_SIZE);
}
function blockScore(questions, block){
  const bq = blockRange(questions, block);
  let correct = 0;
  bq.forEach(q=>{ if(pstate.answers[q.number] === q.answer) correct++; });
  return { correct, total: bq.length };
}

function beginPractice(round){
  stopTimer();
  const all = loadPractice();
  const existing = all[round];
  if(existing && !existing.finished){
    pstate = existing;
  } else {
    pstate = {
      round: round,
      block: 0,          // 現在のブロック（0始まり）
      idx: 0,            // ブロック内の問題位置
      phase: 'answer',   // 'answer' | 'review' | 'summary' | 'retrySummary'
      answers: {},       // qnum -> 'a'|'b'|'c'
      blocksDone: 0,     // 現ラウンドで採点済みのブロック数
      stage: 'main',     // 'main'（全問）| 'retry'（不正解のみ復習）
      retryRound: 0,     // 復習ラウンド数
      retryQnums: null,  // 復習対象の問題番号リスト
      finished: false,
      startedAt: Date.now()
    };
    all[round] = pstate;
    savePracticeAll(all);
  }
  if(pstate.phase === 'review') renderBlockReview();
  else if(pstate.phase === 'summary') renderPracticeSummary();
  else if(pstate.phase === 'retrySummary') renderRetrySummary();
  else renderPractice();
}

// 現在のラウンドで出題する問題リスト（復習中は不正解だった問題のみ）
function practiceQuestions(){
  const questions = QUESTION_BANK[pstate.round];
  if(pstate.stage === 'retry' && pstate.retryQnums){
    const byNum = {};
    questions.forEach(q=>{ byNum[q.number] = q; });
    return pstate.retryQnums.map(n=> byNum[n]);
  }
  return questions;
}

function renderPractice(){
  const questions = practiceQuestions();
  const blocks = blockCount(questions);
  const bq = blockRange(questions, pstate.block);
  const app = document.getElementById('app');
  const title = pstate.stage === 'retry'
    ? `第${pstate.round}回 復習ラウンド${pstate.retryRound}（不正解のみ ${questions.length}問）`
    : `第${pstate.round}回 演習モード（10問ずつ採点）`;

  app.innerHTML = `
    <div class="examhead">
      <div class="left">
        <div class="title">${title}</div>
        <div class="qpos" id="qposLabel"></div>
      </div>
      <div class="right">
        <button class="btn btn-secondary" id="quitPracticeBtn">中断して戻る</button>
      </div>
    </div>
    <div class="main">
      <div class="examcol">
        <div class="qcard" id="qcard"></div>
        <div class="navbtns">
          <button class="btn btn-secondary" id="prevBtn">← 前の問題</button>
          <button class="btn btn-primary" id="nextBtn">次の問題 →</button>
        </div>
      </div>
      <div class="navcol">
        <div class="progresswrap">
          <h3>ブロック ${pstate.block+1} / ${blocks}</h3>
          <div class="progressbar"><div id="progressFill" style="width:0%"></div></div>
          <div class="progresslabel" id="progressLabel"></div>
        </div>
        <h3>このブロックの問題</h3>
        <div class="legend">
          <span><i class="dot answered"></i>解答済み</span>
          <span><i class="dot unanswered"></i>未解答</span>
        </div>
        <div class="palette" id="palette"></div>
        <div class="submitwrap">
          <button class="btn btn-danger btn-block" id="gradeBlockBtn">この${bq.length}問を採点する</button>
        </div>
      </div>
    </div>
  `;

  document.getElementById('prevBtn').addEventListener('click', ()=> pNavigate(-1));
  document.getElementById('nextBtn').addEventListener('click', ()=> pNavigate(1));
  document.getElementById('quitPracticeBtn').addEventListener('click', ()=>{ persistPractice(); renderStart(); });
  document.getElementById('gradeBlockBtn').addEventListener('click', confirmGradeBlock);

  document.onkeydown = (e)=>{
    if(!pstate || pstate.phase !== 'answer') return;
    if(e.key === 'ArrowRight') pNavigate(1);
    if(e.key === 'ArrowLeft') pNavigate(-1);
    if(['a','b','c','A','B','C'].includes(e.key)) pSelectChoice(e.key.toLowerCase());
  };

  renderPracticeQuestion();
  renderPracticePalette();
}

function renderPracticeQuestion(){
  const questions = practiceQuestions();
  const bq = blockRange(questions, pstate.block);
  const q = bq[pstate.idx];
  const globalNo = pstate.block*BLOCK_SIZE + pstate.idx + 1;
  document.getElementById('qposLabel').textContent = `問題 ${globalNo} / ${questions.length}`;

  const selected = pstate.answers[q.number];
  const order = ['a','b','c'];
  const choicesHtml = order.map(letter=>{
    const sel = selected === letter ? 'selected' : '';
    return `
      <label class="choice ${sel}" data-letter="${letter}">
        <input type="radio" name="choice" value="${letter}">
        <span class="letter">${letter.toUpperCase()}</span>
        <span class="body">${q.choices[letter]}</span>
      </label>`;
  }).join('');

  document.getElementById('qcard').innerHTML = `
    <div class="qnum-badge">問題 ${q.number}</div>
    <p class="qtext">${q.question}</p>
    <div class="choices">${choicesHtml}</div>
  `;

  document.querySelectorAll('.choice').forEach(el=>{
    el.addEventListener('click', ()=> pSelectChoice(el.dataset.letter));
  });

  document.getElementById('prevBtn').disabled = pstate.idx === 0;
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.textContent = pstate.idx === bq.length-1 ? '最後の問題です' : '次の問題 →';

  const answeredCount = bq.filter(x=> pstate.answers[x.number] !== undefined).length;
  document.getElementById('progressFill').style.width = (answeredCount/bq.length*100)+'%';
  document.getElementById('progressLabel').textContent = `${answeredCount} / ${bq.length} 問 解答済み`;
}

function pSelectChoice(letter){
  const bq = blockRange(practiceQuestions(), pstate.block);
  pstate.answers[bq[pstate.idx].number] = letter;
  persistPractice();
  renderPracticeQuestion();
  renderPracticePalette();
}

function pNavigate(delta){
  const bq = blockRange(practiceQuestions(), pstate.block);
  const ni = pstate.idx + delta;
  if(ni < 0 || ni >= bq.length) return;
  pstate.idx = ni;
  persistPractice();
  renderPracticeQuestion();
  renderPracticePalette();
}

function renderPracticePalette(){
  const bq = blockRange(practiceQuestions(), pstate.block);
  const palette = document.getElementById('palette');
  palette.innerHTML = bq.map((q, i)=>{
    let cls = 'pnode';
    if(pstate.answers[q.number] !== undefined) cls += ' answered';
    if(i === pstate.idx) cls += ' current';
    return `<div class="${cls}" data-idx="${i}">${pstate.block*BLOCK_SIZE + i + 1}</div>`;
  }).join('');
  palette.querySelectorAll('.pnode').forEach(el=>{
    el.addEventListener('click', ()=>{
      pstate.idx = parseInt(el.dataset.idx, 10);
      persistPractice();
      renderPracticeQuestion();
      renderPracticePalette();
    });
  });
}

function confirmGradeBlock(){
  const bq = blockRange(practiceQuestions(), pstate.block);
  const unanswered = bq.filter(q=> pstate.answers[q.number] === undefined).length;
  if(unanswered === 0){ gradeBlock(); return; }
  const app = document.getElementById('app');
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h3>採点しますか？</h3>
      <p>未解答の問題が ${unanswered} 問あります。<br>採点するとこのブロックの回答は確定し、修正できません。</p>
      <div class="modalbtns">
        <button class="btn btn-secondary" id="cancelGrade">戻る</button>
        <button class="btn btn-danger" id="confirmGradeBtn">採点する</button>
      </div>
    </div>
  `;
  app.appendChild(overlay);
  document.getElementById('cancelGrade').addEventListener('click', ()=> overlay.remove());
  document.getElementById('confirmGradeBtn').addEventListener('click', ()=>{ overlay.remove(); gradeBlock(); });
}

function gradeBlock(){
  pstate.phase = 'review';
  pstate.blocksDone = pstate.block + 1;
  persistPractice();
  renderBlockReview();
}

// 見直しリスト（review-item）のHTMLを生成する（演習モード用）
function practiceReviewItemsHtml(qs){
  return qs.map(q=>{
    const picked = pstate.answers[q.number] !== undefined ? pstate.answers[q.number] : null;
    const skipped = picked === null;
    const isCorrect = picked === q.answer;
    const tag = skipped ? '<span class="tag skip">未解答</span>' : (isCorrect ? '<span class="tag correct">正解</span>' : '<span class="tag wrong">不正解</span>');
    const order = ['a','b','c'];
    const choicesHtml = order.map(letter=>{
      let cls = 'rchoice';
      if(letter === q.answer) cls += ' iscorrect';
      else if(letter === picked) cls += ' iswrongpick';
      return `<div class="${cls}"><span class="rletter">${letter.toUpperCase()}</span><span>${q.choices[letter]}</span></div>`;
    }).join('');
    return `
      <div class="review-item">
        <div class="rhead"><span class="rqnum">問題 ${q.number}</span>${tag}</div>
        <p class="rqtext">${q.question}</p>
        ${choicesHtml}
      </div>`;
  }).join('');
}

function renderBlockReview(){
  const questions = practiceQuestions();
  const blocks = blockCount(questions);
  const bq = blockRange(questions, pstate.block);
  const score = blockScore(questions, pstate.block);
  let cumCorrect = 0, cumTotal = 0;
  for(let b=0; b<pstate.blocksDone; b++){
    const s = blockScore(questions, b);
    cumCorrect += s.correct; cumTotal += s.total;
  }
  const isLast = pstate.block === blocks - 1;
  const isRetry = pstate.stage === 'retry';
  const nextLen = isLast ? 0 : blockRange(questions, pstate.block+1).length;
  const nextLabel = isLast
    ? (isRetry ? '復習結果を見る →' : '最終結果を見る →')
    : `次の${nextLen}問へ進む →`;
  const app = document.getElementById('app');

  app.innerHTML = `
    <div class="result-wrap">
      <div class="top-actions">
        <button class="btn btn-secondary" id="backHomeBtn">← 中断して戻る</button>
        <button class="btn btn-primary" id="nextBlockBtn">${nextLabel}</button>
      </div>
      <div class="result-banner neutral">
        <div class="result-score">${score.correct}/${score.total}</div>
        <div class="result-meta">
          <h2>ブロック ${pstate.block+1} / ${blocks} の結果</h2>
          <p>${isRetry ? `第${pstate.round}回 復習ラウンド${pstate.retryRound}` : `第${pstate.round}回 演習モード`}・ここまでの累計 ${cumCorrect}/${cumTotal} 問正解</p>
        </div>
      </div>
      <div id="reviewList">${practiceReviewItemsHtml(bq)}</div>
    </div>
    <footer class="credit">学習用模擬演習ツール（本番のCBT試験とは別物です）</footer>
  `;

  document.getElementById('backHomeBtn').addEventListener('click', ()=>{ persistPractice(); renderStart(); });
  document.getElementById('nextBlockBtn').addEventListener('click', ()=>{
    if(isLast){
      if(isRetry) renderRetrySummary();
      else renderPracticeSummary();
    } else {
      pstate.block++;
      pstate.idx = 0;
      pstate.phase = 'answer';
      persistPractice();
      renderPractice();
    }
  });
  document.onkeydown = null;
}

function renderPracticeSummary(){
  const questions = QUESTION_BANK[pstate.round];
  const blocks = blockCount(questions);
  let totalCorrect = 0;
  const blockRows = [];
  for(let b=0; b<blocks; b++){
    const s = blockScore(questions, b);
    totalCorrect += s.correct;
    blockRows.push(`<div class="rchoice"><span class="rletter">${b+1}</span><span>問題 ${b*BLOCK_SIZE+1}〜${Math.min((b+1)*BLOCK_SIZE, questions.length)}： ${s.correct} / ${s.total} 問正解</span></div>`);
  }
  const ratio = Math.round(totalCorrect/questions.length*100);
  const passed = totalCorrect/questions.length >= PASS_RATIO;

  let currentFilter = 'all';
  const wrongQs = questions.filter(q=> pstate.answers[q.number] !== q.answer);
  const allCorrect = wrongQs.length === 0;
  pstate.phase = 'summary';
  if(allCorrect) pstate.finished = true;
  persistPractice();
  const app = document.getElementById('app');

  app.innerHTML = `
    <div class="result-wrap">
      <div class="top-actions">
        <button class="btn btn-secondary" id="backHomeBtn">← 回選択に戻る</button>
        <button class="btn btn-secondary" id="retryPracticeBtn">この回をもう一度演習する</button>
        ${allCorrect ? '' : `<button class="btn btn-primary" id="reviewWrongBtn">不正解の${wrongQs.length}問だけ復習する →</button>`}
      </div>
      <div class="result-banner ${passed?'pass':'fail'}">
        <div class="result-score">${totalCorrect}/${questions.length}</div>
        <div class="result-meta">
          <h2>${allCorrect ? '全問正解！ 完全制覇です' : `演習終了（正答率 ${ratio}%）`}</h2>
          <p>第${pstate.round}回 演習モード・${allCorrect ? '1周目で全問クリアしました' : '「不正解だけ復習」を繰り返して全問正解を目指しましょう（参考：本試験の合格基準は正答率90%）'}</p>
        </div>
      </div>
      <div class="review-item">
        <div class="rhead"><span class="rqnum">ブロック別成績</span></div>
        ${blockRows.join('')}
      </div>
      <div class="filterbar">
        <button class="filterbtn active" data-f="all">すべて（${questions.length}）</button>
        <button class="filterbtn" data-f="wrong">不正解・未解答（${wrongQs.length}）</button>
      </div>
      <div id="reviewList"></div>
    </div>
    <footer class="credit">学習用模擬演習ツール（本番のCBT試験とは別物です）</footer>
  `;

  function renderList(){
    const list = currentFilter === 'wrong' ? wrongQs : questions;
    document.getElementById('reviewList').innerHTML = practiceReviewItemsHtml(list) || '<p style="color:#9aa1ac;font-size:14px;">該当する問題はありません。</p>';
  }
  renderList();

  document.querySelectorAll('.filterbtn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.filterbtn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.f;
      renderList();
    });
  });
  document.getElementById('backHomeBtn').addEventListener('click', ()=>{
    if(allCorrect) clearPractice(pstate.round);
    renderStart();
  });
  document.getElementById('retryPracticeBtn').addEventListener('click', ()=>{
    const r = pstate.round;
    clearPractice(r);
    beginPractice(r);
  });
  const reviewWrongBtn = document.getElementById('reviewWrongBtn');
  if(reviewWrongBtn){
    reviewWrongBtn.addEventListener('click', ()=> beginRetryRound(wrongQs.map(q=>q.number)));
  }
  document.onkeydown = null;
}

// ============ 復習ラウンド（不正解のみを繰り返し、全問正解を目指す） ============
function beginRetryRound(qnums){
  pstate.stage = 'retry';
  pstate.retryRound = (pstate.retryRound || 0) + 1;
  pstate.retryQnums = qnums;
  qnums.forEach(n=>{ delete pstate.answers[n]; }); // 復習対象は解答し直し
  pstate.block = 0;
  pstate.idx = 0;
  pstate.blocksDone = 0;
  pstate.phase = 'answer';
  persistPractice();
  renderPractice();
}

function renderRetrySummary(){
  const questions = practiceQuestions();
  let correct = 0;
  questions.forEach(q=>{ if(pstate.answers[q.number] === q.answer) correct++; });
  const wrongQs = questions.filter(q=> pstate.answers[q.number] !== q.answer);
  const cleared = wrongQs.length === 0;
  pstate.phase = 'retrySummary';
  if(cleared) pstate.finished = true;
  persistPractice();
  const app = document.getElementById('app');

  if(cleared){
    app.innerHTML = `
      <div class="result-wrap">
        <div class="top-actions">
          <button class="btn btn-secondary" id="backHomeBtn">← 回選択に戻る</button>
          <button class="btn btn-primary" id="retryPracticeBtn">この回をもう一度演習する</button>
        </div>
        <div class="result-banner pass">
          <div class="result-score">${correct}/${questions.length}</div>
          <div class="result-meta">
            <h2>🎉 全問正解！ 完全制覇です</h2>
            <p>第${pstate.round}回・復習ラウンド${pstate.retryRound}で残っていた${questions.length}問をすべてクリアしました。</p>
          </div>
        </div>
        <div id="reviewList">${practiceReviewItemsHtml(questions)}</div>
      </div>
      <footer class="credit">学習用模擬演習ツール（本番のCBT試験とは別物です）</footer>
    `;
    document.getElementById('backHomeBtn').addEventListener('click', ()=>{ clearPractice(pstate.round); renderStart(); });
    document.getElementById('retryPracticeBtn').addEventListener('click', ()=>{
      const r = pstate.round;
      clearPractice(r);
      beginPractice(r);
    });
    document.onkeydown = null;
    return;
  }

  app.innerHTML = `
    <div class="result-wrap">
      <div class="top-actions">
        <button class="btn btn-secondary" id="backHomeBtn">← 中断して戻る</button>
        <button class="btn btn-primary" id="nextRetryBtn">不正解の${wrongQs.length}問をもう一度復習する →</button>
      </div>
      <div class="result-banner neutral">
        <div class="result-score">${correct}/${questions.length}</div>
        <div class="result-meta">
          <h2>復習ラウンド${pstate.retryRound} の結果</h2>
          <p>第${pstate.round}回・あと${wrongQs.length}問で完全制覇です。不正解だった問題だけをもう一度解き直しましょう。</p>
        </div>
      </div>
      <div id="reviewList">${practiceReviewItemsHtml(wrongQs)}</div>
    </div>
    <footer class="credit">学習用模擬演習ツール（本番のCBT試験とは別物です）</footer>
  `;
  document.getElementById('backHomeBtn').addEventListener('click', ()=>{ persistPractice(); renderStart(); });
  document.getElementById('nextRetryBtn').addEventListener('click', ()=> beginRetryRound(wrongQs.map(q=>q.number)));
  document.onkeydown = null;
}

// ============ INIT ============
if(isAuthed()){
  renderStart();
} else {
  renderLogin();
}
</script>
</body>
</html>
